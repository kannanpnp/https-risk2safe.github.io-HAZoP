/* ─── MAIN APP ───────────────────────────────────────── */
const INIT_STUDY={projectName:'',company:'',facility:'',unit:'',location:'',docRef:'',date:new Date().toISOString().split('T')[0],revision:'0',methodology:'Guide Word HAZOP',preparedBy:'',approvedBy:'',scope:'',teamMembers:[]};


/* ═══════════════════════════════════════════════════════════════════════
   BOW TIE SVG CANVAS — faithful graphical bow tie per reference image
   Threats→Prevention Barriers→[TOP EVENT]→Mitigation Barriers→Consequences
   Degradation factors + controls shown below barriers
   ═══════════════════════════════════════════════════════════════════════ */
const BowTieSVGCanvas=({nd,barriers,devLabel,onBarrierClick})=>{
  const causes=nd.causes||[];
  const allCons=causes.flatMap((c,ci)=>(c.consequences||[]).map((cn,qi)=>({...cn,ci,qi,cause:c})));
  const N=Math.max(causes.length,1);
  const M=Math.max(allCons.length,1);
  const ROWS=Math.max(N,M);

  // ── SVG dimension constants ───────────────────────────────────────────
  const VW=1200;
  const ROW_H=Math.max(140,Math.round(700/ROWS));
  const CORE_H=ROWS*ROW_H+60;
  const CY=CORE_H/2;

  // Check if any barriers have degradation factors
  const allDFs=barriers.flatMap(b=>(b.degradationFactors||[]).map((df,dfi)=>({b,df,dfi})));
  const DF_ZONE=allDFs.length>0?Math.min(allDFs.length*80+60,320):0;
  const VH=CORE_H+DF_ZONE+20;

  // ── X zones ───────────────────────────────────────────────────────────
  const TX=10, TW=148, TH=64;
  const BARRIER_L_START=TW+TX+28;
  const BARRIER_L_END=455;
  const TRUNK_L=470;
  const TE_CX=VW/2, TE_RX=85, TE_RY=52;
  const TRUNK_R=VW-470;
  const BARRIER_R_START=VW-455;
  const BARRIER_R_END=VW-TW-TX-28;
  const CX=VW-TW-TX;
  const BW=26, BH=76;

  // ── Y position helpers ─────────────────────────────────────────────────
  const cY=ci=>N===1?CY:Math.round(30+ci*(CORE_H-60)/(N-1));
  const qY=qi=>M===1?CY:Math.round(30+qi*(CORE_H-60)/(M-1));

  // ── Barrier X position helpers ─────────────────────────────────────────
  const pBX=(ci,bi,total)=>{
    if(total===0)return (BARRIER_L_START+BARRIER_L_END)/2;
    const step=(BARRIER_L_END-BARRIER_L_START)/(total+1);
    return Math.round(BARRIER_L_START+step*(bi+1));
  };
  const mBX=(qi,bi,total)=>{
    if(total===0)return (BARRIER_R_START+BARRIER_R_END)/2;
    const step=(BARRIER_R_END-BARRIER_R_START)/(total+1);
    return Math.round(BARRIER_R_START+step*(bi+1));
  };

  // ── Barrier filter helpers ─────────────────────────────────────────────
  const prevBs=ci=>barriers.filter(b=>b.side==='prevention'&&b.causeId===causes[ci]?.id);
  const mitBs=qi=>barriers.filter(b=>b.side==='mitigation'&&b.conId===allCons[qi]?.id);
  const bCol=type=>(BARRIER_TYPES[type]||BARRIER_TYPES.Engineering).color;
  const bBg=type=>(BARRIER_TYPES[type]||BARRIER_TYPES.Engineering).bg;
  const T=(s,n)=>(s||'').substring(0,n)+((s||'').length>n?'…':'');

  // ── Colors ───────────────────────────────────────────────────────────
  const PC='#f59e0b', MC='#ef4444', TC='#94a3b8';

  return(
    <svg viewBox={`0 0 ${VW} ${VH}`} style={{width:'100%',height:'auto',display:'block',userSelect:'none'}}
      xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="sce-glow"><feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      {/* ── Column labels ── */}
      <text x={(TX+TW+TRUNK_L)/2} y={14} textAnchor="middle"
        fill={PC} fontSize={10} fontFamily="system-ui" fontWeight="700" opacity={0.75}>
        Prevention Barriers
      </text>
      <text x={(TRUNK_R+CX+TW)/2} y={14} textAnchor="middle"
        fill={MC} fontSize={10} fontFamily="system-ui" fontWeight="700" opacity={0.75}>
        Mitigation Barriers
      </text>

      {/* ── Left vertical trunk ── */}
      {N>1&&(
        <line x1={TRUNK_L} y1={cY(0)} x2={TRUNK_L} y2={cY(N-1)}
          stroke={TC} strokeWidth={2.5} opacity={0.45}/>
      )}

      {/* ── Right vertical trunk ── */}
      {M>1&&(
        <line x1={TRUNK_R} y1={qY(0)} x2={TRUNK_R} y2={qY(M-1)}
          stroke={TC} strokeWidth={2.5} opacity={0.45}/>
      )}

      {/* ── Trunk → Top Event arrows ── */}
      <line x1={TRUNK_L} y1={CY} x2={TE_CX-TE_RX} y2={CY}
        stroke={TC} strokeWidth={2.5} opacity={0.6}/>
      <line x1={TE_CX+TE_RX} y1={CY} x2={TRUNK_R} y2={CY}
        stroke={TC} strokeWidth={2.5} opacity={0.6}/>

      {/* ── Top Event ── */}
      <ellipse cx={TE_CX} cy={CY} rx={TE_RX} ry={TE_RY}
        fill="#78350f" stroke="#f59e0b" strokeWidth={3}/>
      <text x={TE_CX} y={CY-16} textAnchor="middle" fill="#fff"
        fontSize={10} fontWeight="800" fontFamily="system-ui">TOP EVENT</text>
      <text x={TE_CX} y={CY+1} textAnchor="middle" fill="#fde68a"
        fontSize={8.5} fontFamily="system-ui">{T(devLabel,24)}</text>
      {(devLabel||'').length>24&&(
        <text x={TE_CX} y={CY+15} textAnchor="middle" fill="#fde68a"
          fontSize={8} fontFamily="system-ui">{T((devLabel||'').substring(24),24)}</text>
      )}

      {/* ═════════════════════════════════════════════════════════════════
          CAUSES (threats) — left side
          ═════════════════════════════════════════════════════════════════ */}
      {causes.map((cause,ci)=>{
        const y=cY(ci);
        const pbs=prevBs(ci);
        const firstBX=pbs.length>0?pBX(ci,0,pbs.length)-BW/2:TRUNK_L;
        return(
          <g key={cause.id||ci}>
            {/* Cause/Threat box */}
            <rect x={TX} y={y-TH/2} width={TW} height={TH} rx={5}
              fill="#1a0b00" stroke={PC} strokeWidth={2}/>
            <text x={TX+7} y={y-TH/2+14} fill={PC} fontSize={9}
              fontWeight="bold" fontFamily="system-ui">C{ci+1}</text>
            <text x={TX+7} y={y-TH/2+27} fill="#fde68a" fontSize={8.5}
              fontFamily="system-ui">{T(cause.text,19)}</text>
            {(cause.text||'').length>19&&(
              <text x={TX+7} y={y-TH/2+39} fill="#fde68a" fontSize={8}
                fontFamily="system-ui">{T((cause.text||'').substring(19),19)}</text>
            )}
            {(cause.text||'').length>38&&(
              <text x={TX+7} y={y-TH/2+50} fill="#fcd34d" fontSize={7.5}
                fontFamily="system-ui">{T((cause.text||'').substring(38),19)}…</text>
            )}

            {/* Line: threat box → first barrier (or trunk if no barriers) */}
            <line x1={TX+TW} y1={y} x2={firstBX} y2={y}
              stroke={PC} strokeWidth={2} opacity={0.75}/>

            {/* No barriers → line to trunk */}
            {pbs.length===0&&(
              <line x1={TX+TW} y1={y} x2={TRUNK_L} y2={y}
                stroke={PC} strokeWidth={2} opacity={0.55}/>
            )}

            {/* Prevention barriers + inter-barrier lines */}
            {pbs.map((b,bi)=>{
              const bx=pBX(ci,bi,pbs.length);
              const col=bCol(b.type);
              const bg=bBg(b.type);
              const hasDFs=(b.degradationFactors||[]).length>0;
              const lineEnd=bi<pbs.length-1
                ?pBX(ci,bi+1,pbs.length)-BW/2
                :TRUNK_L;
              return(
                <g key={b.id||bi}>
                  {/* Barrier rect — clickable */}
                  <rect x={bx-BW/2} y={y-BH/2} width={BW} height={BH}
                    rx={3} fill={bg} stroke={col} strokeWidth={b.isSCE?3:2}
                    style={{cursor:'pointer'}}
                    filter={b.isSCE?'url(#sce-glow)':undefined}
                    onClick={()=>onBarrierClick(b)}/>
                  {b.isSCE&&(
                    <text x={bx} y={y-BH/2-6} textAnchor="middle"
                      fontSize={11} fill="#ef4444" fontFamily="system-ui">★</text>
                  )}
                  {/* Line after this barrier */}
                  <line x1={bx+BW/2} y1={y} x2={lineEnd} y2={y}
                    stroke={PC} strokeWidth={2} opacity={0.75}/>
                  {/* Drop line to DF zone */}
                  {hasDFs&&(
                    <line x1={bx} y1={y+BH/2} x2={bx} y2={CORE_H+8}
                      stroke="#f59e0b" strokeWidth={1.5}
                      strokeDasharray="5,3" opacity={0.55}/>
                  )}
                </g>
              );
            })}
          </g>
        );
      })}

      {/* ═════════════════════════════════════════════════════════════════
          CONSEQUENCES (escalations) — right side
          ═════════════════════════════════════════════════════════════════ */}
      {allCons.map((cn,qi)=>{
        const y=qY(qi);
        const mbs=mitBs(qi);
        const firstMBX=mbs.length>0?mBX(qi,0,mbs.length)-BW/2:CX;
        return(
          <g key={cn.id||qi}>
            {/* Consequence box */}
            <rect x={CX} y={y-TH/2} width={TW} height={TH} rx={5}
              fill="#1a0505" stroke={MC} strokeWidth={2}/>
            <text x={CX+7} y={y-TH/2+14} fill={MC} fontSize={9}
              fontWeight="bold" fontFamily="system-ui">C{cn.ci+1}.{cn.qi+1}</text>
            <text x={CX+7} y={y-TH/2+27} fill="#fca5a5" fontSize={8.5}
              fontFamily="system-ui">{T(cn.text,19)}</text>
            {(cn.text||'').length>19&&(
              <text x={CX+7} y={y-TH/2+39} fill="#fca5a5" fontSize={8}
                fontFamily="system-ui">{T((cn.text||'').substring(19),19)}</text>
            )}
            {(cn.text||'').length>38&&(
              <text x={CX+7} y={y-TH/2+50} fill="#fca5a5" fontSize={7.5}
                fontFamily="system-ui">{T((cn.text||'').substring(38),19)}…</text>
            )}

            {/* No barriers → line from trunk to consequence */}
            {mbs.length===0&&(
              <line x1={TRUNK_R} y1={y} x2={CX} y2={y}
                stroke={MC} strokeWidth={2} opacity={0.55}/>
            )}

            {/* Line: trunk → first mitigation barrier */}
            {mbs.length>0&&(
              <line x1={TRUNK_R} y1={y} x2={firstMBX} y2={y}
                stroke={MC} strokeWidth={2} opacity={0.75}/>
            )}

            {/* Mitigation barriers */}
            {mbs.map((b,bi)=>{
              const bx=mBX(qi,bi,mbs.length);
              const col=bCol(b.type);
              const bg=bBg(b.type);
              const hasDFs=(b.degradationFactors||[]).length>0;
              const lineEnd=bi<mbs.length-1
                ?mBX(qi,bi+1,mbs.length)-BW/2
                :CX;
              return(
                <g key={b.id||bi}>
                  <rect x={bx-BW/2} y={y-BH/2} width={BW} height={BH}
                    rx={3} fill={bg} stroke={col} strokeWidth={b.isSCE?3:2}
                    style={{cursor:'pointer'}}
                    filter={b.isSCE?'url(#sce-glow)':undefined}
                    onClick={()=>onBarrierClick(b)}/>
                  {b.isSCE&&(
                    <text x={bx} y={y-BH/2-6} textAnchor="middle"
                      fontSize={11} fill="#ef4444" fontFamily="system-ui">★</text>
                  )}
                  <line x1={bx+BW/2} y1={y} x2={lineEnd} y2={y}
                    stroke={MC} strokeWidth={2} opacity={0.75}/>
                  {hasDFs&&(
                    <line x1={bx} y1={y+BH/2} x2={bx} y2={CORE_H+8}
                      stroke="#f59e0b" strokeWidth={1.5}
                      strokeDasharray="5,3" opacity={0.55}/>
                  )}
                </g>
              );
            })}
          </g>
        );
      })}

      {/* ═════════════════════════════════════════════════════════════════
          DEGRADATION FACTORS + CONTROLS — below the main diagram
          ═════════════════════════════════════════════════════════════════ */}
      {allDFs.length>0&&(
        <g>
          <line x1={20} y1={CORE_H+12} x2={VW-20} y2={CORE_H+12}
            stroke="#334155" strokeWidth={1} strokeDasharray="8,5" opacity={0.5}/>
          <text x={VW/2} y={CORE_H+30} textAnchor="middle"
            fill="#64748b" fontSize={9} fontFamily="system-ui" fontWeight="600">
            Degradation Factors &amp; Controls (CCDs)
          </text>

          {allDFs.map(({b,df,dfi},idx)=>{
            // Find barrier X in diagram
            let bx2=TE_CX;
            const ci2=causes.findIndex(c=>c.id===b.causeId);
            if(b.side==='prevention'&&ci2>=0){
              const pbs2=prevBs(ci2);
              const bi2=pbs2.findIndex(pb=>pb.id===b.id);
              if(bi2>=0)bx2=pBX(ci2,bi2,pbs2.length);
            }
            const qi2=allCons.findIndex(cn=>cn.id===b.conId);
            if(b.side==='mitigation'&&qi2>=0){
              const mbs2=mitBs(qi2);
              const bi2=mbs2.findIndex(mb=>mb.id===b.id);
              if(bi2>=0)bx2=mBX(qi2,bi2,mbs2.length);
            }
            const isPrev=b.side==='prevention';
            const DFY=CORE_H+42+dfi*80;
            const DFW=130,DFH=36;
            const DCW=110,DCH=32;
            return(
              <g key={b.id+'-'+dfi}>
                {/* DF box */}
                <rect x={bx2-DFW/2} y={DFY} width={DFW} height={DFH}
                  rx={4} fill="#451a03" stroke="#f59e0b" strokeWidth={1.5}/>
                <text x={bx2} y={DFY+13} textAnchor="middle"
                  fill="#fde68a" fontSize={8} fontFamily="system-ui">{T(df.text,17)}</text>
                {(df.text||'').length>17&&(
                  <text x={bx2} y={DFY+25} textAnchor="middle"
                    fill="#fde68a" fontSize={7.5} fontFamily="system-ui">
                    {T((df.text||'').substring(17),17)}
                  </text>
                )}
                {/* Controls (CCDs) */}
                {(df.controls||[]).map((dc,dci)=>{
                  const DCX=isPrev
                    ?bx2-DFW/2-DCW-12
                    :bx2+DFW/2+12;
                  const DCY=DFY+(dci*40);
                  return(
                    <g key={dci}>
                      <line x1={isPrev?bx2-DFW/2:bx2+DFW/2} y1={DFY+DFH/2}
                        x2={isPrev?DCX+DCW:DCX} y2={DCY+DCH/2}
                        stroke="#22c55e" strokeWidth={1.5} opacity={0.7}/>
                      <rect x={DCX} y={DCY} width={DCW} height={DCH}
                        rx={4} fill="#052e16" stroke="#22c55e" strokeWidth={1.5}/>
                      <text x={DCX+DCW/2} y={DCY+12} textAnchor="middle"
                        fill="#86efac" fontSize={7.5} fontFamily="system-ui">
                        {T(dc.text||'',16)}
                      </text>
                      {(dc.text||'').length>16&&(
                        <text x={DCX+DCW/2} y={DCY+24} textAnchor="middle"
                          fill="#86efac" fontSize={7} fontFamily="system-ui">
                          {T((dc.text||'').substring(16),16)}
                        </text>
                      )}
                    </g>
                  );
                })}
              </g>
            );
          })}
        </g>
      )}
    </svg>
  );
};


/* ═══════════════════════════════════════════════════════════════════════
   BOW TIE STUDIO — Tier 3 Full Barrier Model
   Auto-generated from HAZOP data + enrichable with degradation factors
   AI-assisted SCE/SCT identification → Excel export
   ═══════════════════════════════════════════════════════════════════════ */

/* ── Merge HAZOP data with stored bowtie enrichment ── */
const buildBowTieBarriers=(dev,storedBT)=>{
  if(!dev)return[];
  const nd=normalizeDev(dev);
  const stored=storedBT||{};
  const barriers=[];
  nd.causes.forEach((cause,ci)=>{
    // Safeguards → prevention barriers (per consequence)
    cause.consequences.forEach((con,qi)=>{
      const sgs=Array.isArray(con.safeguards)?con.safeguards:(con.safeguard?[con.safeguard]:[]);
      sgs.forEach((sg,si)=>{
        const id=`prev-${cause.id}-${con.id}-${si}`;
        barriers.push({id,side:'prevention',causeId:cause.id,conId:con.id,
          causeRef:`C${ci+1}`,conRef:`C${ci+1}.${qi+1}`,
          text:typeof sg==='string'?sg:(sg?.text||''),type:'Engineering',isSCE:false,performanceStandard:'',
          degradationFactors:(typeof sg==='object'&&Array.isArray(sg.degradationFactors))?sg.degradationFactors:[],...(stored[id]||{})});
      });
      // Mitigation barriers from HAZOP (with embedded DFs + CCDs)
      const mits=Array.isArray(con.mitigationBarriers)?con.mitigationBarriers:[];
      mits.forEach((m,mi)=>{
        if(!m.text)return;
        const id=`mit-${cause.id}-${con.id}-${m.id||mi}`;
        barriers.push({id,side:'mitigation',causeId:cause.id,conId:con.id,
          causeRef:`C${ci+1}`,conRef:`C${ci+1}.${qi+1}`,
          text:m.text,type:m.type||'Engineering',isSCE:false,performanceStandard:'',
          degradationFactors:m.degradationFactors||[],
          ...(stored[id]||{})});
      });
    });
    // Cause-level recommendations → prevention barriers
    const crecs=Array.isArray(cause.recommendations)?cause.recommendations:[];
    crecs.forEach((r,ri)=>{
      const txt=typeof r==='string'?r:(r.text||'');
      if(!txt)return;
      const id=`prev-cause-${cause.id}-${ri}`;
      barriers.push({id,side:'prevention',causeId:cause.id,conId:null,
        causeRef:`C${ci+1}`,conRef:null,
        text:txt,type:'Administrative',isSCE:false,performanceStandard:'',
        degradationFactors:[],...(stored[id]||{})});
    });
  });
  return barriers;
};

const BarrierEditorPanel=({barrier,onUpdate,onClose})=>{
  const [b,setB]=useState(barrier);
  useEffect(()=>setB(barrier),[barrier?.id]);
  const save=()=>{onUpdate(b);onClose();};
  if(!b)return null;
  const tc=BARRIER_TYPES[b.type]||BARRIER_TYPES.Engineering;
  const scts=Array.isArray(b.scts)?b.scts:[];

  const addSCT=()=>setB(prev=>({...prev,scts:[...(prev.scts||[]),
    {id:uid(),task:'',type:'Testing',frequency:'',responsible:'',competency:'',procedure:''}]}));
  const delSCT=(i)=>setB(prev=>({...prev,scts:(prev.scts||[]).filter((_,j)=>j!==i)}));
  const updSCT=(i,upd)=>setB(prev=>({...prev,scts:(prev.scts||[]).map((s,j)=>j===i?{...s,...upd}:s)}));

  return(
    <div style={{width:400,borderLeft:'1px solid var(--border)',background:'var(--bg-surface)',
      display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
      {/* Header */}
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg-card)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontFamily:'var(--disp)',fontWeight:700,fontSize:13,color:tc.color,
            textTransform:'uppercase',letterSpacing:'0.06em'}}>Edit Barrier</div>
          <button onClick={onClose} style={{width:24,height:24,borderRadius:4,cursor:'pointer',
            fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',
            background:'transparent',color:'var(--text2)',border:'1px solid var(--border)'}}>✕</button>
        </div>
        <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>
          {b.side==='prevention'?'Prevention Barrier — Threat side':'Mitigation Barrier — Consequence side'}
        </div>
      </div>
      {/* Body */}
      <div style={{flex:1,overflowY:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:14}}>
        {/* Barrier description */}
        <div>
          <label style={{fontSize:11,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:4}}>
            Barrier Description
          </label>
          <textarea value={b.text} onChange={e=>setB({...b,text:e.target.value})} rows={2}
            style={{fontSize:12,resize:'vertical',width:'100%',lineHeight:1.5}}/>
        </div>
        {/* Barrier type */}
        <div>
          <label style={{fontSize:11,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:6}}>
            Barrier Type
          </label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            {Object.entries(BARRIER_TYPES).map(([k,v])=>(
              <button key={k} onClick={()=>setB({...b,type:k})}
                style={{padding:'6px 10px',borderRadius:5,cursor:'pointer',fontSize:11,fontWeight:600,
                  background:b.type===k?v.bg:'var(--bg-card)',
                  color:b.type===k?v.color:'var(--text3)',
                  border:`2px solid ${b.type===k?v.color:'var(--border)'}`,
                  textAlign:'left',display:'flex',gap:5,alignItems:'center'}}>
                <span>{v.icon}</span><span>{v.label}</span>
              </button>
            ))}
          </div>
        </div>
        {/* SCE flag */}
        <div style={{padding:'10px 12px',borderRadius:6,border:`1px solid ${b.isSCE?'#ef444466':'var(--border)'}`,
          background:b.isSCE?'#1a0505':'var(--bg-card)',display:'flex',alignItems:'center',
          justifyContent:'space-between',cursor:'pointer',transition:'all 0.2s'}}
          onClick={()=>setB({...b,isSCE:!b.isSCE})}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:b.isSCE?'#ef4444':'var(--text2)'}}>
              ★ Safety Critical Element (SCE)
            </div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>
              Barrier whose failure could contribute substantially to a Major Accident Event
            </div>
          </div>
          <div style={{width:28,height:16,borderRadius:8,background:b.isSCE?'#ef4444':'var(--border)',
            position:'relative',flexShrink:0,transition:'all 0.2s'}}>
            <div style={{width:12,height:12,borderRadius:6,background:'#fff',position:'absolute',
              top:2,left:b.isSCE?14:2,transition:'all 0.2s'}}/>
          </div>
        </div>
        {/* Performance Standard — only when SCE is ON */}
        {b.isSCE&&(
          <div style={{borderLeft:'3px solid #ef4444',paddingLeft:10}}>
            <label style={{fontSize:11,color:'#ef4444',fontWeight:600,display:'block',marginBottom:4}}>
              Performance Standard
            </label>
            <textarea value={b.performanceStandard||''} onChange={e=>setB({...b,performanceStandard:e.target.value})}
              rows={2} placeholder="e.g., SIL 2 — PFD ≤ 0.01, proof test 6-monthly, demand rate < 0.1/yr"
              style={{fontSize:11,resize:'vertical',width:'100%',border:'1px solid #ef444466',lineHeight:1.5}}/>
          </div>
        )}
        {/* Safety Critical Tasks — ALWAYS visible */}
        <div style={{borderLeft:`3px solid ${b.isSCE?'#22c55e':'var(--border)'}`,paddingLeft:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',
                color:b.isSCE?'#22c55e':'var(--text2)'}}>
                Safety Critical Tasks (SCTs)
                <span style={{marginLeft:6,fontFamily:'var(--mono)',fontSize:10,fontWeight:400,
                  color:'var(--text3)'}}>({scts.length})</span>
              </div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>
                {b.isSCE
                  ?"Tasks required to maintain this SCE's performance standard"
                  :'Toggle SCE ON to formally designate — SCTs can still be added now'}
              </div>
            </div>
          </div>
          {scts.length===0&&(
            <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',marginBottom:6,
              padding:'8px 10px',background:'var(--bg-card)',borderRadius:4,border:'1px solid var(--border)'}}>
              No SCTs yet — click <strong style={{color:'#22c55e',fontStyle:'normal'}}>+ Add</strong> below, or use <strong style={{color:'#a78bfa',fontStyle:'normal'}}>✦ Analyse SCE / SCT</strong> to auto-generate.
            </div>
          )}
          {scts.map((sct,i)=>(
            <SCTRow key={sct.id||i} sct={sct} idx={i}
              onChange={upd=>updSCT(i,upd)}
              onDelete={()=>delSCT(i)}/>
          ))}
          <button onClick={addSCT}
            style={{fontSize:11,padding:'5px 12px',borderRadius:4,cursor:'pointer',fontWeight:700,
              background:b.isSCE?'#052e16':'var(--bg-card)',
              color:b.isSCE?'#22c55e':'var(--text2)',
              border:`1px solid ${b.isSCE?'#22c55e55':'var(--border)'}`,
              display:'flex',alignItems:'center',gap:5}}>
            + Add Safety Critical Task
          </button>
        </div>
        {/* Degradation factors */}
        <div>
          <label style={{fontSize:11,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:6}}>
            Degradation Factors &amp; Controls (CCDs)
          </label>
          <DegradationEditor
            factors={b.degradationFactors||[]}
            onChange={df=>setB({...b,degradationFactors:df})}/>
        </div>
      </div>
      {/* Footer */}
      <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)',flexShrink:0,
        background:'var(--bg-card)',display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:10,color:'var(--text3)'}}>
          {b.isSCE&&<span style={{color:'#ef4444'}}>★ SCE · {scts.length} SCT{scts.length!==1?'s':''}</span>}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={onClose} style={{fontSize:12,padding:'6px 14px',borderRadius:4,cursor:'pointer',
            background:'transparent',color:'var(--text2)',border:'1px solid var(--border)'}}>Cancel</button>
          <button onClick={save} style={{fontSize:12,padding:'6px 16px',borderRadius:4,cursor:'pointer',
            background:'var(--accent)',color:'#000',fontWeight:700,border:'none'}}>✓ Save</button>
        </div>
      </div>
    </div>
  );
};

/* ── Barrier Pill (visual element on bow tie) ── */

  const hasDeg=barrier.degradationFactors&&barrier.degradationFactors.length>0;
  return(
    <div onClick={onClick}

        border:`2px solid ${barrier.isSCE?'#ef4444':tc.color+'88'}`,
        borderRadius:5,cursor:'pointer',maxWidth:160,transition:'all 0.15s',
        boxShadow:barrier.isSCE?'0 0 8px #ef444444':'none'}}>
      {barrier.isSCE&&<div style={{fontSize:8,color:'#ef4444',fontWeight:800,letterSpacing:'0.05em',marginBottom:2}}>★ SCE{Array.isArray(barrier.scts)&&barrier.scts.length>0?' · '+barrier.scts.length+' SCT':''}</div>}
      <div style={{fontSize:10,color:tc.color,lineHeight:1.35,fontWeight:500}}>

      {hasDeg&&<div style={{fontSize:8,color:'#f59e0b',marginTop:2}}>⚠ {barrier.degradationFactors.length} degradation factor{barrier.degradationFactors.length>1?'s':''}</div>}

};

/* ── Main Bow Tie View ── */
const BowTieView=({state,setState,apiKey,aiModel})=>{
  const {nodes,deviations}=state;
  const bowties=state.bowties||{};
  const [activeNodeId,setActiveNodeId]=useState(nodes[0]?.id||null);
  const [activeDevId,setActiveDevId]=useState(null);
  const [editingBarrierId,setEditingBarrierId]=useState(null);
  const [sceData,setSceData]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [sceError,setSceError]=useState('');

  const activeNode=nodes.find(n=>n.id===activeNodeId);
  const activeDev=deviations.find(d=>d.id===activeDevId);
  const nodeDevs=deviations.filter(d=>d.nodeId===activeNodeId);
  const nd=activeDev?normalizeDev(activeDev):null;

  // Get merged barriers (HAZOP data + enrichment)
  const barriers=activeDev?buildBowTieBarriers(activeDev,bowties[activeDev.id]):[];
  const editingBarrier=barriers.find(b=>b.id===editingBarrierId)||null;

  // Persist barrier enrichment
  const updateBarrier=(updated)=>{
    setState(s=>{
      const bt=s.bowties||{};
      const devBt=bt[activeDev.id]||{};
      return{...s,bowties:{...bt,[activeDev.id]:{...devBt,[updated.id]:updated}}};
    });
  };

  const prevBarriers=barriers.filter(b=>b.side==='prevention');
  const mitBarriers=barriers.filter(b=>b.side==='mitigation');
  const sceBarriers=barriers.filter(b=>b.isSCE);

  /* ── AI SCE/SCT Analysis ── */
  const analyzeForSCE=async()=>{
    if(!apiKey){setSceError('API key required.');return;}
    if(!activeDev||barriers.length===0){setSceError('No barriers to analyse. Add barriers in the HAZOP Worksheet first.');return;}
    setAnalyzing(true);setSceError('');setSceData(null);
    try{
      const devLabel=activeDev.deviation||activeDev.guideWord+' '+activeDev.parameter;
      // Compact barrier list to keep prompt small
      const barrierList=barriers.map((b,i)=>(
        '['+( i+1)+'] id='+b.id+' type='+b.type+' side='+b.side+': '+(b.text||'').substring(0,100)
      )).join('\n');
      const sys='You are a Process Safety Engineer. Identify Safety Critical Elements (SCE) and Safety Critical Tasks (SCT) from a bow tie barrier list. Return ONLY valid compact JSON, no explanation, no markdown.';
      const schema='{"sces":[{"barrierId":"BARRIER_ID","sceId":"SCE-001","designation":"SCE name","function":"safety function description","maeScenario":"MAE scenario","performanceStandard":"e.g. SIL 2 PFD 0.01","verificationScheme":"verification method","scts":[{"sctId":"SCT-001-01","task":"task description","type":"Testing","frequency":"6-monthly","responsible":"role","competency":"cert","procedure":"MNT-001"}]}],"nonSCEBarriers":[{"barrierId":"BARRIER_ID","reason":"reason"}]}';
      const usr='Node: '+(activeNode?.name||'')+' | Top Event: '+devLabel+
        '\nFluid: '+(activeNode?.fluid||'unspecified')+
        ' | Conditions: '+(activeNode?.conditions||'unspecified')+
        '\n\nBarriers ('+barriers.length+'):\n'+barrierList+
        '\n\nReturn JSON matching this schema exactly:\n'+schema+
        '\n\nRules: Only Engineering and Instrumented barriers whose failure causes MAE qualify as SCEs. Each SCE needs 2-3 SCTs.';

      const raw=await window.callAnthropicAPI(apiKey,aiModel||'claude-sonnet-4-6',sys,usr);
      // Progressive parse: direct, strip markdown, repair
      let parsed=null;
      const clean=raw.replace(/```json|```/g,'').trim();
      for(const attempt of [
        ()=>JSON.parse(clean),
        ()=>repairJSON(clean),
        ()=>{const m=clean.match(/"sces"\s*:\s*\[/);if(!m)throw new Error();const idx=clean.indexOf(m[0]);return repairJSON(clean.substring(idx-1));}
      ]){
        try{parsed=attempt();if(parsed)break;}catch{}
      }
      if(!parsed||!Array.isArray(parsed.sces))
        throw new Error('Could not parse AI response. Try switching to claude-sonnet-4-6 in API settings.');
      setSceData(parsed);
      // Auto-flag SCE barriers and merge AI SCTs with existing manual SCTs
      parsed.sces.forEach(sce=>{
        const b=barriers.find(x=>x.id===sce.barrierId);
        if(b){
          const existingSCTs=Array.isArray(b.scts)?b.scts:[];
          const aiSCTs=(sce.scts||[]).map(t=>({
            id:uid(),task:t.task||'',type:t.type||'Testing',
            frequency:t.frequency||'',responsible:t.responsible||'',
            competency:t.competency||'',procedure:t.procedure||'',source:'AI'
          }));
          const merged=[...existingSCTs,...aiSCTs.filter(ai=>
            !existingSCTs.some(m=>m.task&&ai.task&&
              m.task.trim().toLowerCase()===ai.task.trim().toLowerCase())
          )];
          updateBarrier({...b,isSCE:true,
            performanceStandard:b.performanceStandard||sce.performanceStandard||'',
            scts:merged});
        }
      });
    }catch(e){setSceError(e.message);}
    finally{setAnalyzing(false);}
  };

  /* ── Excel Export ── */
  const exportExcel=()=>{
    if(typeof XLSX==='undefined'){alert('SheetJS not loaded.');return;}
    const wb=XLSX.utils.book_new();
    // Sheet 1: Bow Tie Barriers
    const btRows=[['Node','Top Event','Ref','Side','Barrier','Type','SCE?','Performance Standard','Degradation Factors','CCDs']];
    barriers.forEach(b=>{
      const dfs=(b.degradationFactors||[]).map(d=>d.text).join('; ');
      const ccds=(b.degradationFactors||[]).flatMap(d=>(d.controls||[]).map(c=>c.text)).join('; ');
      btRows.push([activeNode?.name||'',activeDev?.deviation||activeDev?.guideWord+' '+activeDev?.parameter||'',b.causeRef+(b.conRef?'/'+b.conRef:''),b.side,b.text,b.type,b.isSCE?'YES':'',b.performanceStandard||'',dfs,ccds]);
    });
    const ws1=XLSX.utils.aoa_to_sheet(btRows);
    ws1['!cols']=[{wch:18},{wch:22},{wch:10},{wch:12},{wch:35},{wch:14},{wch:5},{wch:30},{wch:30},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws1,'Bow Tie Barriers');
    // Sheet 2: SCE Register
    const sceRows=[['SCE ID','Barrier ID','SCE Designation','Safety Function','MAE Scenario','Performance Standard','Verification Scheme','Node','Top Event']];
    if(sceData?.sces) sceData.sces.forEach(s=>{
      sceRows.push([s.sceId,s.barrierId,s.designation,s.function,s.maeScenario,s.performanceStandard,s.verificationScheme,activeNode?.name||'',activeDev?.deviation||'']);
    });
    const ws2=XLSX.utils.aoa_to_sheet(sceRows);
    ws2['!cols']=[{wch:10},{wch:12},{wch:25},{wch:30},{wch:30},{wch:30},{wch:25},{wch:18},{wch:22}];
    XLSX.utils.book_append_sheet(wb,ws2,'SCE Register');
    // Sheet 3: SCT Register
    const sctRows=[['SCT ID','SCE ID','Barrier','Task Description','Task Type','Frequency','Responsible','Competency Required','Procedure Reference','Source','Node']];
    // AI-generated SCTs
    if(sceData?.sces) sceData.sces.forEach(s=>{
      (s.scts||[]).forEach(t=>{
        sctRows.push([t.sctId,s.sceId,s.designation,t.task,t.type||'',t.frequency||'',t.responsible||'',t.competency||'',t.procedure||'','AI Analysis',activeNode?.name||'']);
      });
    });
    // Manually entered SCTs from barrier editor
    barriers.filter(bar=>bar.isSCE&&Array.isArray(bar.scts)&&bar.scts.length>0).forEach((bar,bi)=>{
      bar.scts.forEach((t,ti)=>{
        const sctId=`SCT-M${bi+1}-${String(ti+1).padStart(2,'0')}`;
        const sceId=`SCE-M${bi+1}`;
        sctRows.push([sctId,sceId,bar.text?.substring(0,40)||'',t.task||'',t.type||'',t.frequency||'',t.responsible||'',t.competency||'',t.procedure||'','Manual Entry',activeNode?.name||'']);
      });
    });
    const ws3=XLSX.utils.aoa_to_sheet(sctRows);
    ws3['!cols']=[{wch:12},{wch:10},{wch:20},{wch:35},{wch:14},{wch:12},{wch:20},{wch:25},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws3,'SCT Register');
    const fname=`BowTie_${(activeNode?.name||'node').replace(/\s+/g,'_')}_${(activeDev?.deviation||'dev').substring(0,20).replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.xlsx`;
    XLSX.writeFile(wb,fname);
  };

  /* ── Layout helpers ── */
  const ThreatBlock=({cause,ci})=>{
    const cPrev=prevBarriers.filter(b=>b.causeId===cause.id);
    return(
      <div style={{marginBottom:16,display:'flex',flexDirection:'column',gap:6}}>
        <div style={{padding:'8px 10px',background:'#1a0b00',borderRadius:6,border:'2px solid #f59e0b55',
          fontSize:11,fontWeight:700,color:'#fcd34d',display:'flex',gap:6,alignItems:'flex-start'}}>
          <span style={{fontFamily:'var(--mono)',fontSize:10,background:'#451a03',padding:'1px 5px',
            borderRadius:3,flexShrink:0,marginTop:1}}>C{ci+1}</span>
          <span style={{lineHeight:1.4}}>{cause.text||<span style={{color:'var(--text3)',fontWeight:400}}>No cause text</span>}</span>
        </div>
        {cPrev.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:4,paddingLeft:12,borderLeft:'2px solid #f59e0b33'}}>
            <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>
              Prevention Barriers
            </div>
            {cPrev.map(b=><BarrierPill key={b.id} barrier={b} onClick={()=>setEditingBarrierId(b.id)}/>)}
          </div>
        )}
        {cPrev.length===0&&(
          <div style={{fontSize:10,color:'var(--text3)',fontStyle:'italic',paddingLeft:12}}>No prevention barriers — add safeguards in Worksheet</div>
        )}
      </div>
    );
  };

  const ConseqBlock=({con,cause,ci,qi})=>{
    const cMit=mitBarriers.filter(b=>b.causeId===cause.id&&b.conId===con.id);
    return(
      <div style={{marginBottom:16,display:'flex',flexDirection:'column',gap:6}}>
        {cMit.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:4,paddingRight:12,borderRight:'2px solid #ef444433',alignItems:'flex-end'}}>
            <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>
              Mitigation Barriers
            </div>
            {cMit.map(b=><BarrierPill key={b.id} barrier={b} onClick={()=>setEditingBarrierId(b.id)}/>)}
          </div>
        )}
        {cMit.length===0&&(
          <div style={{fontSize:10,color:'var(--text3)',fontStyle:'italic',paddingRight:12,textAlign:'right'}}>No mitigation barriers</div>
        )}
        <div style={{padding:'8px 10px',background:'#1a0505',borderRadius:6,border:'2px solid #ef444455',
          fontSize:11,fontWeight:600,color:'#fca5a5',display:'flex',gap:6,alignItems:'flex-start',justifyContent:'flex-end'}}>
          <span style={{lineHeight:1.4,textAlign:'right'}}>{con.text||<span style={{color:'var(--text3)',fontWeight:400}}>No consequence text</span>}</span>
          <span style={{fontFamily:'var(--mono)',fontSize:9,background:'#450a0a',padding:'1px 5px',
            borderRadius:3,flexShrink:0,marginTop:1}}>{ci+1}.{qi+1}</span>
        </div>
      </div>
    );
  };

  return(
    <div style={{flex:1,display:'flex',overflow:'hidden'}}>

      {/* Sidebar */}
      <div className="sidebar" style={{width:220,display:'flex',flexDirection:'column',gap:12,overflow:'auto'}}>
        <div className="sec-hdr" style={{flexDirection:'column',alignItems:'flex-start',gap:8}}>
          <label style={{fontSize:11,color:'var(--text2)',fontWeight:600}}>Node</label>
          <select value={activeNodeId||''} onChange={e=>{setActiveNodeId(e.target.value);setActiveDevId(null);setSceData(null);}}
            style={{fontSize:12,width:'100%'}}>
            <option value="">— Select Node —</option>
            {nodes.map(n=><option key={n.id} value={n.id}>{n.name||'Unnamed'}</option>)}
          </select>
          {activeNodeId&&(
            <>
              <label style={{fontSize:11,color:'var(--text2)',fontWeight:600}}>Deviation (Top Event)</label>
              <div style={{display:'flex',flexDirection:'column',gap:4,width:'100%'}}>
                {nodeDevs.map((d,di)=>(
                  <button key={d.id} onClick={()=>{setActiveDevId(d.id);setSceData(null);setEditingBarrierId(null);}}
                    style={{textAlign:'left',padding:'7px 10px',borderRadius:5,cursor:'pointer',fontSize:11,
                      background:activeDevId===d.id?'var(--accent-dim)':'var(--bg-card)',
                      color:activeDevId===d.id?'var(--accent)':'var(--text2)',
                      border:`1px solid ${activeDevId===d.id?'var(--accent)':'var(--border)'}`,fontWeight:activeDevId===d.id?700:400}}>
                    <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginBottom:2}}>D{di+1}</div>
                    {d.deviation||d.guideWord+' '+d.parameter}
                  </button>
                ))}
                {nodeDevs.length===0&&<div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>No deviations yet</div>}
              </div>
            </>
          )}
        </div>

        {activeDev&&(
          <div style={{display:'flex',flexDirection:'column',gap:6,padding:'0 12px'}}>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>
              Bow Tie Summary
            </div>
            <div style={{fontSize:11,color:'var(--text2)'}}>
              Barriers: <strong style={{color:'var(--accent)'}}>{barriers.length}</strong><br/>
              Prevention: <strong style={{color:'#22c55e'}}>{prevBarriers.length}</strong><br/>
              Mitigation: <strong style={{color:'#ef4444'}}>{mitBarriers.length}</strong><br/>
              SCEs: <strong style={{color:'#ef4444'}}>{sceBarriers.length}</strong>
            </div>

            <div style={{borderTop:'1px solid var(--border)',paddingTop:8,display:'flex',flexDirection:'column',gap:6}}>
              <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>Barrier Type Legend</div>
              {Object.entries(BARRIER_TYPES).map(([k,v])=>(
                <div key={k} style={{display:'flex',gap:6,alignItems:'center',fontSize:10}}>
                  <div style={{width:10,height:10,borderRadius:2,background:v.bg,border:`1px solid ${v.color}`,flexShrink:0}}/>
                  <span style={{color:v.color}}>{v.icon} {v.label}</span>
                </div>
              ))}
              <div style={{display:'flex',gap:6,alignItems:'center',fontSize:10}}>
                <div style={{width:10,height:10,borderRadius:2,background:'transparent',border:'2px solid #ef4444',flexShrink:0}}/>
                <span style={{color:'#ef4444'}}>★ SCE</span>
              </div>
            </div>

            <button onClick={analyzeForSCE} disabled={analyzing}
              style={{padding:'8px 10px',borderRadius:5,cursor:'pointer',fontWeight:700,fontSize:11,
                background:'#2d1f5e',color:'#c4b5fd',border:'1px solid #7c3aed88',
                display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              {analyzing?<><span className="spin">⟳</span> Analysing…</>:<>✦ Analyse SCE / SCT</>}
            </button>

            {(sceData||barriers.length>0)&&(
              <button onClick={exportExcel}
                style={{padding:'7px 10px',borderRadius:5,cursor:'pointer',fontWeight:600,fontSize:11,
                  background:'#166534',color:'#86efac',border:'1px solid #22c55e55',
                  display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                ⬇ Export Excel
              </button>
            )}

            {sceError&&<div style={{fontSize:10,color:'#fca5a5',background:'#2d0a0a',padding:'6px 8px',borderRadius:4,border:'1px solid #7f1d1d'}}>{sceError}</div>}
          </div>
        )}
      </div>

      {/* Main Bow Tie Area */}
      <div style={{flex:1,overflowY:'auto',overflowX:'auto',padding:16,minWidth:0}}>
        {!activeDev&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            height:'100%',gap:12,color:'var(--text3)'}}>
            <div style={{fontSize:32}}>🎯</div>
            <div style={{fontSize:14,fontWeight:600}}>Select a node and deviation to view its Bow Tie</div>
            <div style={{fontSize:12}}>Bow ties are automatically built from your HAZOP worksheet data.<br/>Click any barrier to enrich it with type, degradation factors and CCDs.</div>
          </div>
        )}

        {activeDev&&nd&&(
          <div style={{minWidth:700}}>
            {/* Top Event Banner */}
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{display:'inline-block',padding:'10px 24px',background:'#0d1f3c',
                border:'2px solid var(--accent)',borderRadius:8,boxShadow:'0 0 24px var(--accent)44'}}>
                <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:2}}>TOP EVENT</div>
                <div style={{fontFamily:'var(--disp)',fontSize:17,fontWeight:800,color:'var(--accent)',letterSpacing:'0.04em'}}>
                  {activeDev.deviation||activeDev.guideWord+' '+activeDev.parameter}
                </div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{activeNode?.name}</div>
              </div>
            </div>

            {/* Bow Tie SVG Canvas */}
            <div style={{overflowX:'auto',overflowY:'visible'}}>
              <BowTieSVGCanvas
                nd={nd} barriers={barriers}
                devLabel={activeDev.deviation||activeDev.guideWord+' '+activeDev.parameter}
                onBarrierClick={(b)=>setEditingBarrierId(b.id)}/>
            </div>

            {/* SCE/SCT Results Panel */}
            {sceData&&(
              <div style={{marginTop:24}}>
                <div style={{fontFamily:'var(--disp)',fontSize:14,fontWeight:700,color:'#ef4444',
                  textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>
                  ★ SCE / SCT Analysis Results
                </div>
                <div style={{fontSize:11,color:'#fca5a5',marginBottom:12,padding:'6px 10px',
                  background:'#2d0a0a',borderRadius:4,border:'1px solid #7f1d1d'}}>
                  ⚠ AI-generated first pass. All SCE designations and Performance Standards must be validated by a competent engineer against the engineering Design Basis, applicable regulations (UKCS DCR, PFEER; API 14C; ISO 14224) and SIL/LOPA study results before use.
                </div>

                {sceData.sces.map((sce,si)=>(
                  <div key={si} style={{marginBottom:16,background:'var(--bg-card)',borderRadius:8,
                    border:'2px solid #ef444466',overflow:'hidden'}}>
                    <div style={{padding:'10px 14px',background:'#2d0a0a',borderBottom:'1px solid #7f1d1d',
                      display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
                      <div>
                        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'#ef4444',fontWeight:700}}>{sce.sceId}</div>
                        <div style={{fontSize:13,fontWeight:700,color:'#fca5a5',marginTop:2}}>{sce.designation}</div>
                        <div style={{fontSize:11,color:'#fca5a5aa',marginTop:3}}>{sce.function}</div>
                      </div>
                      <div style={{textAlign:'right',fontSize:10,color:'#f59e0b',flexShrink:0}}>
                        <div style={{fontWeight:600}}>{sce.performanceStandard}</div>
                        <div style={{color:'var(--text3)',marginTop:2}}>MAE: {sce.maeScenario?.substring(0,50)}</div>
                      </div>
                    </div>
                    <div style={{padding:'10px 14px'}}>
                      <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>
                        Safety Critical Tasks ({(sce.scts||[]).length})
                      </div>
                      <table className="tbl" style={{fontSize:11,width:'100%'}}>
                        <thead><tr>
                          <th style={{width:80}}>SCT ID</th><th>Task</th><th style={{width:55}}>Type</th>
                          <th style={{width:80}}>Frequency</th><th style={{width:100}}>Responsible</th>
                          <th style={{width:120}}>Competency</th><th style={{width:80}}>Procedure</th>
                        </tr></thead>
                        <tbody>
                          {(sce.scts||[]).map((t,ti)=>(
                            <tr key={ti}>
                              <td style={{fontFamily:'var(--mono)',color:'var(--accent)',fontSize:10}}>{t.sctId}</td>
                              <td style={{color:'var(--text1)'}}>{t.task}</td>
                              <td style={{color:'var(--text3)',fontSize:10}}>{t.type}</td>
                              <td style={{color:'#f59e0b',fontWeight:600}}>{t.frequency}</td>
                              <td style={{color:'var(--text2)'}}>{t.responsible}</td>
                              <td style={{color:'var(--text3)',fontSize:10}}>{t.competency}</td>
                              <td style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)'}}>{t.procedure}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Barrier Editor Right Panel */}
      {editingBarrier&&(
        <BarrierEditorPanel
          barrier={editingBarrier}
          onUpdate={updateBarrier}
          onClose={()=>setEditingBarrierId(null)}/>
      )}
    </div>
  );
};

const App=()=>{
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('hazop_api_key')||'');
  const [aiModel,setAiModel]=useState(()=>localStorage.getItem('hazop_ai_model')||'claude-3-haiku-20240307');
  const [showApi,setShowApi]=useState(false);
  const [view,setView]=useState('setup');
  const [study,setStudy]=useState(INIT_STUDY);
  const [appState,setAppState]=useState({nodes:[],deviations:[],bowties:{},activeNodeId:null,activeDevId:null,isGenerating:false});

  useEffect(()=>{localStorage.setItem('hazop_api_key',apiKey);},[apiKey]);
  useEffect(()=>{localStorage.setItem('hazop_ai_model',aiModel);},[aiModel]);

  useEffect(()=>{
    const saved=localStorage.getItem('hazop_study_data');
    if(saved){try{const d=JSON.parse(saved);setStudy(d.study||INIT_STUDY);setAppState(s=>({...s,nodes:d.nodes||[],deviations:d.deviations||[],bowties:d.bowties||{}}));}catch(e){}}
  },[]);
  useEffect(()=>{
    localStorage.setItem('hazop_study_data',JSON.stringify({study,nodes:appState.nodes,deviations:appState.deviations,bowties:appState.bowties}));
  },[study,appState.nodes,appState.deviations]);

  const nodeCount=appState.nodes.length;
  const devCount=appState.deviations.length;
  const allCauses=appState.deviations.flatMap(d=>normalizeDev(d).causes||[]);
  const highCount=allCauses.filter(c=>c.initialRisk&&[1,2].includes(c.initialRisk.cat)).length;
  const openCount=appState.deviations.filter(d=>d.status==='Open').length;

  const clearAll=()=>{if(window.confirm('Clear all study data? This cannot be undone.')){setStudy(INIT_STUDY);setAppState({nodes:[],deviations:[],activeNodeId:null,activeDevId:null,isGenerating:false});localStorage.removeItem('hazop_study_data');}};

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <div className="hdr">
        <div className="logo">Risk2Safe <span>HAZoP</span></div>
        <div className="hdr-study">{study.projectName||'New Study'} · {study.facility||'No facility'} · Rev {study.revision}</div>
        <div className="hdr-right" style={{gap:6}}>
          {highCount>0&&<span className="badge badge-hi">⚠ {highCount} HIGH</span>}
          {openCount>0&&<span className="badge badge-hi2">{openCount} OPEN</span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowApi(s=>!s)} title="API Settings">⚙ API</button>
          <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={clearAll} title="Clear all data">⟳ Reset</button>
        </div>
      </div>

      {showApi&&(
        <div className="api-bar" style={{flexWrap:'wrap',gap:8}}>
          <span style={{fontSize:12,color:'var(--accent)',fontWeight:600,whiteSpace:'nowrap'}}>🔑 API Key:</span>
          <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-api03-…" style={{width:300,fontFamily:'var(--mono)',fontSize:12}}/>
          <span style={{fontSize:12,color:'var(--accent)',fontWeight:600,whiteSpace:'nowrap',marginLeft:8}}>🤖 Model:</span>
          <select value={aiModel} onChange={e=>setAiModel(e.target.value)} style={{fontSize:12,fontFamily:'var(--mono)',background:'#1c0f02',borderColor:'#92400e',color:'var(--accent2)',width:240}}>
            <option value="claude-3-haiku-20240307">Claude 3 Haiku — Fast &amp; reliable</option>
            <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku — Smarter</option>
            <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet — Best quality</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 — Latest fast</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6 — Latest balanced</option>
            <option value="claude-opus-4-6">Claude Opus 4.6 — Latest powerful</option>
          </select>
          {!apiKey&&<span style={{fontSize:11,color:'var(--red)',fontWeight:600}}>⚠ Key required</span>}
          {apiKey&&!apiKey.startsWith('sk-ant')&&<span style={{fontSize:11,color:'var(--red)',fontWeight:600}}>⚠ Should start with sk-ant-…</span>}
          {apiKey&&apiKey.startsWith('sk-ant')&&<span style={{fontSize:11,color:'var(--green)',fontWeight:600}}>✓ Key valid</span>}
          <button style={{marginLeft:'auto',fontSize:12,color:'var(--accent)',cursor:'pointer',background:'none',border:'none'}} onClick={()=>setShowApi(false)}>✕ Close</button>
        </div>
      )}

      <div className="nav">
        {[
          {id:'setup',label:'Study Setup'},
          {id:'nodes',label:'Nodes',count:nodeCount},
          {id:'worksheet',label:'Worksheet',count:devCount},
          {id:'matrix',label:'Risk Matrix'},
          {id:'actions',label:'Actions'},
          {id:'report',label:'Report'},
          {id:'bowtie',label:'🎯 Bow Tie'}
        ].map(({id,label,count})=>(
          <button key={id} className={`nav-btn ${view===id?'active':''}`} onClick={()=>setView(id)}>
            {label}
            {count>0&&<span className="nav-count">{count}</span>}
          </button>
        ))}
      </div>

      <div className="main" style={{flex:1,overflow:'hidden'}}>
        <div className="content" style={{overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {view==='setup'&&<SetupView study={study} setStudy={setStudy}/>}
          {view==='nodes'&&<NodesView nodes={appState.nodes} setNodes={nodes=>setAppState(s=>({...s,nodes}))}/>}
          {view==='worksheet'&&<WorksheetView state={appState} setState={setAppState} apiKey={apiKey} aiModel={aiModel}/>}
          {view==='matrix'&&<MatrixView deviations={appState.deviations} nodes={appState.nodes}/>}
          {view==='actions'&&<ActionsView deviations={appState.deviations} nodes={appState.nodes} setState={setAppState}/>}
          {view==='report'&&<ReportView study={study} nodes={appState.nodes} deviations={appState.deviations}/>}
          {view==='bowtie'&&<BowTieView state={appState} setState={setAppState} apiKey={apiKey} aiModel={aiModel}/>}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
