<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import Anthropic from 'https://esm.sh/@anthropic-ai/sdk@0.36.3';
  window._Anthropic = Anthropic;
  window._anthropicReady = true;
  console.log('[Risk2Safe] Anthropic SDK ready');
</script>
<script>
  window._anthropicReady = window._anthropicReady || false;
  window.callAnthropicAPI = async function(apiKey, model, systemPrompt, userPrompt) {
    let waited = 0;
    while (!window._anthropicReady && waited < 8000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    if (!window._Anthropic) throw new Error('Anthropic SDK failed to load. Check internet connection and try refreshing.');
    if (!apiKey || !apiKey.trim().startsWith('sk-ant')) throw new Error('Invalid or missing API key. Click "API" in the header and enter your key (starts with sk-ant-...).');
    const client = new window._Anthropic({ apiKey: apiKey.trim(), dangerouslyAllowBrowser: true });
    const message = await client.messages.create({
      model: model,
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    });
    return message.content[0].text;
  };
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  --bg-surface:#0e1b2e;

  --bg-card2:#1c2d45;

  --red:#ef4444;

  --text2:#94a3b8;

select option{background:var(--bg-card)}

label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase}

::-webkit-scrollbar-track{background:var(--bg-surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.scrollable{overflow-y:auto;min-height:0;min-width:0}
/* TOP BAR (was missing — App renders className="topbar") */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 20px;height:52px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
/* HEADER */
.hdr{display:flex;align-items:center;gap:16px;padding:0 20px;height:52px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}

.hdr-study{font-size:12px;color:var(--text2);font-family:var(--mono);border-left:1px solid var(--border);padding-left:16px;margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.badge-hi{background:#7f1d1d;color:#fca5a5}
.badge-hi2{background:#7c2d12;color:#fdba74}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:240px;flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* SECTION HEADER */

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-weight:500;transition:all 0.15s;white-space:nowrap;font-size:13px}
.btn-primary{background:var(--accent);color:#000;font-weight:600}
.btn-primary:hover{background:var(--accent2)}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px}

.matrix-grid{display:grid;grid-template-columns:66px repeat(6,1fr);gap:2px}
.matrix-cell{display:flex;align-items:center;justify-content:center;padding:5px 3px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);text-align:center;cursor:default;transition:all 0.15s;border:1px solid transparent;user-select:none;min-height:40px}
.matrix-cell.clickable{cursor:pointer}

.matrix-header{background:var(--bg-card2);color:var(--text2);font-size:10px;font-weight:600;border-radius:4px;border:1px solid var(--border);padding:4px 2px}
.risk-1{background:#7f1d1d;color:#fca5a5}
.risk-2{background:#7c2d12;color:#fdba74}
.risk-3{background:#713f12;color:#fde68a}
.risk-4{background:#14532d;color:#86efac}
/* WORKSHEET */
.dev-list-item{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;display:flex;flex-direction:column;gap:4px}
.dev-list-item:hover{background:var(--bg-hover)}
.dev-list-item.active{background:var(--bg-hover);border-left:3px solid var(--accent)}
.dev-tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg-card2);color:var(--text2);display:inline-block}
.dev-tag-gw{background:#1a2d50;color:#93c5fd}
/* STATUS */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg-surface)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
.tbl tr:hover td{background:var(--bg-hover)}
/* API KEY */
.api-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--accent-dim);border-bottom:1px solid #92400e;flex-shrink:0}
.api-bar input{background:#1c0f02;border-color:#92400e;color:var(--accent2);font-family:var(--mono);font-size:12px;width:360px}
/* GENERATING */
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* COVERAGE MATRIX (IEC 61882 completeness check) */
.cov-cell{display:flex;align-items:center;justify-content:center;min-height:26px;border-radius:3px;font-size:9px;font-weight:700;font-family:var(--mono);border:1px solid var(--border)}
/* REPORT */
@media print{
  .nav,.hdr,.topbar,.api-bar,.btn,.sidebar{display:none!important}
  body{background:#fff;color:#000}
  .content{overflow:visible!important}
  .report-page{padding:20px!important}
}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--text3);text-align:center}
.empty-icon{font-size:48px;opacity:0.4}
.divider{height:1px;background:var(--border);margin:12px 0}
.tooltip{position:relative}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0f1e33;color:var(--text1);padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none;border:1px solid var(--border2);z-index:100}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect,useMemo}=React;

/* ─── CONSTANTS ─────────────────────────────────────── */
const GUIDE_WORDS=['NO / NONE','MORE','LESS','AS WELL AS','PART OF','REVERSE','OTHER THAN','EARLY','LATE'];
const PARAMETERS=['FLOW','PRESSURE','TEMPERATURE','LEVEL','COMPOSITION','CONCENTRATION','PHASE','VISCOSITY','REACTION RATE','AGITATION / MIXING','SEQUENCE','SIGNAL / CONTROL','UTILITY / SERVICE','TIME'];
const REC_STATUSES=['Open','In Progress','Closed','Rejected'];
const SNAMES={1:'Notable',2:'Minor',3:'Serious',4:'Major',5:'Catastrophic',6:'Disastrous'};
const SDESC={1:'Slight injuries, short-term effects, near miss',2:'Minor injuries, reversible effects, first aid',3:'Serious injuries, RIDDOR reportable, LTI',4:'Single fatality or permanent total disability',5:'Multiple fatalities (2-10), major asset damage',6:'Multiple fatalities (>10), catastrophic damage, business continuity impact'};
const LNAMES={A:'Term',B:'Rare',C:'Unlikely',D:'Possible',E:'Likely',F:'Almost Certain'};
const LDESC={A:"Hasn't happened in industry in last 50 years (10⁻⁶ - 10⁻⁵ /yr)",B:'Could happen in industry next 20-30 years (10⁻⁵ - 10⁻⁴ /yr)',C:'Could be incurred within a 5-10 year time frame (10⁻⁴ - 10⁻³ /yr)',D:'Could be incurred within 5 year Strategic Planning period (10⁻³ - 10⁻² /yr)',E:'Could be incurred more than once per year budget period (10⁻² - 10⁻¹ /yr)',F:'Could be incurred more than once on site (10⁻¹ - 1 /yr)'};

/* Full severity impact table */
const SDETAIL={
  6:{people:'Multiple fatalities (>10) / Widespread permanent disabilities',asset:'>= $1 Billion / Catastrophic asset loss',env:'Catastrophic irreversible environmental damage, exceeding all limits, persistent contamination',rep:'Prolonged international impact on company and industry; potential licence revocation'},
  5:{people:'Multiple fatalities (2-10) / Multiple permanent total disabilities',asset:'$100M to <$1B / Major asset destruction, extended production loss',env:'Disastrous environmental impact beyond site, serious long-term damage',rep:'Serious adverse international media coverage; prolonged reputational impact on Group'},
  4:{people:'Single worker fatality OR permanent total disability / Serious injury to public',asset:'$10M to <$100M / Significant plant damage, long shutdown',env:'Major impact on surrounding environment; repeated non-compliance with regulations',rep:'Significant national media attention; potential prosecution, regulatory sanctions'},
  3:{people:'Serious injuries requiring hospitalisation / Reversible partial disability / RIDDOR reportable',asset:'$1M to <$10M / Equipment damage requiring major repair, production loss',env:'Local environmental effect; non-repeated breach of regulatory limits',rep:'Considerable local media/government attention; moderate fines or regulatory action'},
  2:{people:'Minor injuries (first aid / RIDDOR near miss) / Temporary health effects',asset:'$100K to <$1M / Minor asset damage, short-term production impact',env:'Minor, recoverable environmental effects within site boundary',rep:'Limited local media impact; minor regulatory notification or warning'},
  1:{people:'Slight injuries / Near miss / Short-term health effects / No lost time',asset:'< $100K / Negligible damage, minimal operational impact',env:'Slight, contained environmental effects within fence area; no off-site impact',rep:'No public concern; slight internal or regulatory notice only'}
};

/* Full likelihood table */
const LDETAIL={
  F:{qualitative:'Frequent / Almost Certain',frequency:'10⁻¹ to 1 per year',hseLikelihood:'Has occurred more than once on the site',ermCriteria:'Could be incurred more than once on the site next year'},
  E:{qualitative:'Probable / Likely',frequency:'10⁻² to 10⁻¹ per year',hseLikelihood:'Has occurred more than once per year budget period (at Company or on site)',ermCriteria:'Could be incurred more than once within year budget period'},
  D:{qualitative:'Occasional / Possible',frequency:'10⁻³ to 10⁻² per year',hseLikelihood:'Has occurred more than once in Group Company, but not on the site',ermCriteria:'Could be incurred within the 5-year Strategic Planning period'},
  C:{qualitative:'Remote / Unlikely',frequency:'10⁻⁴ to 10⁻³ per year',hseLikelihood:'Has occurred at least once in the Group Company but not on the site',ermCriteria:'Could be incurred within a 5-10 year time frame'},
  B:{qualitative:'Improbable / Rare',frequency:'10⁻⁵ to 10⁻⁴ per year',hseLikelihood:'Has occurred in world-wide industry but not in the Group',ermCriteria:'Could happen somewhere in industry in the next 20-30 years'},
  A:{qualitative:'Incredible / Term',frequency:'10⁻⁶ to 10⁻⁵ per year',hseLikelihood:'Has not occurred in world-wide industry in the last 50 years',ermCriteria:"Hasn't happened in industry in last 50 years"}
};

// Corporate 6×6 Risk Matrix — Category 1=HIGH-RED, 2=HIGH-ORG, 3=MEDIUM, 4=LOW
const RMATRIX={
  6:{A:2,B:2,C:1,D:1,E:1,F:1},
  5:{A:2,B:2,C:2,D:1,E:1,F:1},
  4:{A:3,B:3,C:2,D:2,E:1,F:1},
  3:{A:4,B:3,C:3,D:2,E:2,F:1},
  2:{A:4,B:4,C:3,D:3,E:2,F:2},
  1:{A:4,B:4,C:4,D:3,E:3,F:2}
};
const RDISP={
  1:{label:'HIGH',cat:'CAT 1',cls:'risk-1',badge:'badge-hi',txt:'#fca5a5',color:'#fca5a5',sign:'Director / GC CEO sign-off. ALARP required.'},
  2:{label:'HIGH',cat:'CAT 2',cls:'risk-2',badge:'badge-hi2',txt:'#fdba74',color:'#fdba74',sign:'Unit Manager / SVP sign-off. ALARP required.'},
  3:{label:'MEDIUM',cat:'CAT 3',cls:'risk-3',badge:'badge-med',txt:'#fde68a',color:'#fde68a',sign:'Dept Manager / VP sign-off. Monitor & control.'},
  4:{label:'LOW',cat:'CAT 4',cls:'risk-4',badge:'badge-lo',txt:'#86efac',color:'#86efac',sign:'Line Manager sign-off. Monitor current controls.'}
};

const getRisk=(s,l)=>s&&l?RMATRIX[s]?.[l]||null:null;
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().split('T')[0];
const requireKey=()=>{
  if(!window._R2S?.key){alert('Anthropic API key not set. Click "⚙ API" in the header and enter your key (starts with sk-ant-...).');return false;}
  return true;
};

/* ─── COMPONENTS ─────────────────────────────────────── */
const RiskBadge=({cat,small})=>{
  if(!cat)return<span className="badge badge-none" style={{fontSize:small?10:12}}>—</span>;
  const d=RDISP[cat];
  return<span className={`badge ${d.badge}`} style={{fontSize:small?10:12}}>{d.label} · {d.cat}</span>;
};

const MatrixPicker=({sel,onPick,label})=>{
  const rows=[6,5,4,3,2,1];
  const cols=['A','B','C','D','E','F'];
  return(
    <div>
      {label&&<div style={{fontSize:12,color:'var(--text2)',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:8}}>{label}</div>}
      <div className="matrix-grid" style={{gap:3}}>
        <div className="matrix-cell matrix-header" style={{fontSize:10}}>S / L</div>
        {cols.map(c=>(
          <div key={c} className="matrix-cell matrix-header" data-tip={LNAMES[c]} title={LNAMES[c]}>
            {c}<br/><span style={{fontWeight:400,fontSize:9,color:'var(--text3)'}}>{LNAMES[c]}</span>
          </div>
        ))}
        {rows.map(s=>(
          <React.Fragment key={s}>
            <div className="matrix-cell matrix-header" style={{flexDirection:'column',gap:1,fontSize:10}} title={SDESC[s]}>
              <strong>S{s}</strong><span style={{fontSize:8,fontWeight:400,color:'var(--text3)'}}>{SNAMES[s]}</span>
            </div>
            {cols.map(l=>{
              const cat=RMATRIX[s][l];
              const isSel=sel&&sel.s===s&&sel.l===l;
              return(
                <div key={l}
                  className={`matrix-cell clickable ${RDISP[cat].cls} ${isSel?'selected':''}`}
                  style={{flexDirection:'column',gap:1,fontSize:10}}
                  onClick={()=>onPick({s,l,cat})}
                  title={`S${s}/${l} — ${RDISP[cat].label} (${RDISP[cat].cat})\nSeverity: ${SNAMES[s]}\nLikelihood: ${LNAMES[l]}`}
                >
                  <strong>{s}{l}</strong>
                </div>
              );
            })}
          </React.Fragment>
        ))}
      </div>
      {sel&&(
        <div style={{marginTop:8,padding:'8px 10px',background:'var(--bg-card2)',borderRadius:6,border:'1px solid var(--border)',fontSize:12}}>
          <span style={{color:'var(--text2)'}}>Selected: </span>
          <strong style={{color:'var(--accent)',fontFamily:'var(--mono)'}}>S{sel.s}/{sel.l}</strong>
          <span style={{margin:'0 8px',color:'var(--text3)'}}>|</span>
          <RiskBadge cat={sel.cat} small/>
          <div style={{color:'var(--text2)',marginTop:4}}>{RDISP[sel.cat].sign}</div>
        </div>
      )}
    </div>
  );
};

/* ─── VIEWS ──────────────────────────────────────────── */

// SETUP VIEW
const SetupView=({study,setStudy})=>{
  const upd=(k,v)=>setStudy(s=>({...s,[k]:v}));
  const [newMember,setNewMember]=useState({name:'',role:'',dept:''});
  const addMember=()=>{
    if(!newMember.name.trim())return;
    setStudy(s=>({...s,teamMembers:[...s.teamMembers,{...newMember,id:uid()}]}));
    setNewMember({name:'',role:'',dept:''});
  };
  const delMember=id=>setStudy(s=>({...s,teamMembers:s.teamMembers.filter(m=>m.id!==id)}));

  /* ── Session log (IEC 61882: record of sessions & attendance) ── */
  const sessions=Array.isArray(study.sessions)?study.sessions:[];
  const [newSession,setNewSession]=useState({date:today(),duration:'',attendees:'',nodesCovered:'',notes:''});
  const addSession=()=>{
    if(!newSession.date)return;
    setStudy(s=>({...s,sessions:[...(s.sessions||[]),{...newSession,id:uid()}]}));
    setNewSession({date:today(),duration:'',attendees:'',nodesCovered:'',notes:''});
  };
  const delSession=id=>setStudy(s=>({...s,sessions:(s.sessions||[]).filter(x=>x.id!==id)}));

  /* ── Document upload helpers ── */
  const docs=Array.isArray(study.documents)?study.documents:[];
  const fmtSize=b=>b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';
  const fileIcon=t=>t?.includes('pdf')?'📄':t?.includes('image')?'🖼':t?.includes('dwg')||t?.includes('dxf')?'📐':'📎';
  const handleUpload=e=>{
    Array.from(e.target.files).forEach(file=>{
      if(file.size>15*1024*1024){alert('File "'+file.name+'" exceeds 15 MB limit — please compress or split.');return;}
      const reader=new FileReader();
      reader.onload=ev=>setStudy(s=>({...s,documents:[...(Array.isArray(s.documents)?s.documents:[]),{id:uid(),name:file.name,type:file.type,size:file.size,data:ev.target.result,uploadedAt:new Date().toISOString()}]}));
      reader.readAsDataURL(file);
    });
    e.target.value='';
  };
  const downloadDoc=doc=>{
    const a=document.createElement('a');
    a.href=doc.data;a.download=doc.name;a.click();
  };

// ── DATA NORMALIZATION ────────────────────────────────────────────────
const normalizeRec=r=>typeof r==='string'?{id:uid(),text:r,actionOwner:'',targetDate:'',status:'Open',degradationFactors:[]}:{id:uid(),text:'',actionOwner:'',targetDate:'',status:'Open',degradationFactors:[],...r};
const normalizeDev=dev=>{
  if(!dev)return dev;
  const normRecs=arr=>(Array.isArray(arr)?arr:[]).map(normalizeRec);
  const old=dev;
  if(Array.isArray(old.causes))return{...old,causes:old.causes.map(c=>({
    id:uid(),text:'',recommendations:[],initialRisk:null,residualRisk:null,...c,
    consequences:(c.consequences||[]).map(cn=>({
      id:uid(),text:'',safeguards:[],recommendations:[],mitigationBarriers:[],...cn,
      safeguards:(Array.isArray(cn.safeguards)?cn.safeguards:(cn.safeguard?[cn.safeguard]:[])).map(s=>
        typeof s==='string'?{id:uid(),text:s,degradationFactors:[]}:{id:uid(),degradationFactors:[],...s}
      ),
      recommendations:normRecs(cn.recommendations),
      mitigationBarriers:Array.isArray(cn.mitigationBarriers)?cn.mitigationBarriers.map(m=>({
        id:uid(),text:'',type:'Engineering',degradationFactors:[],...m
      })):[]
    })),
    recommendations:normRecs(c.recommendations)
  }))};
  // legacy flat format — pair causes with consequences by index, then append any leftover consequences
  const ocon=Array.isArray(old.consequences)?old.consequences:[];
  const osg=Array.isArray(old.safeguards)?old.safeguards:[];
  const ocause=Array.isArray(old.causes_text)?old.causes_text:old.cause?[old.cause]:[];
  const mkCon=(text,i)=>({id:uid(),text,safeguards:i<osg.length&&osg[i]?[{id:uid(),text:osg[i],degradationFactors:[]}]:[],recommendations:[],mitigationBarriers:[]});
  const newCauses=ocause.map((ct,ci)=>({
    id:uid(),text:ct,recommendations:[],initialRisk:null,residualRisk:null,
    consequences:ci<ocon.length?[mkCon(ocon[ci],ci)]:[]
  }));
  // leftover consequences (more consequences than causes) attach once to the last cause,
  // or to a placeholder cause if there were no causes at all
  if(ocon.length>ocause.length){
    if(newCauses.length===0)newCauses.push({id:uid(),text:'',recommendations:[],initialRisk:null,residualRisk:null,consequences:[]});
    for(let i=ocause.length;i<ocon.length;i++)
      newCauses[newCauses.length-1].consequences.push(mkCon(ocon[i],i));
  }
  return{...old,causes:newCauses};
};

/* ── JSON repair utility ── */
const repairJSON=(raw)=>{
  let s=(raw||'').replace(/```json|```/g,'').trim();
  const m=s.match(/\{[\s\S]*\}/);
  if(m)s=m[0];
  try{return JSON.parse(s);}catch(e){}
  s=s.replace(/,\s*([}\]])/g,'$1').replace(/([{,])\s*([a-zA-Z_$][a-zA-Z0-9_$]*)\s*:/g,'$1"$2":');
  try{return JSON.parse(s);}catch(e){}
  const opens=(s.match(/\[/g)||[]).length-(s.match(/\]/g)||[]).length;
  const braces=(s.match(/\{/g)||[]).length-(s.match(/\}/g)||[]).length;
  s=s.replace(/,?\s*"[^"]*$/,'').replace(/,?\s*\{[^}]*$/,'');
  for(let i=0;i<opens;i++)s+=']';
  for(let i=0;i<braces;i++)s+='}';
  try{return JSON.parse(s);}catch(e){throw new Error('Could not parse AI response. Try again.');}
};

  const usr='Barrier: '+barrierText+
    '\nProcess context: Node='+ctx.nodeName+' | Deviation='+ctx.deviation+' | Fluid='+ctx.fluid+
    (existing?'\nAlready identified: '+existing:'')+
    '\n\nIdentify 2-3 degradation factors for this barrier and 1-2 degradation controls per factor.'+
    '\nJSON: {"degradationFactors":[{"text":"DF text","controls":[{"text":"Control text"}]}]}';
  try{
    const raw=await window.callAnthropicAPI(ctx.key,ctx.model,sys,usr);
    const parsed=repairJSON(raw);
    return(parsed.degradationFactors||[]).map(df=>({
      id:uid(),text:df.text||'',
      controls:(df.controls||[]).map(c=>({id:uid(),text:typeof c==='string'?c:(c.text||'')}))
    }));
  }catch(e){alert('AI suggestion failed: '+(e.message||'unknown error'));return[];}
};

/* ── AI suggest recommendations (cause + consequence context) ── */
const suggestRecsAI=async(causeText,conText,sgTexts,existingRecs)=>{
  const ctx=window._R2S||{};
  if(!requireKey())return[];
  const existing=(existingRecs||[]).map(r=>typeof r==='string'?r:(r.text||'')).filter(Boolean).join('; ');
  const sgs=(sgTexts||[]).filter(Boolean).join('; ');
  const sys='You are a HAZOP process safety engineer. Suggest specific, actionable recommendations. Return only valid compact JSON.';
  const usr='HAZOP Study Context:'+
    '\nNode: '+ctx.nodeName+'\nDeviation: '+ctx.deviation+
    '\nCause: '+causeText+'\nConsequence: '+conText+
    (sgs?'\nExisting safeguards: '+sgs:'')+
    (existing?'\nAlready recommended: '+existing:'')+
    '\n\nSuggest 3-4 specific, actionable recommendations to address this cause/consequence.'+
    '\nEach must be specific, measurable, and assignable to a discipline.'+
    '\nJSON: {"recommendations":[{"text":"Specific recommendation","actionOwner":"Engineering/Operations/HSE/Inspection"}]}';
  try{
    const raw=await window.callAnthropicAPI(ctx.key,ctx.model,sys,usr);
    const parsed=repairJSON(raw);
    return(parsed.recommendations||[]).map(r=>({
      id:uid(),text:r.text||'',actionOwner:r.actionOwner||'',targetDate:'',status:'Open'
    }));
  }catch(e){alert('AI suggestion failed: '+(e.message||'unknown error'));return[];}
};

/* ── Degradation Factor + Control editor ── */
const DegradationEditor=({factors,onChange})=>{

  const updFactor=(i,val)=>onChange(factors.map((f,j)=>j===i?{...f,...val}:f));
  const addCtrl=(fi)=>updFactor(fi,{controls:[...factors[fi].controls,{id:uid(),text:''}]});
  const delCtrl=(fi,ci)=>updFactor(fi,{controls:factors[fi].controls.filter((_,j)=>j!==ci)});
  const updCtrl=(fi,ci,txt)=>updFactor(fi,{controls:factors[fi].controls.map((c,j)=>j===ci?{...c,text:txt}:c)});
  return(
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {factors.map((f,fi)=>(
        <div key={f.id} style={{background:'#150c00',borderRadius:6,border:'1px solid #f59e0b44',padding:'8px 10px'}}>

            <button onClick={()=>delFactor(fi)} style={{fontSize:10,color:'#ef4444',background:'none',border:'none',cursor:'pointer',padding:'0 3px'}}>✕</button>
          </div>
          <div style={{paddingLeft:24}}>
            {f.controls.map((c,ci)=>(
              <div key={c.id} style={{display:'flex',gap:5,marginBottom:3}}>
                <span style={{color:'#22c55e',fontSize:10,flexShrink:0,marginTop:5}}>→</span>
                <input value={c.text} onChange={e=>updCtrl(fi,ci,e.target.value)}

  );
};

  const [adding,setAdding]=useState(false);
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <span style={{fontSize:10,color:color||'#3b82f6',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>{label} ({recs.length})</span>
        <button onClick={()=>setAdding(true)} style={{fontSize:10,padding:'2px 8px',borderRadius:3,cursor:'pointer',background:'transparent',color:color||'#3b82f6',border:'1px solid '+(color||'#3b82f6')+'44',fontWeight:600}}>+ Add</button>
      </div>
      {recs.length===0&&!adding&&<div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>{emptyMsg||'None yet'} — click <strong style={{fontStyle:'normal'}}>+ Add</strong></div>}
      {recs.map((r,i)=><RecEntry key={r.id||i} rec={r} onEdit={u=>onEdit(i,u)} onDel={()=>onDel(i)}/>)}
      {adding&&(
        <div style={{padding:'8px 10px',background:'var(--bg-card)',borderRadius:5,border:'1px solid var(--border)',marginTop:4}}>
          <textarea value={draft.text} onChange={e=>setDraft(d=>({...d,text:e.target.value}))} rows={2} placeholder="Recommendation text…" style={{fontSize:12,width:'100%',marginBottom:6,resize:'vertical'}}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:6}}>
            <input value={draft.actionOwner} onChange={e=>setDraft(d=>({...d,actionOwner:e.target.value}))} placeholder="Action Owner" style={{fontSize:11,padding:'4px 7px'}}/>
            <input type="date" value={draft.targetDate} onChange={e=>setDraft(d=>({...d,targetDate:e.target.value}))} style={{fontSize:11,padding:'4px 7px'}}/>
            <select value={draft.status} onChange={e=>setDraft(d=>({...d,status:e.target.value}))} style={{fontSize:11,padding:'4px 7px'}}>
              {REC_STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={()=>{if(draft.text.trim()){onAdd({...draft,id:uid()});setDraft({text:'',actionOwner:'',targetDate:'',status:'Open'});setAdding(false);}}} style={{fontSize:11,padding:'4px 12px',borderRadius:4,cursor:'pointer',background:'var(--accent)',color:'#000',fontWeight:700,border:'none'}}>✓ Add</button>
            <button onClick={()=>setAdding(false)} style={{fontSize:11,padding:'4px 12px',borderRadius:4,cursor:'pointer',background:'transparent',color:'var(--text2)',border:'1px solid var(--border)'}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── InlineEdit ── */
const InlineEdit=({value,onChange,placeholder,multiline,style,textStyle})=>{
  const [edit,setEdit]=useState(false);
  const [v,setV]=useState(value||'');
  useEffect(()=>setV(value||''),[value]);
  if(edit){
    const props={value:v,onChange:e=>setV(e.target.value),autoFocus:true,
      onBlur:()=>{onChange(v);setEdit(false);},
      onKeyDown:e=>{if(!multiline&&e.key==='Enter'){onChange(v);setEdit(false);}if(e.key==='Escape')setEdit(false);},
      style:{fontSize:12,resize:'vertical',width:'100%',...textStyle}};
    return multiline?<textarea {...props} rows={2}/>:<input {...props}/>;
  }
  return(
    <div onClick={()=>setEdit(true)} style={{cursor:'text',fontSize:12,color:v?'var(--text1)':'var(--text3)',fontStyle:v?'normal':'italic',lineHeight:1.4,...style,...textStyle}}>
      {v||placeholder||'Click to edit…'}
    </div>
  );
};

// ── Consequence block ─────────────────────────────────────────────────
const ConBlock=({con,conIdx,causeIdx,devIdx,devId,cid,onUpdate,onDelete,onSgAdd,onSgDel,onSgUpdate,onRecAdd,onRecEdit,onRecDel,onMitUpdate,devSafeguards,devRecs,causeText})=>{
  const safeguards=Array.isArray(con.safeguards)?con.safeguards:(con.safeguard?[{id:'sg0',text:con.safeguard,degradationFactors:[]}]:[]);
  const recs=Array.isArray(con.recommendations)?con.recommendations:[];
  const mitBs=Array.isArray(con.mitigationBarriers)?con.mitigationBarriers:[];
  const ref='C'+(causeIdx+1)+'.'+(conIdx+1);
  const [recsAiLoading,setRecsAiLoading]=useState(false);
  const suggestRecs=async()=>{
    setRecsAiLoading(true);
    const sgTexts=safeguards.map(s=>typeof s==='string'?s:(s?.text||'')).filter(Boolean);
    const newRecs=await suggestRecsAI(causeText||'',con.text||'',sgTexts,recs);
    newRecs.forEach(r=>onRecAdd(devId,cid,con.id,r));
    setRecsAiLoading(false);
  };
  const conSgUpdateRef=(devId,cid,conId,sgId,updated)=>{if(onSgUpdate)onSgUpdate(devId,cid,conId,sgId,updated);};

  // Safeguards from other consequences (for picker), excluding ones already added here
  const existingSgTexts=new Set(safeguards.map(s=>(s.text||'').trim().toLowerCase()));
  const pickerSgs=(devSafeguards||[]).filter(s=>s.text&&!existingSgTexts.has(s.text.trim().toLowerCase()));
  // Recs from other consequences for picker
  const existingRecTexts=new Set(recs.map(r=>(r.text||'').trim().toLowerCase()));
  const pickerRecs=(devRecs||[]).filter(r=>r.text&&!existingRecTexts.has(r.text.trim().toLowerCase()));
  // Detect shared safeguards (same text in other consequences)
  const sharedSgTexts=new Set((devSafeguards||[]).map(s=>(s.text||'').trim().toLowerCase()).filter(Boolean));

  return(
    <div style={{marginBottom:8,borderRadius:8,overflow:'hidden',border:'1px solid #ef444444',background:'var(--bg-surface)'}}>
      <div style={{display:'flex',gap:8,padding:'8px 12px',background:'#1a0505',alignItems:'flex-start',borderBottom:'1px solid #7f1d1d'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:'#ef4444',fontWeight:700,flexShrink:0,marginTop:1,background:'#450a0a',padding:'2px 6px',borderRadius:3}}>{ref}</span>
        <textarea value={con.text||''} onChange={e=>onUpdate(devId,cid,con.id,{text:e.target.value})}
          placeholder="Describe the consequence…" rows={2}
          style={{flex:1,fontSize:12,resize:'vertical',background:'transparent',border:'none',color:'var(--text1)',outline:'none',padding:0,lineHeight:1.5}}/>
        <button onClick={()=>onDelete(devId,cid,con.id)} style={{width:20,height:20,borderRadius:3,cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color:'#ef4444',border:'1px solid #ef444455',flexShrink:0,marginTop:1}}>✕</button>
      </div>

      {/* ── Safeguards section ── */}
      <div style={{padding:'8px 12px',background:'#071408',borderBottom:'1px solid #1a3324'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{color:'#22c55e',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>
            🛡 Safeguards <span style={{marginLeft:5,fontFamily:'var(--mono)',fontWeight:400,color:'var(--text3)',fontSize:9}}>({safeguards.length})</span>
          </span>
          <div style={{display:'flex',gap:5}}>
            {pickerSgs.length>0&&(
              <select onChange={e=>{
                  if(!e.target.value)return;
                  const picked=devSafeguards.find(s=>s.id===e.target.value);
                  if(picked)onSgAdd(devId,cid,con.id,{...picked,id:uid()});
                  e.target.value='';
                }}
                style={{fontSize:10,padding:'2px 4px',borderRadius:3,cursor:'pointer',
                  background:'#0a1f0a',color:'#86efac',border:'1px solid #22c55e44',maxWidth:180}}
                title="Re-use an existing safeguard from this deviation (DFs copy across)">
                <option value="">↗ Pick existing…</option>
                {pickerSgs.map((sg,i)=><option key={sg.id||i} value={sg.id}>{(sg.text||'').substring(0,50)}</option>)}
              </select>
            )}
            <button onClick={()=>onSgAdd(devId,cid,con.id,'')}
              style={{fontSize:10,padding:'2px 8px',borderRadius:3,cursor:'pointer',background:'transparent',color:'#22c55e',border:'1px solid #22c55e44',fontWeight:600}}>+ New</button>
          </div>
        </div>
        {safeguards.length===0&&pickerSgs.length===0&&(
          <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>No safeguards yet — click <strong style={{color:'#22c55e',fontStyle:'normal'}}>+ New</strong> to add.</div>
        )}
        {safeguards.map((sg,si)=>{
          const isShared=sharedSgTexts.has((sg.text||'').trim().toLowerCase());
          return(
            <div key={sg.id||si} style={{position:'relative'}}>
              {isShared&&(
                <div style={{position:'absolute',top:6,right:26,zIndex:2,fontSize:9,fontWeight:700,
                  color:'#60a5fa',background:'#1e3a5f',padding:'1px 5px',borderRadius:3,letterSpacing:'0.04em'}}
                  title="This safeguard appears in other consequences — DFs sync automatically">
                  🔗 Shared
                </div>
              )}
              <SafeguardCard sg={sg}
                onUpdate={updated=>conSgUpdateRef(devId,cid,con.id,sg.id||sg,updated)}
                onDelete={()=>onSgDel(devId,cid,con.id,si)}/>
            </div>
          );
        })}
      </div>

      {/* ── Recommendations section ── */}
      <div style={{padding:'8px 12px',background:'#030b1a'}}>
        {pickerRecs.length>0&&(
          <div style={{marginBottom:8,display:'flex',gap:6,alignItems:'center'}}>
            <span style={{fontSize:10,color:'var(--text3)'}}>↗ Pick existing rec:</span>
            <select onChange={e=>{
                if(!e.target.value)return;
                const picked=devRecs.find(r=>r.id===e.target.value);
                if(picked)onRecAdd(devId,cid,con.id,{...picked,id:uid()});
                e.target.value='';
              }}
              style={{flex:1,fontSize:10,padding:'2px 4px',borderRadius:3,cursor:'pointer',
                background:'#030b1f',color:'#93c5fd',border:'1px solid #3b82f644'}}
              title="Re-use a recommendation already entered in another consequence">
              <option value="">— select —</option>
              {pickerRecs.map((r,i)=><option key={r.id||i} value={r.id}>{(r.text||'').substring(0,55)}</option>)}
            </select>
          </div>
        )}
        {/* Recommendations header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{fontSize:10,color:'#3b82f6',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>
            ✅ Recommendations
            <span style={{marginLeft:5,fontFamily:'var(--mono)',fontWeight:400,color:'var(--text3)',fontSize:9}}>({recs.length})</span>
          </span>
          <div style={{display:'flex',gap:5}}>
            <button onClick={suggestRecs} disabled={recsAiLoading}
              style={{fontSize:10,padding:'2px 8px',borderRadius:3,cursor:'pointer',
                background:'transparent',color:'#a78bfa',border:'1px solid #a78bfa44',
                opacity:recsAiLoading?0.6:1,fontWeight:600}}>
              {recsAiLoading?'⟳ Suggesting…':'✦ AI Suggest'}
            </button>
            <button onClick={()=>onRecAdd(devId,cid,con.id,{id:uid(),text:'',actionOwner:'',targetDate:'',status:'Open',degradationFactors:[]})}
              style={{fontSize:10,padding:'2px 8px',borderRadius:3,cursor:'pointer',
                background:'transparent',color:'#3b82f6',border:'1px solid #3b82f644',fontWeight:600}}>
              + Add
            </button>
          </div>
        </div>
        {recs.length===0&&(
          <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>
            No recommendations yet — click <strong style={{color:'#3b82f6',fontStyle:'normal'}}>+ Add</strong> or <strong style={{color:'#a78bfa',fontStyle:'normal'}}>✦ AI Suggest</strong>
          </div>
        )}
        {recs.map((rec,ri)=>(
          <RecCard key={rec.id||ri} rec={rec}
            onUpdate={updated=>onRecEdit(devId,cid,con.id,ri,updated)}
            onDelete={()=>onRecDel(devId,cid,con.id,ri)}/>
        ))}
      </div>
      <MitBarrierSection barriers={mitBs} onChange={mbs=>onMitUpdate&&onMitUpdate(devId,cid,con.id,mbs)}/>
    </div>
  );
};

// ── Cause card ────────────────────────────────────────────────────────
const CauseCard=({cause,causeIdx,devId,devIdx,onCauseUpdate,onCauseDelete,onConAdd,onConUpdate,onConDelete,onSgAdd,onSgDel,onSgUpdate,onConRecAdd,onConRecEdit,onConRecDel,onSetRisk,onRecAdd,onRecEdit,onRecDel,onConMitUpdate,devSafeguards,devRecs})=>{
  const [open,setOpen]=useState(true);
  const cons=cause.consequences||[];
  return(
    <div style={{marginBottom:12,borderRadius:8,overflow:'hidden',border:'1px solid var(--border2)'}}>
      <div style={{display:'flex',gap:8,padding:'9px 12px',background:'var(--bg-card)',alignItems:'flex-start',cursor:'pointer',borderBottom:open?'1px solid var(--border)':'none'}} onClick={()=>setOpen(v=>!v)}>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:700,flexShrink:0,marginTop:1,background:'var(--accent-dim)',padding:'2px 7px',borderRadius:3}}>C{causeIdx+1}</span>
        <div style={{flex:1}} onClick={e=>e.stopPropagation()}>
          <InlineEdit value={cause.text||''} onChange={t=>onCauseUpdate(devId,cause.id,{text:t})}
            placeholder="Describe the cause…" multiline
            textStyle={{fontSize:12,color:'var(--text1)'}}/>
        </div>
        <span style={{color:'var(--text3)',fontSize:12,flexShrink:0,marginTop:2}}>{open?'▾':'▸'}</span>
        <button onClick={e=>{e.stopPropagation();onCauseDelete(devId,cause.id);}} style={{width:20,height:20,borderRadius:3,cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color:'#ef4444',border:'1px solid #ef444455',flexShrink:0}} title="Delete cause">✕</button>
      </div>
      {open&&(
        <div style={{padding:'12px',background:'var(--bg-surface)',display:'flex',flexDirection:'column',gap:10}}>
          {cons.map((con,ci)=>(
            <ConBlock key={con.id} con={con} conIdx={ci} causeIdx={causeIdx} devIdx={devIdx}
              devId={devId} cid={cause.id}
              onUpdate={onConUpdate} onDelete={onConDelete}
              onSgAdd={onSgAdd} onSgDel={onSgDel} onSgUpdate={onSgUpdate}
              onRecAdd={onConRecAdd} onRecEdit={onConRecEdit} onRecDel={onConRecDel}
              onMitUpdate={onConMitUpdate}
              devSafeguards={devSafeguards} devRecs={devRecs}
              causeText={cause.text}/>
          ))}
          <button onClick={()=>onConAdd(devId,cause.id)} style={{fontSize:11,padding:'6px 12px',borderRadius:4,cursor:'pointer',background:'#1a0505',color:'#fca5a5',border:'1px dashed #ef444466',fontWeight:600,alignSelf:'flex-start'}}>+ Add Consequence</button>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:4}}>
            <div><div style={{fontSize:10,color:'var(--text2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Initial Risk</div>
              <MiniMatrixPicker sel={cause.initialRisk} onPick={r=>onSetRisk(devId,cause.id,'initialRisk',r)} label=""/>
            </div>
            <div><div style={{fontSize:10,color:'var(--text2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Residual Risk</div>
              <MiniMatrixPicker sel={cause.residualRisk} onPick={r=>onSetRisk(devId,cause.id,'residualRisk',r)} label=""/>
            </div>
          </div>
          <div>
            <RecList recs={Array.isArray(cause.recommendations)?cause.recommendations:[]} color="#f59e0b"
              label={'🔧 Cause Recommendations (C'+(causeIdx+1)+')'} emptyMsg="No cause-level recommendations"
              onAdd={rec=>onRecAdd(devId,cause.id,rec)}
              onEdit={(i,u)=>onRecEdit(devId,cause.id,i,u)}
              onDel={i=>onRecDel(devId,cause.id,i)}/>
          </div>
        </div>
      )}
    </div>
  );
};

// ── NodeRecsPanel ─────────────────────────────────────────────────────
const NodeRecsPanel=({devs,nodeId})=>{
  const allRecs=[];
  devs.filter(d=>d.nodeId===nodeId).forEach(dev=>{
    const nd=normalizeDev(dev);
    const devLabel=nd.deviation||(nd.guideWord+' '+nd.parameter);
    nd.causes.forEach((c,ci)=>{
      (c.recommendations||[]).forEach((r,ri)=>{
        allRecs.push({ref:'C'+(ci+1)+'-R'+(ri+1),cause:c.text,deviation:devLabel,text:typeof r==='string'?r:r.text,owner:typeof r==='object'?r.actionOwner:'',date:typeof r==='object'?r.targetDate:'',status:typeof r==='object'?(r.status||'Open'):'Open'});
      });
      c.consequences.forEach((cn,qi)=>{
        (cn.recommendations||[]).forEach((r,ri)=>{
          allRecs.push({ref:'C'+(ci+1)+'.'+(qi+1)+'-R'+(ri+1),cause:c.text,deviation:devLabel,text:typeof r==='string'?r:r.text,owner:typeof r==='object'?r.actionOwner:'',date:typeof r==='object'?r.targetDate:'',status:typeof r==='object'?(r.status||'Open'):'Open'});
        });
      });
    });
  });
  if(allRecs.length===0)return<div style={{color:'var(--text3)',fontSize:13,fontStyle:'italic',padding:'20px 0',textAlign:'center'}}>No recommendations yet.</div>;
  return(
    <table className="tbl" style={{fontSize:11}}>
      <thead><tr><th style={{width:70}}>Ref</th><th>Recommendation</th><th style={{width:100}}>Action Owner</th><th style={{width:90}}>Target Date</th><th style={{width:90}}>Status</th><th>Cause / Deviation</th></tr></thead>
      <tbody>{allRecs.map((r,i)=>(
        <tr key={i}>
          <td style={{fontFamily:'var(--mono)',color:'var(--accent)',fontSize:10}}>{r.ref}</td>
          <td style={{color:'var(--text1)'}}>{r.text}</td>
          <td style={{color:'var(--text2)'}}>{r.owner||'—'}</td>
          <td style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{r.date||'—'}</td>
          <td><RecStatusChip status={r.status}/></td>
          <td style={{color:'var(--text3)',fontSize:10}}>{r.cause?.substring(0,40)}{r.cause?.length>40?'…':''}</td>
        </tr>
      ))}</tbody>
    </table>
  );
};

// ── CCSuggestPanel — AI C&C suggestions ──────────────────────────────
const CCSuggestPanel=({node,dev,study,apiKey,aiModel,onAdd,onClose})=>{
  const [loading,setLoading]=useState(true);
  const [results,setResults]=useState([]);
  const [error,setError]=useState('');
  const [selected,setSelected]=useState({});
  const nd=normalizeDev(dev);
  const devLabel=nd.deviation||(nd.guideWord+' '+nd.parameter);
  useEffect(()=>{
    if(!apiKey){setError('API key not set — click "⚙ API" in the header first.');setLoading(false);return;}
    if(!dev)return;
    const generate=async()=>{
      setLoading(true);setError('');
      try{
        const sys='You are a HAZOP study facilitator with deep oil & gas process safety expertise. Generate credible causes and consequences for this deviation, consistent with the design intent and process context provided. Return only valid JSON.';
        const usr='Node: '+(node?.name||'')+' | Type: '+(node?.type||'')+' | Fluid: '+(node?.fluid||'')+' | Conditions: '+(node?.conditions||'')+
          '\nDesign intent: '+(node?.designIntent||'not stated')+
          (study?.processDescription?'\nProcess description: '+study.processDescription.substring(0,600):'')+
          (study?.normalOperatingConditions?'\nNormal operating conditions: '+study.normalOperatingConditions.substring(0,400):'')+
          (study?.processControls?'\nProcess controls: '+study.processControls.substring(0,400):'')+
          (study?.assumptions?'\nStudy assumptions/exclusions: '+study.assumptions.substring(0,300):'')+
          '\nDeviation: '+devLabel+
          '\n\nGenerate 5-7 credible causes with 2-3 consequences each. Consequences must describe the ultimate credible outcome (assume safeguards fail).\n'+
          'JSON: {"causes":[{"text":"Cause text","consequences":["Consequence 1","Consequence 2"]}]}';
        const raw=await window.callAnthropicAPI(apiKey,aiModel||'claude-sonnet-4-6',sys,usr);
        const parsed=repairJSON(raw);
        setResults(parsed.causes||[]);
      }catch(e){setError(e.message||'AI error');}
      setLoading(false);
    };
    generate();
  },[]);
  const toggleCause=(ci)=>setSelected(s=>({...s,[ci]:!s[ci]}));
  const addSelected=()=>{
    const toAdd=results.filter((_,ci)=>selected[ci]);
    if(toAdd.length>0)onAdd(toAdd);
    onClose();
  };
  const selCount=Object.values(selected).filter(Boolean).length;
  return(
    <div style={{width:340,background:'var(--bg-surface)',borderLeft:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg-card)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div style={{fontFamily:'var(--disp)',fontWeight:700,fontSize:13,color:'#a78bfa',textTransform:'uppercase',letterSpacing:'0.05em'}}>🧠 AI Suggest C&amp;C</div>
        <button onClick={onClose} style={{width:24,height:24,borderRadius:4,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color:'var(--text2)',border:'1px solid var(--border)'}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
        {loading&&<div style={{textAlign:'center',padding:'30px 0',color:'var(--text3)'}}>
          <div style={{fontSize:20,marginBottom:10}}>⟳</div>Generating HAZOP causes &amp; consequences…
        </div>}
        {error&&<div style={{color:'#fca5a5',padding:'10px',background:'#2d0a0a',borderRadius:4}}>{error}</div>}
        {!loading&&!error&&results.length>0&&(
          <div style={{fontSize:10,color:'#c4b5fd',background:'#2d1f5e55',border:'1px solid #7c3aed44',borderRadius:4,padding:'6px 8px',marginBottom:10,lineHeight:1.5}}>
            ⚠ AI-generated first pass — the HAZOP team must review each item against the P&amp;ID and design intent before accepting. AI does not replace team judgement.
          </div>
        )}
        {!loading&&results.map((cause,ci)=>(
          <div key={ci} style={{marginBottom:10,padding:'8px 10px',background:'var(--bg-card)',borderRadius:6,
            border:'1px solid '+(selected[ci]?'#a78bfa':'var(--border)'),cursor:'pointer'}}
            onClick={()=>toggleCause(ci)}>
            <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
              <input type="checkbox" checked={!!selected[ci]} onChange={()=>toggleCause(ci)} onClick={e=>e.stopPropagation()} style={{marginTop:3,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--accent)',marginBottom:4}}>{cause.text}</div>
                {(cause.consequences||[]).map((cn,qi)=>(
                  <div key={qi} style={{fontSize:11,color:'var(--text2)',marginBottom:2,paddingLeft:8}}>
                    <span style={{color:'#ef4444',marginRight:4}}>→</span>{cn}
                  </div>
                ))}
              </div>
            </div>
          </div>
        ))}
      </div>
      {!loading&&selCount>0&&(
