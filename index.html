<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk2Safe HAZoP — AI-Powered HAZOP Study System</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
  import Anthropic from 'https://esm.sh/@anthropic-ai/sdk@0.36.3';
  window._Anthropic = Anthropic;
  window._anthropicReady = true;
  console.log('[Risk2Safe] Anthropic SDK ready');
</script>
<script>
  window._anthropicReady = window._anthropicReady || false;
  window.callAnthropicAPI = async function(apiKey, model, systemPrompt, userPrompt) {
    let waited = 0;
    while (!window._anthropicReady && waited < 8000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    if (!window._Anthropic) throw new Error('Anthropic SDK failed to load. Check internet connection and try refreshing.');
    if (!apiKey || !apiKey.trim().startsWith('sk-ant')) throw new Error('Invalid or missing API key. Click "API" in the header and enter your key (starts with sk-ant-...).');
    const client = new window._Anthropic({ apiKey: apiKey.trim(), dangerouslyAllowBrowser: true });
    const message = await client.messages.create({
      model: model,
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    });
    return message.content[0].text;
  };
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#07101f;
  --bg-surface:#0e1b2e;
  --bg-card:#162236;
  --bg-card2:#1c2d45;
  --bg-hover:#1e3152;
  --border:#1d3452;
  --border2:#264872;
  --accent:#f59e0b;
  --accent2:#fbbf24;
  --accent-dim:#78350f;
  --blue:#3b82f6;
  --blue-dim:#1d3a6e;
  --green:#22c55e;
  --red:#ef4444;
  --orange:#f97316;
  --text1:#e2e8f0;
  --text2:#94a3b8;
  --text3:#475569;
  --mono:'IBM Plex Mono',monospace;
  --disp:'Rajdhani',sans-serif;
  --body:'Inter',sans-serif;
}
body{background:var(--bg-base);color:var(--text1);font-family:var(--body);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;background:var(--bg-card2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;outline:none;width:100%;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--bg-card)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.scrollable{overflow-y:auto;min-height:0;min-width:0}
/* HEADER */
.hdr{display:flex;align-items:center;gap:16px;padding:0 20px;height:52px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.logo{font-family:var(--disp);font-size:22px;font-weight:700;letter-spacing:0.05em;color:var(--text1);white-space:nowrap}
.logo span{color:var(--accent)}
.hdr-study{font-size:12px;color:var(--text2);font-family:var(--mono);border-left:1px solid var(--border);padding-left:16px;margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:0.04em}
.badge-hi{background:#7f1d1d;color:#fca5a5}
.badge-hi2{background:#7c2d12;color:#fdba74}
.badge-med{background:#713f12;color:#fde68a}
.badge-lo{background:#14532d;color:#86efac}
.badge-none{background:var(--bg-card2);color:var(--text2)}
/* NAV */
.nav{display:flex;align-items:stretch;padding:0 4px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:2px}
.nav-btn{padding:8px 18px;font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:0.08em;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;position:relative;text-transform:uppercase}
.nav-btn:hover{color:var(--text1);background:var(--bg-card)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-count{position:absolute;top:6px;right:8px;background:var(--accent);color:#000;border-radius:10px;padding:0 5px;font-size:10px;font-weight:700;min-width:16px;text-align:center}
/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:240px;flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
/* SECTION HEADER */
.sec-hdr{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px}
.sec-title{font-family:var(--disp);font-size:16px;font-weight:700;letter-spacing:0.06em;color:var(--accent);text-transform:uppercase}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-weight:500;transition:all 0.15s;white-space:nowrap;font-size:13px}
.btn-primary{background:var(--accent);color:#000;font-weight:600}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg-card2);color:var(--text1);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--accent)}
.btn-ghost{color:var(--text2);padding:6px 10px}
.btn-ghost:hover{color:var(--text1);background:var(--bg-card2)}
.btn-danger{background:#7f1d1d;color:#fca5a5;border:1px solid #b91c1c}
.btn-danger:hover{background:#991b1b}
.btn-ai{background:linear-gradient(135deg,#1d3a6e,#1e3a8a);color:#93c5fd;border:1px solid #2563eb;font-weight:600}
.btn-ai:hover{background:linear-gradient(135deg,#1e3a8a,#1d4ed8)}
.btn-ai:disabled{opacity:0.5;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:12px}
/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px}
.card2{background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;padding:12px}
/* FORM */
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-row-2{grid-template-columns:1fr 1fr}
.form-row-3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
/* RISK MATRIX */
.matrix-grid{display:grid;grid-template-columns:66px repeat(6,1fr);gap:2px}
.matrix-cell{display:flex;align-items:center;justify-content:center;padding:5px 3px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);text-align:center;cursor:default;transition:all 0.15s;border:1px solid transparent;user-select:none;min-height:40px}
.matrix-cell.clickable{cursor:pointer}
.matrix-cell.clickable:hover{filter:brightness(1.3);border-color:rgba(255,255,255,0.3)}
.matrix-cell.selected{border-color:#fff !important;box-shadow:0 0 0 2px rgba(255,255,255,0.5)}
.matrix-header{background:var(--bg-card2);color:var(--text2);font-size:10px;font-weight:600;border-radius:4px;border:1px solid var(--border);padding:4px 2px}
.risk-1{background:#7f1d1d;color:#fca5a5}
.risk-2{background:#7c2d12;color:#fdba74}
.risk-3{background:#713f12;color:#fde68a}
.risk-4{background:#14532d;color:#86efac}
/* WORKSHEET */
.dev-list-item{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;display:flex;flex-direction:column;gap:4px}
.dev-list-item:hover{background:var(--bg-hover)}
.dev-list-item.active{background:var(--bg-hover);border-left:3px solid var(--accent)}
.dev-tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg-card2);color:var(--text2);display:inline-block}
.dev-tag-gw{background:#1a2d50;color:#93c5fd}
/* LISTS for analysis */
.analysis-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.analysis-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;font-size:13px;line-height:1.5}
.analysis-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.analysis-item-dot.cause{background:#f59e0b}
.analysis-item-dot.consequence{background:#ef4444}
.analysis-item-dot.safeguard{background:#22c55e}
.analysis-item-dot.recommendation{background:#3b82f6}
.analysis-item-text{flex:1;color:var(--text1)}
.analysis-item-del{opacity:0;transition:opacity 0.12s;color:var(--red);font-size:11px;flex-shrink:0}
.analysis-item:hover .item-actions{opacity:1!important}
.analysis-item:hover{background:var(--bg-hover)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
/* Cause · Consequence · Safeguard nested layout */
.cause-card{border:1px solid var(--border2);border-left:3px solid #f59e0b;border-radius:8px;overflow:hidden;margin-bottom:12px}
.cause-hdr{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg-card2);border-bottom:1px solid #f59e0b33}
.cause-body{padding:10px 12px;background:var(--bg-card);display:flex;flex-direction:column;gap:6px}
.con-block{border:1px solid var(--border);border-left:3px solid #ef444466;border-radius:6px;overflow:hidden;margin-bottom:4px}
.con-hdr{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg-card2)}
.sg-row{display:flex;align-items:flex-start;gap:8px;padding:7px 10px 8px 20px;background:#0b1c11;border-top:1px solid #1a3324}
.add-row-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer;border:1px dashed;background:transparent;font-family:var(--body);transition:all 0.15s;margin-top:2px}

.analysis-item:hover .analysis-item-del{opacity:1}
/* STATUS */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg-surface)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
.tbl tr:hover td{background:var(--bg-hover)}
/* API KEY */
.api-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--accent-dim);border-bottom:1px solid #92400e;flex-shrink:0}
.api-bar input{background:#1c0f02;border-color:#92400e;color:var(--accent2);font-family:var(--mono);font-size:12px;width:360px}
/* GENERATING */
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* REPORT */
@media print{
  .nav,.hdr,.api-bar,.btn,.sidebar{display:none!important}
  body{background:#fff;color:#000}
  .content{overflow:visible!important}
  .report-page{padding:20px!important}
}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--text3);text-align:center}
.empty-icon{font-size:48px;opacity:0.4}
.divider{height:1px;background:var(--border);margin:12px 0}
.tooltip{position:relative}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0f1e33;color:var(--text1);padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none;border:1px solid var(--border2);z-index:100}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect,useMemo}=React;

/* ─── CONSTANTS ─────────────────────────────────────── */
const GUIDE_WORDS=['NO / NONE','MORE','LESS','AS WELL AS','PART OF','REVERSE','OTHER THAN','EARLY','LATE'];
const PARAMETERS=['FLOW','PRESSURE','TEMPERATURE','LEVEL','COMPOSITION','CONCENTRATION','PHASE','VISCOSITY','REACTION RATE','AGITATION / MIXING','SEQUENCE','SIGNAL / CONTROL','UTILITY / SERVICE','TIME'];
const SNAMES={1:'Notable',2:'Minor',3:'Serious',4:'Major',5:'Catastrophic',6:'Disastrous'};
const SDESC={1:'Slight injuries, short-term effects, near miss',2:'Minor injuries, reversible effects, first aid',3:'Serious injuries, RIDDOR reportable, LTI',4:'Single fatality or permanent total disability',5:'Multiple fatalities (2-10), major asset damage',6:'Multiple fatalities (>10), catastrophic damage, business continuity impact'};
const LNAMES={A:'Term',B:'Rare',C:'Unlikely',D:'Possible',E:'Likely',F:'Almost Certain'};
const LDESC={A:"Hasn't happened in industry in last 50 years (10⁻⁶ - 10⁻⁵ /yr)",B:'Could happen in industry next 20-30 years (10⁻⁵ - 10⁻⁴ /yr)',C:'Could be incurred within a 5-10 year time frame (10⁻⁴ - 10⁻³ /yr)',D:'Could be incurred within 5 year Strategic Planning period (10⁻³ - 10⁻² /yr)',E:'Could be incurred more than once per year budget period (10⁻² - 10⁻¹ /yr)',F:'Could be incurred more than once on site (10⁻¹ - 1 /yr)'};

/* Full ADNOC severity impact table */
const SDETAIL={
  6:{people:'Multiple fatalities (>10) / Widespread permanent disabilities',asset:'>= $1 Billion / Catastrophic asset loss',env:'Catastrophic irreversible environmental damage, exceeding all limits, persistent contamination',rep:'Prolonged international impact on company and industry; potential licence revocation'},
  5:{people:'Multiple fatalities (2-10) / Multiple permanent total disabilities',asset:'$100M to <$1B / Major asset destruction, extended production loss',env:'Disastrous environmental impact beyond site, serious long-term damage',rep:'Serious adverse international media coverage; prolonged reputational impact on Group'},
  4:{people:'Single worker fatality OR permanent total disability / Serious injury to public',asset:'$10M to <$100M / Significant plant damage, long shutdown',env:'Major impact on surrounding environment; repeated non-compliance with regulations',rep:'Significant national media attention; potential prosecution, regulatory sanctions'},
  3:{people:'Serious injuries requiring hospitalisation / Reversible partial disability / RIDDOR reportable',asset:'$1M to <$10M / Equipment damage requiring major repair, production loss',env:'Local environmental effect; non-repeated breach of regulatory limits',rep:'Considerable local media/government attention; moderate fines or regulatory action'},
  2:{people:'Minor injuries (first aid / RIDDOR near miss) / Temporary health effects',asset:'$100K to <$1M / Minor asset damage, short-term production impact',env:'Minor, recoverable environmental effects within site boundary',rep:'Limited local media impact; minor regulatory notification or warning'},
  1:{people:'Slight injuries / Near miss / Short-term health effects / No lost time',asset:'< $100K / Negligible damage, minimal operational impact',env:'Slight, contained environmental effects within fence area; no off-site impact',rep:'No public concern; slight internal or regulatory notice only'}
};

/* Full ADNOC likelihood table */
const LDETAIL={
  F:{qualitative:'Frequent / Almost Certain',frequency:'10⁻¹ to 1 per year',hseLikelihood:'Has occurred more than once on the site',ermCriteria:'Could be incurred more than once on the site next year'},
  E:{qualitative:'Probable / Likely',frequency:'10⁻² to 10⁻¹ per year',hseLikelihood:'Has occurred more than once per year budget period (at Company or on site)',ermCriteria:'Could be incurred more than once within year budget period'},
  D:{qualitative:'Occasional / Possible',frequency:'10⁻³ to 10⁻² per year',hseLikelihood:'Has occurred more than once in Group Company, but not on the site',ermCriteria:'Could be incurred within the 5-year Strategic Planning period'},
  C:{qualitative:'Remote / Unlikely',frequency:'10⁻⁴ to 10⁻³ per year',hseLikelihood:'Has occurred at least once in the Group Company but not on the site',ermCriteria:'Could be incurred within a 5-10 year time frame'},
  B:{qualitative:'Improbable / Rare',frequency:'10⁻⁵ to 10⁻⁴ per year',hseLikelihood:'Has occurred in world-wide industry but not in the Group',ermCriteria:'Could happen somewhere in industry in the next 20-30 years'},
  A:{qualitative:'Incredible / Term',frequency:'10⁻⁶ to 10⁻⁵ per year',hseLikelihood:'Has not occurred in world-wide industry in the last 50 years',ermCriteria:"Hasn't happened in industry in last 50 years"}
};

// ADNOC 6×6 Risk Matrix — Category 1=HIGH-RED, 2=HIGH-ORG, 3=MEDIUM, 4=LOW
const RMATRIX={
  6:{A:2,B:2,C:1,D:1,E:1,F:1},
  5:{A:2,B:2,C:2,D:1,E:1,F:1},
  4:{A:3,B:3,C:2,D:2,E:1,F:1},
  3:{A:4,B:3,C:3,D:2,E:2,F:1},
  2:{A:4,B:4,C:3,D:3,E:2,F:2},
  1:{A:4,B:4,C:4,D:3,E:3,F:2}
};
const RDISP={
  1:{label:'HIGH',cat:'CAT 1',cls:'risk-1',badge:'badge-hi',txt:'#fca5a5',sign:'Director / GC CEO sign-off. ALARP required.'},
  2:{label:'HIGH',cat:'CAT 2',cls:'risk-2',badge:'badge-hi2',txt:'#fdba74',sign:'Unit Manager / SVP sign-off. ALARP required.'},
  3:{label:'MEDIUM',cat:'CAT 3',cls:'risk-3',badge:'badge-med',txt:'#fde68a',sign:'Dept Manager / VP sign-off. Monitor & control.'},
  4:{label:'LOW',cat:'CAT 4',cls:'risk-4',badge:'badge-lo',txt:'#86efac',sign:'Line Manager sign-off. Monitor current controls.'}
};

const getRisk=(s,l)=>s&&l?RMATRIX[s]?.[l]||null:null;
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().split('T')[0];

/* ─── COMPONENTS ─────────────────────────────────────── */
const RiskBadge=({cat,small})=>{
  if(!cat)return<span className="badge badge-none" style={{fontSize:small?10:12}}>—</span>;
  const d=RDISP[cat];
  return<span className={`badge ${d.badge}`} style={{fontSize:small?10:12}}>{d.label} · {d.cat}</span>;
};

const MatrixPicker=({sel,onPick,label})=>{
  const rows=[6,5,4,3,2,1];
  const cols=['A','B','C','D','E','F'];
  return(
    <div>
      {label&&<div style={{fontSize:12,color:'var(--text2)',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:8}}>{label}</div>}
      <div className="matrix-grid" style={{gap:3}}>
        <div className="matrix-cell matrix-header" style={{fontSize:10}}>S / L</div>
        {cols.map(c=>(
          <div key={c} className="matrix-cell matrix-header" data-tip={LNAMES[c]} title={LNAMES[c]}>
            {c}<br/><span style={{fontWeight:400,fontSize:9,color:'var(--text3)'}}>{LNAMES[c]}</span>
          </div>
        ))}
        {rows.map(s=>(
          <React.Fragment key={s}>
            <div className="matrix-cell matrix-header" style={{flexDirection:'column',gap:1,fontSize:10}} title={SDESC[s]}>
              <strong>S{s}</strong><span style={{fontSize:8,fontWeight:400,color:'var(--text3)'}}>{SNAMES[s]}</span>
            </div>
            {cols.map(l=>{
              const cat=RMATRIX[s][l];
              const isSel=sel&&sel.s===s&&sel.l===l;
              return(
                <div key={l}
                  className={`matrix-cell clickable ${RDISP[cat].cls} ${isSel?'selected':''}`}
                  style={{flexDirection:'column',gap:1,fontSize:10}}
                  onClick={()=>onPick({s,l,cat})}
                  title={`S${s}/${l} — ${RDISP[cat].label} (${RDISP[cat].cat})\nSeverity: ${SNAMES[s]}\nLikelihood: ${LNAMES[l]}`}
                >
                  <strong>{s}{l}</strong>
                </div>
              );
            })}
          </React.Fragment>
        ))}
      </div>
      {sel&&(
        <div style={{marginTop:8,padding:'8px 10px',background:'var(--bg-card2)',borderRadius:6,border:'1px solid var(--border)',fontSize:12}}>
          <span style={{color:'var(--text2)'}}>Selected: </span>
          <strong style={{color:'var(--accent)',fontFamily:'var(--mono)'}}>S{sel.s}/{sel.l}</strong>
          <span style={{margin:'0 8px',color:'var(--text3)'}}>|</span>
          <RiskBadge cat={sel.cat} small/>
          <div style={{color:'var(--text2)',marginTop:4}}>{RDISP[sel.cat].sign}</div>
        </div>
      )}
    </div>
  );
};

const AnalysisList=({items,dotClass,onAdd,onDel,placeholder,title,titleColor,icon,linkedFields,onLinkedAdd})=>{
  const [draft,setDraft]=useState('');
  const [adding,setAdding]=useState(false);
  const [expandedIdx,setExpandedIdx]=useState(null);
  const [linkedVals,setLinkedVals]=useState({});
  const [editIdx,setEditIdx]=useState(null);
  const [editVal,setEditVal]=useState('');
  const inputRef=useRef(null);
  const editRef=useRef(null);

  const openAdd=()=>{setAdding(true);setExpandedIdx(null);setTimeout(()=>inputRef.current&&inputRef.current.focus(),40);};
  const closeAdd=()=>{setAdding(false);setDraft('');};
  const handleAdd=()=>{const t=draft.trim();if(t){onAdd(t);setDraft('');setAdding(false);}};

  const toggleExpand=(i)=>{
    if(expandedIdx===i){setExpandedIdx(null);setLinkedVals({});}
    else{setExpandedIdx(i);setLinkedVals({});setAdding(false);}
  };
  const handleLinkedAdd=()=>{
    if(onLinkedAdd)onLinkedAdd(linkedVals);
    setExpandedIdx(null);setLinkedVals({});
  };

  const openEdit=(i,val)=>{setEditIdx(i);setEditVal(val);setExpandedIdx(null);setTimeout(()=>editRef.current&&editRef.current.focus(),40);};
  const saveEdit=(i)=>{
    const t=editVal.trim();

/* ── Normalize a recommendation: string → {text,actionOwner,targetDate} ── */
const normalizeRec=(r)=>{
  if(!r)return null;
  if(typeof r==='string') return {id:uid(),text:r,actionOwner:'',targetDate:''};
  return {id:uid(),actionOwner:'',targetDate:'',...r};
};

const normalizeDev=(d)=>{
  if(!d)return d;
  const normRecs=(arr)=>(Array.isArray(arr)?arr:[]).map(normalizeRec).filter(Boolean);
  // deviation-level recs stay as strings (used by AnalysisList)
  const normDevRecs=(arr)=>(Array.isArray(arr)?arr:[]).map(r=>typeof r==='string'?r:(r.text||'')).filter(Boolean);
  if(d.causes&&d.causes.length>0&&typeof d.causes[0]==='object'&&Array.isArray(d.causes[0].consequences)){
    return {...d,
      recommendations:normDevRecs(d.recommendations),
      causes:d.causes.map(c=>({initialRisk:null,residualRisk:null,recommendations:[],...c,
        recommendations:normRecs(c.recommendations),
        consequences:(c.consequences||[]).map(cn=>({safeguards:[],recommendations:[],...cn,
          safeguards:(Array.isArray(cn.safeguards)?cn.safeguards:(cn.safeguard?[cn.safeguard]:[])).map(s=>
            typeof s==='string'?{id:uid(),text:s,degradationFactors:[]}:{id:uid(),degradationFactors:[],...s}
          ),
          recommendations:normRecs(cn.recommendations),
          mitigationBarriers:Array.isArray(cn.mitigationBarriers)?cn.mitigationBarriers.map(m=>({
            id:uid(),text:'',type:'Engineering',degradationFactors:[],...m
          })):[]
        }))
      }))
    };
  }
  const oc=Array.isArray(d.causes)?d.causes:[];
  const ocon=Array.isArray(d.consequences)?d.consequences:[];
  const osg=Array.isArray(d.safeguards)?d.safeguards:[];
  const newCauses=oc.map((txt,ci)=>({
    id:uid(),text:txt,initialRisk:null,residualRisk:null,recommendations:[],
    consequences:ci<ocon.length?[{id:uid(),text:ocon[ci],safeguards:ci<osg.length&&osg[ci]?[{id:uid(),text:osg[ci],degradationFactors:[]}]:[],recommendations:[],mitigationBarriers:[]}]:[]
  }));
  for(let i=oc.length;i<ocon.length;i++){
    if(!newCauses.length)newCauses.push({id:uid(),text:'',initialRisk:null,residualRisk:null,recommendations:[],consequences:[]});
    newCauses[newCauses.length-1].consequences.push({id:uid(),text:ocon[i],safeguards:i<osg.length&&osg[i]?[{id:uid(),text:osg[i],degradationFactors:[]}]:[],recommendations:[],mitigationBarriers:[]});
  }
  return {...d,causes:newCauses,recommendations:normRecs(d.recommendations)};
};

// ── Inline editable text (click to edit) ─────────────────────────────
const InlineEdit=({value,onChange,placeholder,multiline,style,textStyle})=>{
  const [editing,setEditing]=useState(!value);
  const [draft,setDraft]=useState(value||'');
  const ref=useRef(null);
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  useEffect(()=>{if(!editing)setDraft(value||'');},[value,editing]);
  const save=()=>{const t=draft.trim();if(t)onChange(t);setEditing(false);};
  const cancel=()=>{setDraft(value||'');setEditing(false);};
  if(editing){
    const props={ref,value:draft,onChange:e=>setDraft(e.target.value),
      onKeyDown:e=>{if(e.key==='Escape')cancel();if(e.key==='Enter'&&!e.shiftKey&&!multiline){e.preventDefault();save();}},
      placeholder,style:{fontSize:13,lineHeight:1.55,resize:'vertical',...style}};
    return(
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:4}}>
        {multiline?<textarea {...props}/>:<input {...props} onBlur={save}/>}
        <div style={{display:'flex',gap:4}}>
          <button className="btn btn-primary btn-sm" onClick={save}>✓ Save</button>
          <button className="btn btn-ghost btn-sm" onClick={cancel}>✕</button>
          {multiline&&<span style={{fontSize:11,color:'var(--text3)'}}>Enter to save · Esc to cancel</span>}
        </div>
      </div>
    );
  }
  return(
    <span onClick={()=>{setDraft(value||'');setEditing(true);}}
      style={{flex:1,cursor:'text',lineHeight:1.55,...textStyle}}>
      {value||<em style={{color:'var(--text3)',fontStyle:'italic'}}>{placeholder}</em>}
    </span>
  );
};

// ── Recommendation entry (with action owner + target date) ──────────
const RecEntry=({rec,color,onEdit,onDelete})=>{

  const [v,setV]=useState(rec);
  useEffect(()=>{setV(rec);},[rec]);
  const save=()=>{onEdit({...v});setEditing(false);};
  const recText=typeof rec==='string'?rec:(rec.text||'');
  const owner=typeof rec==='string'?'':(rec.actionOwner||'');
  const due=typeof rec==='string'?'':(rec.targetDate||'');
  return editing?(
    <div style={{display:'flex',flexDirection:'column',gap:4,padding:'7px 8px',background:'var(--bg-card)',borderRadius:5,border:'1px solid '+color+'66',marginBottom:4}}>
      <textarea value={v.text||''} onChange={e=>setV({...v,text:e.target.value})} rows={2}
        style={{fontSize:12,resize:'vertical',lineHeight:1.5}} placeholder="Recommendation text…"/>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        <input value={v.actionOwner||''} onChange={e=>setV({...v,actionOwner:e.target.value})}
          placeholder="Action Owner / Discipline"
          style={{flex:1,minWidth:140,fontSize:12,padding:'4px 8px'}}/>
        <input type="date" value={v.targetDate||''} onChange={e=>setV({...v,targetDate:e.target.value})}
          style={{fontSize:12,padding:'4px 8px'}}/>
      </div>
      <div style={{display:'flex',gap:4}}>
        <button onClick={save} style={{fontSize:11,padding:'3px 10px',borderRadius:3,cursor:'pointer',background:color+'22',color,border:'1px solid '+color+'55',fontWeight:600}}>✓ Save</button>
        <button onClick={()=>setEditing(false)} style={{fontSize:11,padding:'3px 8px',borderRadius:3,cursor:'pointer',background:'transparent',color:'var(--text3)',border:'1px solid var(--border)'}}>✕</button>
      </div>
    </div>
  ):(
    <div style={{marginBottom:4,padding:'6px 8px',background:'var(--bg-card)',borderRadius:5,border:'1px solid var(--border)'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
        <span style={{color,flexShrink:0,marginTop:1}}>→</span>
        <span style={{flex:1,fontSize:12,lineHeight:1.55,color:'var(--text1)',wordBreak:'break-word'}}>{recText}</span>
        <div style={{display:'flex',gap:3,flexShrink:0}}>
          <button title="Edit" onClick={()=>{setV(rec);setEditing(true);}}
            style={{width:18,height:18,borderRadius:3,cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color,border:'1px solid '+color+'55'}}>✎</button>
          <button title="Delete" onClick={onDelete}
            style={{width:18,height:18,borderRadius:3,cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color:'#ef4444',border:'1px solid #ef444455'}}>✕</button>

      {(owner||due)&&(
        <div style={{display:'flex',gap:12,marginTop:4,paddingTop:4,borderTop:'1px solid var(--border)',flexWrap:'wrap'}}>
          {owner&&<span style={{fontSize:10,color:'var(--text3)'}}>👤 <span style={{color:'var(--text2)'}}>{owner}</span></span>}
          {due&&<span style={{fontSize:10,color:'var(--text3)'}}>📅 <span style={{color:'var(--text2)'}}>{due}</span></span>}

            <button onClick={commit} style={{fontSize:11,padding:'3px 10px',borderRadius:3,cursor:'pointer',background:color+'22',color,border:'1px solid '+color+'55',fontWeight:600}}>✓ Add</button>
            <button onClick={()=>{setAdding(false);setDraft({text:'',actionOwner:'',targetDate:''});}} style={{fontSize:11,padding:'3px 8px',borderRadius:3,cursor:'pointer',background:'transparent',color:'var(--text3)',border:'1px solid var(--border)'}}>✕ Cancel</button>

/* ── Module-level context globals (set by WorksheetView on render) ─── */
window._R2S={key:'',model:'claude-sonnet-4-6',nodeName:'',deviation:'',fluid:''};

/* ── AI suggest degradation factors + CCDs for a barrier ─────────────── */
const suggestDFsAI=async(barrierText,existingDFs)=>{
  const ctx=window._R2S||{};
  if(!ctx.key)return[];
  const existing=(existingDFs||[]).map(d=>d.text).filter(Boolean).join('; ');
  const sys='You are a process safety barrier integrity engineer. Return only valid compact JSON, no explanation.';
  const usr='Barrier: '+barrierText+
    '\nProcess context: Node='+ctx.nodeName+' | Deviation='+ctx.deviation+' | Fluid='+ctx.fluid+
    (existing?'\nAlready identified: '+existing:'')+
    '\n\nIdentify 2-3 degradation factors for this barrier and 1-2 degradation controls (CCDs) per factor.'+
    '\nJSON: {"degradationFactors":[{"text":"DF text","controls":[{"text":"CCD text"}]}]}';
  try{
    const raw=await window.callAnthropicAPI(ctx.key,ctx.model,sys,usr);
    const parsed=repairJSON(raw);
    return(parsed.degradationFactors||[]).map(df=>({
      id:uid(),text:df.text||'',
      controls:(df.controls||[]).map(c=>({id:uid(),text:typeof c==='string'?c:(c.text||'')}))
    }));
  }catch{return[];}
};



/* ── Barrier types (shared by HAZOP ConBlock + BowTie) ───────────── */
const BARRIER_TYPES={
  Engineering:  {label:'Engineering',  color:'#3b82f6', bg:'#1e3a5f', icon:'⚙'},
  Instrumented: {label:'Instrumented', color:'#8b5cf6', bg:'#2d1f5e', icon:'📡'},
  Administrative:{label:'Administrative',color:'#f59e0b',bg:'#451a03',icon:'📋'},
  PPE:          {label:'PPE',          color:'#22c55e', bg:'#064e3b', icon:'🦺'},
};

/* ── Degradation Factor + CCD editor (used in both HAZOP + BowTie) ─ */
const DegradationEditor=({factors,onChange})=>{
  const addFactor=()=>onChange([...factors,{id:uid(),text:'',controls:[]}]);
  const delFactor=(i)=>onChange(factors.filter((_,j)=>j!==i));
  const updFactor=(i,val)=>onChange(factors.map((f,j)=>j===i?{...f,...val}:f));
  const addCCD=(fi)=>updFactor(fi,{controls:[...factors[fi].controls,{id:uid(),text:''}]});
  const delCCD=(fi,ci)=>updFactor(fi,{controls:factors[fi].controls.filter((_,j)=>j!==ci)});
  const updCCD=(fi,ci,txt)=>updFactor(fi,{controls:factors[fi].controls.map((c,j)=>j===ci?{...c,text:txt}:c)});
  return(
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {factors.map((f,fi)=>(
        <div key={f.id} style={{background:'#150c00',borderRadius:6,border:'1px solid #f59e0b44',padding:'8px 10px'}}>
          <div style={{display:'flex',gap:6,marginBottom:5}}>
            <span style={{fontSize:10,color:'#f59e0b',fontWeight:700,flexShrink:0,marginTop:5,
              background:'#451a03',padding:'1px 5px',borderRadius:3}}>DF{fi+1}</span>
            <input value={f.text} onChange={e=>updFactor(fi,{text:e.target.value})}
              placeholder="What degrades this barrier? (e.g., corrosion, proof test overdue…)"
              style={{flex:1,fontSize:11,padding:'4px 7px'}}/>
            <button onClick={()=>delFactor(fi)}
              style={{fontSize:10,color:'#ef4444',background:'none',border:'none',cursor:'pointer',padding:'0 3px'}}>✕</button>
          </div>
          <div style={{paddingLeft:24}}>
            {f.controls.map((c,ci)=>(
              <div key={c.id} style={{display:'flex',gap:5,marginBottom:3}}>
                <span style={{color:'#22c55e',fontSize:10,flexShrink:0,marginTop:5}}>→</span>
                <input value={c.text} onChange={e=>updCCD(fi,ci,e.target.value)}
                  placeholder="Degradation control / CCD"
                  style={{flex:1,fontSize:11,padding:'3px 6px'}}/>
                <button onClick={()=>delCCD(fi,ci)}
                  style={{fontSize:10,color:'#ef4444',background:'none',border:'none',cursor:'pointer',padding:'0 3px'}}>✕</button>
              </div>
            ))}
            <button onClick={()=>addCCD(fi)}
              style={{fontSize:10,padding:'2px 7px',borderRadius:3,cursor:'pointer',
                background:'transparent',color:'#22c55e',border:'1px solid #22c55e44',marginTop:2}}>+ Add CCD</button>
          </div>
        </div>
      ))}
      <button onClick={addFactor}
        style={{fontSize:10,padding:'4px 10px',borderRadius:3,cursor:'pointer',
          background:'transparent',color:'#f59e0b',border:'1px solid #f59e0b44',fontWeight:600}}>
        ⚠ Add Degradation Factor
      </button>
    </div>
  );
};

/* ── Safeguard card — prevention barrier with DFs + AI suggest ───── */
const SafeguardCard=({sg,onUpdate,onDelete})=>{
  const sgObj=typeof sg==='string'?{id:uid(),text:sg,degradationFactors:[]}:sg;

    <div style={{marginBottom:6,borderRadius:6,overflow:'hidden',border:'1px solid #22c55e44'}}>

/* ── Shared JSON repair utility ─────────────────────────────────────── */
const repairJSON=(raw)=>{
  let s=(raw||'').replace(/```json|```/g,'').trim();
  try{return JSON.parse(s);}catch{}
  const m=s.match(/\{[\s\S]*\}/);
  if(!m)throw new Error('No JSON object found in AI response');
  let j=m[0];
  try{return JSON.parse(j);}catch{}
  j=j.replace(/,\s*([}\]])/g,'$1');
  try{return JSON.parse(j);}catch{}
  const opens=(j.match(/\[/g)||[]).length-(j.match(/\]/g)||[]).length;
  const braces=(j.match(/\{/g)||[]).length-(j.match(/\}/g)||[]).length;
  j=j.replace(/,?\s*"[^"]*$/,'').replace(/,?\s*\{[^}]*$/,'');
  for(let i=0;i<opens+2;i++)j+=']';
  for(let i=0;i<braces+2;i++)j+='}';
  try{return JSON.parse(j);}catch(e){throw new Error('Could not parse AI response. Try again.');}
};

/* ═══════════════════════════════════════════════════════════════════════
   CAUSE & CONSEQUENCE SUGGESTION PANEL
   AI-assisted facilitation tool: generates C&C for HAZOP review
   ═══════════════════════════════════════════════════════════════════════ */
const CCSuggestPanel=({node,deviation,apiKey,aiModel,onApply,onClose})=>{
  const [status,setStatus]=useState('idle'); // idle | loading | done | error
  const [suggestions,setSuggestions]=useState([]);
  const [selected,setSelected]=useState(new Set());
  const [errMsg,setErrMsg]=useState('');
  const [expandedCauses,setExpandedCauses]=useState(new Set());

  /* auto-generate when panel mounts */
  useEffect(()=>{generate();},[]);

  const generate=async()=>{
    if(!apiKey){setErrMsg('No API key — enter it in the API settings bar.');setStatus('error');return;}
    setStatus('loading');setErrMsg('');setSuggestions([]);setSelected(new Set());
    try{
      const sys=`You are a senior HAZOP facilitator with 20+ years in oil & gas. Identify technically credible HAZOP causes and their direct process safety consequences. Return ONLY valid JSON, no explanation.`;
      const usr=`HAZOP CAUSE & CONSEQUENCE IDENTIFICATION

Node: ${node.name} (${node.type||'Process Node'})
Design Intent: ${node.designIntent||'Not specified'}
Fluid / Material: ${node.fluid||'Not specified'}
Operating Conditions: ${node.conditions||'Not specified'}
Node Description: ${node.description||'Not specified'}

HAZOP Deviation: ${deviation.guideWord} ${deviation.parameter}
${deviation.deviation?'Deviation Statement: '+deviation.deviation:''}

TASK: Identify 5-7 credible causes for this deviation and list 2-3 direct consequences per cause.
- Focus on: equipment failures, instrument/control failures, human factors, process upsets, external events
- Be specific to the fluid, pressure regime, and design intent described
- Each consequence should describe the hazard and affected system clearly

Return ONLY this JSON (no markdown, no explanation):
{"causes":[{"text":"Specific credible cause","consequences":["Direct consequence describing hazard and impact","Another consequence"]}]}`;

      const raw=await window.callAnthropicAPI(apiKey,aiModel||'claude-3-haiku-20240307',sys,usr);
      const parsed=repairJSON(raw);
      if(!Array.isArray(parsed.causes)||parsed.causes.length===0)throw new Error('No causes returned');
      const clean=parsed.causes.map((c,i)=>({
        id:'cc_'+i,
        text:typeof c==='string'?c:(c.text||''),
        consequences:Array.isArray(c.consequences)?c.consequences.map(cn=>typeof cn==='string'?cn:(cn.text||'')):[]
      })).filter(c=>c.text);
      setSuggestions(clean);
      setSelected(new Set(clean.map(c=>c.id)));
      setExpandedCauses(new Set(clean.map(c=>c.id)));
      setStatus('done');
    }catch(e){
      setErrMsg(e.message||'Generation failed');
      setStatus('error');
    }
  };

  const toggleCause=(id)=>setSelected(prev=>{
    const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;
  });
  const toggleExpand=(id)=>setExpandedCauses(prev=>{
    const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;
  });
  const selectAll=()=>setSelected(new Set(suggestions.map(c=>c.id)));
  const clearAll=()=>setSelected(new Set());

  const apply=()=>{
    const chosen=suggestions
      .filter(c=>selected.has(c.id))
      .map(c=>({
        id:uid(),
        text:c.text,
        consequences:c.consequences.map(cn=>({id:uid(),text:cn,safeguards:[],recommendations:[]})),
        initialRisk:null,residualRisk:null,recommendations:[]
      }));
    if(chosen.length>0)onApply(chosen);
    onClose();
  };

  return(
    /* ── Backdrop ── */
    <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',justifyContent:'flex-end'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

      }}>

                <span style={{fontSize:20}}>🧠</span> C&C Suggestion Assistant
              </div>

                AI-assisted cause & consequence identification for HAZOP facilitation
              </div>

// ── Node Recommendations Register (extracted component to avoid IIFE in JSX) ──
const NodeRecsPanel=({nodeDevs,nodeName})=>{
  const allRecs=[];
  nodeDevs.forEach((d,di)=>{
    const nd=normalizeDev(d);
    const devLabel=nd.deviation||nd.guideWord+' '+nd.parameter;
    const devNum=di+1;
    nd.causes.forEach((c,ci)=>{
      c.consequences.forEach((cn,qi)=>{
        const ref='D'+devNum+'-C'+(ci+1)+'.'+(qi+1);
        (Array.isArray(cn.recommendations)?cn.recommendations:[]).forEach(r=>{
          const rec=typeof r==='string'?{text:r,actionOwner:'',targetDate:''}:r;
          if(rec.text)allRecs.push({ref,level:'Consequence',devLabel,cause:c.text,con:cn.text,rec});
        });
      });
      (Array.isArray(c.recommendations)?c.recommendations:[]).forEach(r=>{
        const rec=typeof r==='string'?{text:r,actionOwner:'',targetDate:''}:r;
        if(rec.text)allRecs.push({ref:'D'+devNum+'-C'+(ci+1),level:'Cause',devLabel,cause:c.text,con:'—',rec});
      });
    });
    (Array.isArray(nd.recommendations)?nd.recommendations:[]).forEach(r=>{
      const rec=typeof r==='string'?{text:r,actionOwner:'',targetDate:''}:r;
      if(rec.text)allRecs.push({ref:'D'+devNum,level:'Deviation',devLabel,cause:'—',con:'—',rec});
    });
  });
  if(allRecs.length===0)return(
    <div className="card">
      <div style={{fontFamily:'var(--disp)',fontWeight:700,fontSize:13,color:'#3b82f6',marginBottom:8,letterSpacing:'0.06em',textTransform:'uppercase'}}>
        📋 Node Recommendations Register — {nodeName}
      </div>
      <div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>No recommendations entered yet. Add them inside each cause card above.</div>
    </div>
  );
  return(
    <div className="card">
      <div style={{fontFamily:'var(--disp)',fontWeight:700,fontSize:13,color:'#3b82f6',marginBottom:12,letterSpacing:'0.06em',textTransform:'uppercase'}}>
        📋 Node Recommendations Register — {nodeName}
        <span style={{marginLeft:8,fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)',fontWeight:400}}>({allRecs.length} items)</span>
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="tbl" style={{fontSize:11,minWidth:900}}>
          <thead><tr>
            <th style={{width:100}}>Ref</th>
            <th style={{width:85}}>Level</th>
            <th style={{minWidth:120}}>Deviation</th>
            <th style={{minWidth:130}}>Cause</th>
            <th style={{minWidth:200}}>Recommendation</th>
            <th style={{width:130}}>Action Owner</th>
            <th style={{width:95}}>Target Date</th>
            <th style={{width:65}}>Status</th>
          </tr></thead>
          <tbody>
            {allRecs.map((item,idx)=>(
              <tr key={idx}>
                <td style={{fontFamily:'var(--mono)',color:'var(--accent)',fontSize:10,fontWeight:700}}>{item.ref}</td>
                <td>
                  <span style={{fontSize:10,padding:'2px 5px',borderRadius:3,
                    background:item.level==='Consequence'?'#1e3a5f':item.level==='Cause'?'#451a03':'#1a1a2e',
                    color:item.level==='Consequence'?'#93c5fd':item.level==='Cause'?'#f59e0b':'var(--text2)'}}>
                    {item.level}
                  </span>
                </td>
                <td style={{color:'var(--text2)',maxWidth:120,fontSize:11}}>{item.devLabel}</td>
                <td style={{color:'#fca5a5',maxWidth:130,fontSize:11}}>
                  {item.cause&&item.cause.length>55?item.cause.substring(0,55)+'…':item.cause}
                </td>
                <td style={{color:'var(--text1)',lineHeight:1.45}}>→ {item.rec.text}</td>
                <td style={{color:'var(--text2)'}}>
                  {item.rec.actionOwner||<span style={{color:'var(--text3)',fontStyle:'italic'}}>Not assigned</span>}
                </td>
                <td style={{color:'var(--text2)'}}>
                  {item.rec.targetDate||<span style={{color:'var(--text3)',fontStyle:'italic'}}>Not set</span>}
                </td>
                <td>
                  <span style={{fontSize:10,padding:'2px 5px',borderRadius:3,background:'var(--bg-card2)',color:'var(--text3)'}}>Open</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};


// WORKSHEET VIEW ─────────────────────────────────────────────────────
const WorksheetView=({state,setState,apiKey,aiModel})=>{
  const {nodes,deviations,activeNodeId,activeDevId}=state;
  const set=f=>setState(s=>({...s,...f}));
  const activeNode=nodes.find(n=>n.id===activeNodeId);
  const nodeDevs=deviations.filter(d=>d.nodeId===activeNodeId);
  // Set global context for AI suggest in child components
  window._R2S={
    key:apiKey||'',
    model:aiModel||'claude-sonnet-4-6',
    nodeName:activeNode?.name||'',
    deviation:activeDev?.deviation||((activeDev?.guideWord||'')+' '+(activeDev?.parameter||'')),
    fluid:activeNode?.fluid||''
  };
  const activeDev=useMemo(()=>{
    const raw=deviations.find(d=>d.id===activeDevId);
    return raw?normalizeDev(raw):null;
  },[deviations,activeDevId]);

  const updDev=(id,fn)=>setState(s=>({...s,deviations:s.deviations.map(d=>d.id===id?fn(normalizeDev(d)):d)}));
  const updField=(id,k,v)=>updDev(id,d=>({...d,[k]:v}));
  const delDev=id=>setState(s=>({...s,deviations:s.deviations.filter(d=>d.id!==id),activeDevId:s.activeDevId===id?null:s.activeDevId}));

  const addDev=()=>{
    if(!activeNodeId)return;
    const d={id:uid(),nodeId:activeNodeId,guideWord:GUIDE_WORDS[0],parameter:PARAMETERS[0],
      deviation:'',causes:[],recommendations:[],responsible:'',status:'Open',priority:'',dueDate:'',remarks:''};
    setState(s=>({...s,deviations:[...s.deviations,d],activeDevId:d.id}));
  };

  const causeAdd=(devId)=>updDev(devId,d=>({...d,causes:[...d.causes,{id:uid(),text:'',consequences:[],initialRisk:null,residualRisk:null,recommendations:[]}]}));
  const causeUpdate=(devId,cid,text)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,text}:c)}));
  const causeDelete=(devId,cid)=>updDev(devId,d=>({...d,causes:d.causes.filter(c=>c.id!==cid)}));

  const conAdd=(devId,cid)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,consequences:[...c.consequences,{id:uid(),text:'',safeguards:[],recommendations:[]}]}:c)}));
  const conUpdate=(devId,cid,conId,text)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,consequences:c.consequences.map(cn=>cn.id===conId?{...cn,text}:cn)}:c)}));
  const conDelete=(devId,cid,conId)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,consequences:c.consequences.filter(cn=>cn.id!==conId)}:c)}));

  const conSgAdd=(devId,cid,conId,text)=>{
    const obj=typeof text==='string'?{id:uid(),text,degradationFactors:[]}:{id:uid(),degradationFactors:[],...text};
    updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,consequences:c.consequences.map(cn=>cn.id===conId?{...cn,safeguards:[...(cn.safeguards||[]),obj]}:cn)}:c)}));
  };
  const conSgUpdate=(devId,cid,conId,sgId,updates)=>updDev(devId,d=>({...d,
    causes:d.causes.map(c=>c.id===cid?{...c,
      consequences:c.consequences.map(cn=>cn.id===conId?{...cn,
        safeguards:(cn.safeguards||[]).map(s=>s.id===sgId?{...s,...updates}:s)
      }:cn)
    }:c)
  }));
  const conSgDel=(devId,cid,conId,i)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,consequences:c.consequences.map(cn=>cn.id===conId?{...cn,safeguards:(cn.safeguards||[]).filter((_,j)=>j!==i)}:cn)}:c)}));
  const conRecAdd=(devId,cid,conId,rec)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,consequences:c.consequences.map(cn=>cn.id===conId?{...cn,recommendations:[...(cn.recommendations||[]),typeof rec==='string'?{id:uid(),text:rec,actionOwner:'',targetDate:''}:rec]}:cn)}:c)}));
  const conRecDel=(devId,cid,conId,i)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,consequences:c.consequences.map(cn=>cn.id===conId?{...cn,recommendations:(cn.recommendations||[]).filter((_,j)=>j!==i)}:cn)}:c)}));
  const conRecEdit=(devId,cid,conId,i,updated)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,consequences:c.consequences.map(cn=>cn.id===conId?{...cn,recommendations:(cn.recommendations||[]).map((r,j)=>j===i?{...r,...updated}:r)}:cn)}:c)}));

  const causeRiskUpdate=(devId,cid,type,risk)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,[type]:risk}:c)}));
  const causeRecAdd=(devId,cid,rec)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,recommendations:[...(c.recommendations||[]),typeof rec==='string'?{id:uid(),text:rec,actionOwner:'',targetDate:''}:rec]}:c)}));
  const causeRecDel=(devId,cid,i)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,recommendations:(c.recommendations||[]).filter((_,j)=>j!==i)}:c)}));
  const causeRecEdit=(devId,cid,i,updated)=>updDev(devId,d=>({...d,causes:d.causes.map(c=>c.id===cid?{...c,recommendations:(c.recommendations||[]).map((r,j)=>j===i?{...r,...updated}:r)}:c)}));
  // ── Mitigation barrier update (replaces whole array for the consequence) ──
  const conMitUpdate=(devId,cid,conId,newMbs)=>updDev(devId,d=>({...d,
    causes:d.causes.map(c=>c.id===cid?{...c,
      consequences:c.consequences.map(cn=>cn.id===conId?{...cn,mitigationBarriers:newMbs}:cn)
    }:c)
  }));
  const recAdd=(devId,txt)=>updDev(devId,d=>({...d,recommendations:[...(d.recommendations||[]),txt]}));
  const recDel=(devId,i)=>updDev(devId,d=>({...d,recommendations:(d.recommendations||[]).filter((_,j)=>j!==i)}));

  const [showCCSuggest,setShowCCSuggest]=useState(false);

  /* Apply C&C suggestions from the drawer — appends causes to active deviation */
  const applyCCSuggestions=(newCauses)=>{
    if(!activeDev||!newCauses||newCauses.length===0)return;
    updDev(activeDev.id,d=>({...d,causes:[...d.causes,...newCauses]}));
  };

  const generateAI=async()=>{
    if(!activeDev||!activeNode)return;
    if(!apiKey){alert('Please enter your Anthropic API key in the API settings bar (click API in header).');return;}
    setState(s=>({...s,isGenerating:true}));
    const deviation=activeDev.deviation||`${activeDev.guideWord} ${activeDev.parameter}`;
    const sys=`You are a HAZOP expert. Generate cause-by-cause analysis. Return ONLY valid JSON.`;
    const usr=`Generate a HAZOP analysis for the deviation below. Return ONLY valid JSON, no explanation.

Node: ${activeNode.name} (${activeNode.type})
Intent: ${activeNode.designIntent||'Not specified'}
Fluid: ${activeNode.fluid||'Not specified'}
Conditions: ${activeNode.conditions||'Not specified'}
Deviation: ${activeDev.guideWord} ${activeDev.parameter}

JSON structure (no markdown, respond with JSON only):
{"deviationDescription":"statement","causes":[{"text":"cause","consequences":[{"text":"consequence [SEVERITY]","safeguards":["safeguard1","safeguard2"],"recommendations":["rec1"]}],"recommendations":["cause-level rec"],"initialSeverity":4,"initialLikelihood":"D","residualSeverity":2,"residualLikelihood":"C"}]}

Generate 3-4 causes, 2 consequences each with 1-2 safeguards and 1 recommendation per consequence, 2 cause-level recommendations. For oil/gas: H2S, fire, explosion, LOC, BLEVE.`;

    try{
      const txt=await window.callAnthropicAPI(apiKey,aiModel||'claude-3-haiku-20240307',sys,usr);
      const parsed=repairJSON(txt);
      const newCauses=(parsed.causes||[]).map(c=>{
        const is=c.initialSeverity,il=c.initialLikelihood,rs=c.residualSeverity,rl=c.residualLikelihood;
        const iCat=is&&il?RMATRIX[is]?.[il]:null;
        const rCat=rs&&rl?RMATRIX[rs]?.[rl]:null;
        return{
          id:uid(), text:typeof c==='string'?c:(c.text||''),
          initialRisk:is&&il&&iCat?{s:is,l:il,cat:iCat}:null,
          residualRisk:rs&&rl&&rCat?{s:rs,l:rl,cat:rCat}:null,
          recommendations:Array.isArray(c.recommendations)?c.recommendations:[],
          consequences:Array.isArray(c.consequences)?c.consequences.map(cn=>({
            id:uid(),
            text:typeof cn==='string'?cn:(cn.text||''),
            safeguards:Array.isArray(cn.safeguards)?cn.safeguards:(cn.safeguard?[cn.safeguard]:[]),
            recommendations:Array.isArray(cn.recommendations)?cn.recommendations:[]
          })):[]
        };
      });
      setState(s=>({...s,isGenerating:false,
        deviations:s.deviations.map(d=>d.id===activeDevId?{
          ...normalizeDev(d),
          deviation:parsed.deviationDescription||deviation,
          causes:[...normalizeDev(d).causes,...newCauses],
          recommendations:[...(normalizeDev(d).recommendations||[]),...(parsed.generalRecommendations||[]).map(r=>typeof r==='string'?{id:uid(),text:r,actionOwner:'',targetDate:''}:{id:uid(),actionOwner:'',targetDate:'',...r})],
        }:d)
      }));
    }catch(e){
      setState(s=>({...s,isGenerating:false}));
      const msg=e.message||'';
      if(msg.includes('Invalid or missing')||msg.includes('sk-ant'))alert('API Key issue: '+msg+'\n\nClick API in header to set your key.');
      else if(msg.includes('not_found')||msg.includes('404'))alert('Model not found (404).\n\nClick API in header and select a different model.\nRecommended: Claude 3 Haiku.');
      else if(msg.includes('401')||msg.includes('authentication'))alert('Authentication failed.\n\nYour API key is invalid. Get a new one at console.anthropic.com.');
      else alert('AI generation failed: '+msg+'\n\nTry a different model in API settings.');
    }
  };

  const devLabel=(d,i)=>`${String(i+1).padStart(2,'0')} · ${d.guideWord.split('/')[0].trim()} ${d.parameter}`;

  return(
    <>
    <div className="main" style={{flex:1,overflow:'hidden'}}>
      <div className="sidebar" style={{width:220}}>
        <div className="sec-hdr" style={{flexDirection:'column',alignItems:'flex-start',gap:8}}>
          <div style={{width:'100%'}}>
            <label>Active Node</label>

// RISK MATRIX OVERVIEW ────────────────────────────────────────────────
const MatrixView=({deviations,nodes})=>{
  const rows=[6,5,4,3,2,1];
  const cols=['A','B','C','D','E','F'];
  const allCauseRisks=deviations.flatMap(d=>{
    const nd=normalizeDev(d);
    return(nd.causes||[]).map(c=>({...c,devLabel:d.deviation||d.guideWord+' '+d.parameter}));
  });
  const getCellDevs=(s,l)=>allCauseRisks.filter(c=>c.initialRisk&&c.initialRisk.s===s&&c.initialRisk.l===l);
  const totalHigh=allCauseRisks.filter(c=>c.initialRisk&&[1,2].includes(c.initialRisk.cat)).length;
  const totalMed=allCauseRisks.filter(c=>c.initialRisk&&c.initialRisk.cat===3).length;
  const totalLow=allCauseRisks.filter(c=>c.initialRisk&&c.initialRisk.cat===4).length;
  const unranked=allCauseRisks.filter(c=>!c.initialRisk).length;
  const totalCauses=allCauseRisks.length;
  return(
    <div className="scrollable" style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:20,minHeight:0,overflowY:'auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        {[['HIGH Risk (causes)',totalHigh,'var(--red)'],['MEDIUM Risk (causes)',totalMed,'var(--warning)'],['LOW Risk (causes)',totalLow,'var(--green)'],['Unranked Causes',unranked,'var(--text3)']].map(([l,v,c])=>(
          <div key={l} className="card" style={{textAlign:'center'}}>
            <div style={{fontSize:36,fontFamily:'var(--mono)',fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>{l}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{totalCauses>0?Math.round(v/totalCauses*100):0}% of causes</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{fontFamily:'var(--disp)',fontSize:15,fontWeight:700,color:'var(--accent)',marginBottom:16,letterSpacing:'0.06em',textTransform:'uppercase'}}>ADNOC Corporate Risk Matrix — Per-Cause Initial Risk Distribution</div>
        <div className="matrix-grid" style={{gap:4}}>
          <div className="matrix-cell matrix-header" style={{fontSize:10}}>S / L →</div>
          {cols.map(c=>(
            <div key={c} className="matrix-cell matrix-header" style={{flexDirection:'column',gap:2,fontSize:11}}>
              <strong>{c}</strong><span style={{fontSize:9,color:'var(--text3)',fontWeight:400}}>{LNAMES[c]}</span>
            </div>
          ))}
          {rows.map(s=>(
            <React.Fragment key={s}>
              <div className="matrix-cell matrix-header" style={{flexDirection:'column',gap:1,fontSize:11}}>
                <strong>S{s}</strong><span style={{fontSize:9,color:'var(--text3)',fontWeight:400}}>{SNAMES[s].substring(0,7)}</span>
              </div>
              {cols.map(l=>{
                const cat=RMATRIX[s][l];
                const cellDevs=getCellDevs(s,l);
                return(
                  <div key={l} className={`matrix-cell ${RDISP[cat].cls}`}
                    style={{flexDirection:'column',gap:2,padding:'6px 4px',minHeight:52}}
                    title={cellDevs.length?cellDevs.map(c=>`• ${c.text||c.devLabel}`).join('\n'):'No causes at this level'}>
                    <div style={{fontSize:11,fontWeight:700}}>{s}{l}</div>
                    {cellDevs.length>0&&<div style={{fontSize:16,fontWeight:700,lineHeight:1}}>{cellDevs.length}</div>}
                    <div style={{fontSize:9}}>{RDISP[cat].label}</div>
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
        <div style={{marginTop:12,fontSize:12,color:'var(--text2)'}}>Numbers in cells = count of causes at that risk level.</div>
      </div>
      <div className="card">
        <div style={{fontFamily:'var(--disp)',fontSize:14,fontWeight:700,color:'var(--accent)',marginBottom:12,letterSpacing:'0.06em',textTransform:'uppercase'}}>Risk Category & Management Sign-Off</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[1,2,3,4].map(cat=>(
            <div key={cat} className={`card2 ${RDISP[cat].cls}`} style={{border:'none',opacity:0.9}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{RDISP[cat].label} — {RDISP[cat].cat}</div>
              <div style={{fontSize:12,lineHeight:1.5,opacity:0.85}}>{RDISP[cat].sign}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ACTIONS VIEW ────────────────────────────────────────────────────────
const ActionsView=({deviations,nodes,setState})=>{
  const toRec=(r)=>typeof r==='string'?{text:r,actionOwner:'',targetDate:''}:(r||{text:'',actionOwner:'',targetDate:''});
  const allActions=deviations.flatMap(d=>{
    const nd=normalizeDev(d);
    const node=nodes.find(n=>n.id===d.nodeId);
    return(nd.causes||[]).flatMap(c=>[
      ...c.consequences.flatMap(cn=>(cn.recommendations||[]).map((r,i)=>{const rec=toRec(r);return{devId:d.id,causeId:c.id,conId:cn.id,recIdx:i,type:'consequence',text:rec.text,actionOwner:rec.actionOwner,targetDate:rec.targetDate,causeText:c.text,conText:cn.text,deviation:d.deviation||d.guideWord+' '+d.parameter,nodeName:node?.name||'',status:d.status,responsible:d.responsible,priority:d.priority,initialRisk:c.initialRisk,residualRisk:c.residualRisk};})),
      ...(c.recommendations||[]).map((r,i)=>{const rec=toRec(r);return{devId:d.id,causeId:c.id,recIdx:i,type:'cause',text:rec.text,actionOwner:rec.actionOwner,targetDate:rec.targetDate,causeText:c.text,deviation:d.deviation||d.guideWord+' '+d.parameter,nodeName:node?.name||'',status:d.status,responsible:d.responsible,priority:d.priority,initialRisk:c.initialRisk,residualRisk:c.residualRisk};})
    ]);
  });
  const openCount=allActions.filter(a=>a.status==='Open'||!a.status).length;
  return(
    <div className="scrollable" style={{flex:1,padding:20,minHeight:0,overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontFamily:'var(--disp)',fontSize:18,fontWeight:700}}>Action Register</div>
        <div style={{display:'flex',gap:8}}>
          <span className="badge badge-none">{allActions.length} actions</span>
          <span className="badge badge-hi">{openCount} Open</span>

      {allActions.length===0?
        <div className="empty-state"><div className="empty-icon">☑</div><div style={{color:'var(--text2)'}}>No actions yet. Add recommendations inside consequence rows or cause cards.</div></div>:
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {allActions.map((a,idx)=>(
            <div key={idx} className="card" style={{borderLeft:`3px solid ${a.initialRisk?[1,2].includes(a.initialRisk.cat)?'#ef4444':a.initialRisk.cat===3?'#f59e0b':'#22c55e':'var(--border)'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:8}}>
                <div>
                  <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)'}}>{a.nodeName} · {a.deviation}</span>
                  <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>
                    {a.type==='consequence'?`Consequence: ${a.conText?.substring(0,60)}…`:`Cause: ${a.causeText?.substring(0,60)}…`}
                  </div>
                  <div style={{fontWeight:600,fontSize:13,color:'var(--text1)',marginTop:4}}>→ {a.text}</div>
                  {(a.actionOwner||a.targetDate)&&(
                    <div style={{display:'flex',gap:12,marginTop:5,flexWrap:'wrap'}}>
                      {a.actionOwner&&<span style={{fontSize:11,color:'var(--text3)'}}>👤 <span style={{color:'var(--text2)'}}>{a.actionOwner}</span></span>}
                      {a.targetDate&&<span style={{fontSize:11,color:a.targetDate&&new Date(a.targetDate)<new Date()?'#ef4444':'var(--text3)'}}>📅 <span style={{color:'inherit'}}>{a.targetDate}</span></span>}
                    </div>
                  )}

// REPORT VIEW ─────────────────────────────────────────────────────────
const ReportView=({study,nodes,deviations})=>{
  const [tab,setTab]=useState('worksheet'); // 'worksheet' | 'recs'
  const handlePrint=()=>window.print();

  /* ── Build flat rows for all nodes/deviations ── */
  const buildRows=()=>{
    const rows=[];
    nodes.forEach((node,ni)=>{
      const nodeDevs=deviations.filter(d=>d.nodeId===node.id);
      nodeDevs.forEach((d,di)=>{
        const nd=normalizeDev(d);
        const devLabel=nd.deviation||`${nd.guideWord} ${nd.parameter}`;
        nd.causes.forEach((cause,ci)=>{
          const causeRef=`C${ci+1}`;
          const cons=cause.consequences.length>0?cause.consequences:[{id:'none',text:'',safeguards:[],recommendations:[]}];
          cons.forEach((con,qi)=>{
            const conRef=`${causeRef}.${qi+1}`;
            const sgs=(Array.isArray(con.safeguards)?con.safeguards:(con.safeguard?[{text:con.safeguard}]:[])).map(s=>typeof s==='string'?s:(s?.text||'')).filter(Boolean); const mbs=(Array.isArray(con.mitigationBarriers)?con.mitigationBarriers:[]).filter(m=>m&&m.text);
            const conRecs=(Array.isArray(con.recommendations)?con.recommendations:[]).map(r=>typeof r==='string'?{text:r,actionOwner:'',targetDate:''}:r);
            const causeRecs=(Array.isArray(cause.recommendations)?cause.recommendations:[]).map(r=>typeof r==='string'?{text:r,actionOwner:'',targetDate:''}:r);
            const allRecs=[...conRecs.map(r=>({...r,fromRef:conRef})),...causeRecs.map(r=>({...r,fromRef:causeRef}))];
            rows.push({
              nodeNum:ni+1,nodeName:node.name,nodeDesc:node.description||'',
              devNum:di+1,devLabel,guideWord:nd.guideWord,parameter:nd.parameter,
              devRef:`D${di+1}`,causeRef,conRef,
              causeText:cause.text,conText:con.text,
              safeguards:sgs,allRecs,
              initialRisk:cause.initialRisk,residualRisk:cause.residualRisk,
              responsible:nd.responsible||'',status:nd.status||'Open'
            });
          });
        });
        if(nd.causes.length===0){
          rows.push({
            nodeNum:ni+1,nodeName:node.name,nodeDesc:node.description||'',
            devNum:di+1,devLabel,guideWord:nd.guideWord,parameter:nd.parameter,
            devRef:`D${di+1}`,causeRef:'—',conRef:'—',
            causeText:'',conText:'',safeguards:[],allRecs:[],
            initialRisk:null,residualRisk:null,
            responsible:nd.responsible||'',status:nd.status||'Open'
          });
        }
      });
    });
    return rows;
  };

  /* ── Excel export using SheetJS ── */
  const exportExcel=()=>{
    if(typeof XLSX==='undefined'){alert('SheetJS not loaded. Check internet connection.');return;}
    const wb=XLSX.utils.book_new();

    /* Sheet 1: HAZOP Worksheet */
    const wsData=[];
    wsData.push([`HAZOP WORKSHEET — ${study.projectName||'Project'}`,'','','','','','Initial Risk','','','','Residual Risk','','','','','','']);
    wsData.push([`Facility: ${study.facility||''}   |   Date: ${study.date||''}   |   Rev: ${study.revision||'0'}   |   Ref: ${study.docRef||''}`,'','','','','','Severity','Likelihood','Category','','Severity','Likelihood','Category','','','','']);
    wsData.push(['Ref','Node','Deviation','Cause Ref','Cause','Consequence Ref','Consequence','Safeguards','Init. Severity','Init. Likelihood','Init. Category','Recommendation','Action Owner','Target Date','Resid. Severity','Resid. Likelihood','Resid. Category']);

    const rows=buildRows();
    rows.forEach(r=>{
      const sText=r.initialRisk?`S${r.initialRisk.s}`:'';
      const sL=r.initialRisk?r.initialRisk.l:'';
      const sC=r.initialRisk?RDISP[r.initialRisk.cat].label:'';
      const rText=r.residualRisk?`S${r.residualRisk.s}`:'';
      const rL=r.residualRisk?r.residualRisk.l:'';
      const rC=r.residualRisk?RDISP[r.residualRisk.cat].label:'';
      if(r.allRecs.length===0){
        wsData.push([`${r.devRef}-${r.conRef}`,r.nodeName,r.devLabel,r.causeRef,r.causeText,r.conRef,r.conText,r.safeguards.join('\n'),sText,sL,sC,'','','',rText,rL,rC]);
      } else {
        r.allRecs.forEach((rec,ri)=>{
          wsData.push([
            ri===0?`${r.devRef}-${r.conRef}`:'',ri===0?r.nodeName:'',ri===0?r.devLabel:'',
            ri===0?r.causeRef:'',ri===0?r.causeText:'',ri===0?r.conRef:'',ri===0?r.conText:'',
            ri===0?r.safeguards.join('\n'):'',
            ri===0?sText:'',ri===0?sL:'',ri===0?sC:'',
            rec.text,rec.actionOwner||'',rec.targetDate||'',
            ri===0?rText:'',ri===0?rL:'',ri===0?rC:''
          ]);
        });
      }
    });
    const ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=[{wch:14},{wch:20},{wch:22},{wch:8},{wch:28},{wch:8},{wch:28},{wch:30},{wch:8},{wch:8},{wch:10},{wch:35},{wch:18},{wch:12},{wch:8},{wch:8},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,'HAZOP Worksheet');

    /* Sheet 2: Consolidated Recommendations */
    const recData=[['#','Node','Dev Ref','Cause Ref','Con Ref','Deviation','Cause','Recommendation','Action Owner','Target Date','Status']];
    let recNo=1;
    rows.forEach(r=>{
      r.allRecs.forEach(rec=>{
        recData.push([recNo++,r.nodeName,r.devRef,r.causeRef,r.conRef,r.devLabel,r.causeText,rec.text,rec.actionOwner||'',rec.targetDate||'','Open']);
      });

    const ws2=XLSX.utils.aoa_to_sheet(recData);
    ws2['!cols']=[{wch:5},{wch:20},{wch:8},{wch:8},{wch:8},{wch:22},{wch:25},{wch:40},{wch:18},{wch:12},{wch:8}];
    XLSX.utils.book_append_sheet(wb,ws2,'Recommendations');

    XLSX.writeFile(wb,`HAZOP_${(study.projectName||'study').replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.xlsx`);
  };

  const handleExportJSON=()=>{
    const data={study,nodes,deviations,exported:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`HAZOP_${study.projectName||'study'}_${new Date().toISOString().split('T')[0]}.json`;a.click();
  };

  const rows=buildRows();
  const allConsolidatedRecs=rows.flatMap((r,ri)=>r.allRecs.map((rec,i)=>({...rec,row:r,recNo:ri*100+i})));
  let globalRecNo=1;
  const numberedRecs=rows.flatMap(r=>r.allRecs.map(rec=>({rec,row:r,n:globalRecNo++})));

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

            <button key={t} onClick={()=>setTab(t)}

        {/* ── Study Header ── */}

            {/* HAZOP Worksheet table — one per node */}

                              <td style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--accent)',textAlign:'center',verticalAlign:'top',paddingTop:6}}>{r.devRef}-{r.conRef}</td>

                              </td>
                              <td style={{textAlign:'center',verticalAlign:'top'}}>{r.initialRisk?<strong style={{color:'#fde68a',fontFamily:'var(--mono)'}}>S{r.initialRisk.s}</strong>:'—'}</td>

                                    {(rec.fromRef&&rec.fromRef!==r.conRef)&&<div style={{fontSize:9,color:'var(--text3)'}}>From {rec.fromRef}</div>}

                                ))}

                              </td>
                              <td style={{verticalAlign:'top'}}>
                                {r.allRecs.map((rec,i)=>(
                                  <div key={i} style={{marginBottom:4,paddingBottom:4,color:'var(--text2)',fontSize:10,borderBottom:i<r.allRecs.length-1?'1px solid var(--border)':''}}>
                                    {rec.actionOwner||<span style={{color:'var(--text3)',fontStyle:'italic'}}>Not assigned</span>}
                                  </div>

                                {r.allRecs.map((rec,i)=>(

                                    {rec.targetDate||<span style={{color:'var(--text3)',fontStyle:'italic'}}>—</span>}
                                  </div>
                                ))}
                              </td>
                              <td style={{textAlign:'center',verticalAlign:'top'}}>{r.residualRisk?<strong style={{color:'#86efac',fontFamily:'var(--mono)'}}>S{r.residualRisk.s}</strong>:'—'}</td>
                              <td style={{textAlign:'center',verticalAlign:'top'}}>{r.residualRisk?<strong style={{color:'#86efac',fontFamily:'var(--mono)'}}>{r.residualRisk.l}</strong>:'—'}</td>
                              <td style={{textAlign:'center',verticalAlign:'top'}}>{r.residualRisk?<RiskBadge cat={r.residualRisk.cat} small/>:'—'}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab==='recs'&&(
          <div>
            <div className="card" style={{marginBottom:20}}>
              <div style={{fontFamily:'var(--disp)',fontWeight:700,fontSize:14,color:'#3b82f6',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>
                Consolidated Recommendations Register
              </div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:14}}>{numberedRecs.length} recommendations across {nodes.length} node(s) · {deviations.length} deviation(s)</div>
              <div style={{overflowX:'auto'}}>
                <table className="tbl" style={{fontSize:11,minWidth:900}}>
                  <thead><tr>
                    <th style={{width:35,textAlign:'center'}}>#</th>
                    <th style={{width:90}}>Ref</th>
                    <th style={{width:80}}>Node</th>
                    <th style={{minWidth:110}}>Deviation</th>
                    <th style={{minWidth:110}}>Cause</th>
                    <th style={{minWidth:200}}>Recommendation</th>
                    <th style={{width:120}}>Action Owner</th>

                  </tr></thead>

                    {numberedRecs.length===0&&(
                      <tr><td colSpan={9} style={{textAlign:'center',color:'var(--text3)',fontStyle:'italic',padding:20}}>No recommendations entered yet. Add them in the Worksheet tab.</td></tr>

                      <tr key={n}>
