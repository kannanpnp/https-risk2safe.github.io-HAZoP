<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk2Safe HAZoP — AI-Powered HAZOP Study System</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
  import Anthropic from 'https://esm.sh/@anthropic-ai/sdk@0.36.3';
  window._Anthropic = Anthropic;
  window._anthropicReady = true;
  console.log('[Risk2Safe] Anthropic SDK ready');
</script>
<script>
  window._anthropicReady = window._anthropicReady || false;
  window.callAnthropicAPI = async function(apiKey, model, systemPrompt, userPrompt) {
    let waited = 0;
    while (!window._anthropicReady && waited < 8000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    if (!window._Anthropic) throw new Error('Anthropic SDK failed to load. Check internet connection and try refreshing.');
    if (!apiKey || !apiKey.trim().startsWith('sk-ant')) throw new Error('Invalid or missing API key. Click "API" in the header and enter your key (starts with sk-ant-...).');
    const client = new window._Anthropic({ apiKey: apiKey.trim(), dangerouslyAllowBrowser: true });
    const message = await client.messages.create({
      model: model,
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    });
    return message.content[0].text;
  };
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#07101f;
  --bg-surface:#0e1b2e;
  --bg-card:#162236;
  --bg-card2:#1c2d45;
  --bg-hover:#1e3152;
  --border:#1d3452;
  --border2:#264872;
  --accent:#f59e0b;
  --accent2:#fbbf24;
  --accent-dim:#78350f;
  --blue:#3b82f6;
  --blue-dim:#1d3a6e;
  --green:#22c55e;
  --red:#ef4444;
  --orange:#f97316;
  --text1:#e2e8f0;
  --text2:#94a3b8;
  --text3:#475569;
  --mono:'IBM Plex Mono',monospace;
  --disp:'Rajdhani',sans-serif;
  --body:'Inter',sans-serif;
}
body{background:var(--bg-base);color:var(--text1);font-family:var(--body);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;background:var(--bg-card2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;outline:none;width:100%;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--bg-card)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.scrollable{overflow-y:auto;min-height:0;min-width:0}
/* HEADER */
.hdr{display:flex;align-items:center;gap:16px;padding:0 20px;height:52px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.logo{font-family:var(--disp);font-size:22px;font-weight:700;letter-spacing:0.05em;color:var(--text1);white-space:nowrap}
.logo span{color:var(--accent)}
.hdr-study{font-size:12px;color:var(--text2);font-family:var(--mono);border-left:1px solid var(--border);padding-left:16px;margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:0.04em}
.badge-hi{background:#7f1d1d;color:#fca5a5}
.badge-hi2{background:#7c2d12;color:#fdba74}
.badge-med{background:#713f12;color:#fde68a}
.badge-lo{background:#14532d;color:#86efac}
.badge-none{background:var(--bg-card2);color:var(--text2)}
/* NAV */
.nav{display:flex;align-items:stretch;padding:0 4px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:2px}
.nav-btn{padding:8px 18px;font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:0.08em;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;position:relative;text-transform:uppercase}
.nav-btn:hover{color:var(--text1);background:var(--bg-card)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-count{position:absolute;top:6px;right:8px;background:var(--accent);color:#000;border-radius:10px;padding:0 5px;font-size:10px;font-weight:700;min-width:16px;text-align:center}
/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:240px;flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
/* SECTION HEADER */
.sec-hdr{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px}
.sec-title{font-family:var(--disp);font-size:16px;font-weight:700;letter-spacing:0.06em;color:var(--accent);text-transform:uppercase}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-weight:500;transition:all 0.15s;white-space:nowrap;font-size:13px}
.btn-primary{background:var(--accent);color:#000;font-weight:600}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg-card2);color:var(--text1);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--accent)}
.btn-ghost{color:var(--text2);padding:6px 10px}
.btn-ghost:hover{color:var(--text1);background:var(--bg-card2)}
.btn-danger{background:#7f1d1d;color:#fca5a5;border:1px solid #b91c1c}
.btn-danger:hover{background:#991b1b}
.btn-ai{background:linear-gradient(135deg,#1d3a6e,#1e3a8a);color:#93c5fd;border:1px solid #2563eb;font-weight:600}
.btn-ai:hover{background:linear-gradient(135deg,#1e3a8a,#1d4ed8)}
.btn-ai:disabled{opacity:0.5;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:12px}
/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px}
.card2{background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;padding:12px}
/* FORM */
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-row-2{grid-template-columns:1fr 1fr}
.form-row-3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
/* RISK MATRIX */
.matrix-grid{display:grid;grid-template-columns:66px repeat(6,1fr);gap:2px}
.matrix-cell{display:flex;align-items:center;justify-content:center;padding:5px 3px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);text-align:center;cursor:default;transition:all 0.15s;border:1px solid transparent;user-select:none;min-height:40px}
.matrix-cell.clickable{cursor:pointer}
.matrix-cell.clickable:hover{filter:brightness(1.3);border-color:rgba(255,255,255,0.3)}
.matrix-cell.selected{border-color:#fff !important;box-shadow:0 0 0 2px rgba(255,255,255,0.5)}
.matrix-header{background:var(--bg-card2);color:var(--text2);font-size:10px;font-weight:600;border-radius:4px;border:1px solid var(--border);padding:4px 2px}
.risk-1{background:#7f1d1d;color:#fca5a5}
.risk-2{background:#7c2d12;color:#fdba74}
.risk-3{background:#713f12;color:#fde68a}
.risk-4{background:#14532d;color:#86efac}
/* WORKSHEET */
.dev-list-item{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;display:flex;flex-direction:column;gap:4px}
.dev-list-item:hover{background:var(--bg-hover)}
.dev-list-item.active{background:var(--bg-hover);border-left:3px solid var(--accent)}
.dev-tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg-card2);color:var(--text2);display:inline-block}
.dev-tag-gw{background:#1a2d50;color:#93c5fd}
/* LISTS for analysis */
.analysis-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.analysis-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg-card2);border:1px solid var(--border);border-radius:6px;font-size:13px;line-height:1.5}
.analysis-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.analysis-item-dot.cause{background:#f59e0b}
.analysis-item-dot.consequence{background:#ef4444}
.analysis-item-dot.safeguard{background:#22c55e}
.analysis-item-dot.recommendation{background:#3b82f6}
.analysis-item-text{flex:1;color:var(--text1)}
.analysis-item-del{opacity:0;transition:opacity 0.12s;color:var(--red);font-size:11px;flex-shrink:0}
.analysis-item:hover .item-actions{opacity:1!important}
.analysis-item:hover{background:var(--bg-hover)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
/* Cause · Consequence · Safeguard nested layout */
.cause-card{border:1px solid var(--border2);border-left:3px solid #f59e0b;border-radius:8px;overflow:hidden;margin-bottom:12px}
.cause-hdr{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg-card2);border-bottom:1px solid #f59e0b33}
.cause-body{padding:10px 12px;background:var(--bg-card);display:flex;flex-direction:column;gap:6px}
.con-block{border:1px solid var(--border);border-left:3px solid #ef444466;border-radius:6px;overflow:hidden;margin-bottom:4px}
.con-hdr{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg-card2)}
.sg-row{display:flex;align-items:flex-start;gap:8px;padding:7px 10px 8px 20px;background:#0b1c11;border-top:1px solid #1a3324}
.add-row-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer;border:1px dashed;background:transparent;font-family:var(--body);transition:all 0.15s;margin-top:2px}

.analysis-item:hover .analysis-item-del{opacity:1}
/* STATUS */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg-surface)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
.tbl tr:hover td{background:var(--bg-hover)}
/* API KEY */
.api-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--accent-dim);border-bottom:1px solid #92400e;flex-shrink:0}
.api-bar input{background:#1c0f02;border-color:#92400e;color:var(--accent2);font-family:var(--mono);font-size:12px;width:360px}
/* GENERATING */
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* REPORT */
@media print{
  .nav,.hdr,.api-bar,.btn,.sidebar{display:none!important}
  body{background:#fff;color:#000}
  .content{overflow:visible!important}
  .report-page{padding:20px!important}
}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--text3);text-align:center}
.empty-icon{font-size:48px;opacity:0.4}
.divider{height:1px;background:var(--border);margin:12px 0}
.tooltip{position:relative}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0f1e33;color:var(--text1);padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none;border:1px solid var(--border2);z-index:100}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect,useMemo}=React;

/* ─── CONSTANTS ─────────────────────────────────────── */
const GUIDE_WORDS=['NO / NONE','MORE','LESS','AS WELL AS','PART OF','REVERSE','OTHER THAN','EARLY','LATE'];
const PARAMETERS=['FLOW','PRESSURE','TEMPERATURE','LEVEL','COMPOSITION','CONCENTRATION','PHASE','VISCOSITY','REACTION RATE','AGITATION / MIXING','SEQUENCE','SIGNAL / CONTROL','UTILITY / SERVICE','TIME'];
const SNAMES={1:'Notable',2:'Minor',3:'Serious',4:'Major',5:'Catastrophic',6:'Disastrous'};
const SDESC={1:'Slight injuries, short-term effects, near miss',2:'Minor injuries, reversible effects, first aid',3:'Serious injuries, RIDDOR reportable, LTI',4:'Single fatality or permanent total disability',5:'Multiple fatalities (2-10), major asset damage',6:'Multiple fatalities (>10), catastrophic damage, business continuity impact'};
const LNAMES={A:'Term',B:'Rare',C:'Unlikely',D:'Possible',E:'Likely',F:'Almost Certain'};
const LDESC={A:"Hasn't happened in industry in last 50 years (10⁻⁶ - 10⁻⁵ /yr)",B:'Could happen in industry next 20-30 years (10⁻⁵ - 10⁻⁴ /yr)',C:'Could be incurred within a 5-10 year time frame (10⁻⁴ - 10⁻³ /yr)',D:'Could be incurred within 5 year Strategic Planning period (10⁻³ - 10⁻² /yr)',E:'Could be incurred more than once per year budget period (10⁻² - 10⁻¹ /yr)',F:'Could be incurred more than once on site (10⁻¹ - 1 /yr)'};

/* Full severity impact table */
const SDETAIL={
  6:{people:'Multiple fatalities (>10) / Widespread permanent disabilities',asset:'>= $1 Billion / Catastrophic asset loss',env:'Catastrophic irreversible environmental damage, exceeding all limits, persistent contamination',rep:'Prolonged international impact on company and industry; potential licence revocation'},
  5:{people:'Multiple fatalities (2-10) / Multiple permanent total disabilities',asset:'$100M to <$1B / Major asset destruction, extended production loss',env:'Disastrous environmental impact beyond site, serious long-term damage',rep:'Serious adverse international media coverage; prolonged reputational impact on Group'},
  4:{people:'Single worker fatality OR permanent total disability / Serious injury to public',asset:'$10M to <$100M / Significant plant damage, long shutdown',env:'Major impact on surrounding environment; repeated non-compliance with regulations',rep:'Significant national media attention; potential prosecution, regulatory sanctions'},
  3:{people:'Serious injuries requiring hospitalisation / Reversible partial disability / RIDDOR reportable',asset:'$1M to <$10M / Equipment damage requiring major repair, production loss',env:'Local environmental effect; non-repeated breach of regulatory limits',rep:'Considerable local media/government attention; moderate fines or regulatory action'},
  2:{people:'Minor injuries (first aid / RIDDOR near miss) / Temporary health effects',asset:'$100K to <$1M / Minor asset damage, short-term production impact',env:'Minor, recoverable environmental effects within site boundary',rep:'Limited local media impact; minor regulatory notification or warning'},
  1:{people:'Slight injuries / Near miss / Short-term health effects / No lost time',asset:'< $100K / Negligible damage, minimal operational impact',env:'Slight, contained environmental effects within fence area; no off-site impact',rep:'No public concern; slight internal or regulatory notice only'}
};

/* Full likelihood table */
const LDETAIL={
  F:{qualitative:'Frequent / Almost Certain',frequency:'10⁻¹ to 1 per year',hseLikelihood:'Has occurred more than once on the site',ermCriteria:'Could be incurred more than once on the site next year'},
  E:{qualitative:'Probable / Likely',frequency:'10⁻² to 10⁻¹ per year',hseLikelihood:'Has occurred more than once per year budget period (at Company or on site)',ermCriteria:'Could be incurred more than once within year budget period'},
  D:{qualitative:'Occasional / Possible',frequency:'10⁻³ to 10⁻² per year',hseLikelihood:'Has occurred more than once in Group Company, but not on the site',ermCriteria:'Could be incurred within the 5-year Strategic Planning period'},
  C:{qualitative:'Remote / Unlikely',frequency:'10⁻⁴ to 10⁻³ per year',hseLikelihood:'Has occurred at least once in the Group Company but not on the site',ermCriteria:'Could be incurred within a 5-10 year time frame'},
  B:{qualitative:'Improbable / Rare',frequency:'10⁻⁵ to 10⁻⁴ per year',hseLikelihood:'Has occurred in world-wide industry but not in the Group',ermCriteria:'Could happen somewhere in industry in the next 20-30 years'},
  A:{qualitative:'Incredible / Term',frequency:'10⁻⁶ to 10⁻⁵ per year',hseLikelihood:'Has not occurred in world-wide industry in the last 50 years',ermCriteria:"Hasn't happened in industry in last 50 years"}
};

// Corporate 6×6 Risk Matrix — Category 1=HIGH-RED, 2=HIGH-ORG, 3=MEDIUM, 4=LOW
const RMATRIX={
  6:{A:2,B:2,C:1,D:1,E:1,F:1},
  5:{A:2,B:2,C:2,D:1,E:1,F:1},
  4:{A:3,B:3,C:2,D:2,E:1,F:1},
  3:{A:4,B:3,C:3,D:2,E:2,F:1},
  2:{A:4,B:4,C:3,D:3,E:2,F:2},
  1:{A:4,B:4,C:4,D:3,E:3,F:2}
};
const RDISP={
  1:{label:'HIGH',cat:'CAT 1',cls:'risk-1',badge:'badge-hi',txt:'#fca5a5',sign:'Director / GC CEO sign-off. ALARP required.'},
  2:{label:'HIGH',cat:'CAT 2',cls:'risk-2',badge:'badge-hi2',txt:'#fdba74',sign:'Unit Manager / SVP sign-off. ALARP required.'},
  3:{label:'MEDIUM',cat:'CAT 3',cls:'risk-3',badge:'badge-med',txt:'#fde68a',sign:'Dept Manager / VP sign-off. Monitor & control.'},
  4:{label:'LOW',cat:'CAT 4',cls:'risk-4',badge:'badge-lo',txt:'#86efac',sign:'Line Manager sign-off. Monitor current controls.'}
};

const getRisk=(s,l)=>s&&l?RMATRIX[s]?.[l]||null:null;
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().split('T')[0];

/* ─── COMPONENTS ─────────────────────────────────────── */
const RiskBadge=({cat,small})=>{
  if(!cat)return<span className="badge badge-none" style={{fontSize:small?10:12}}>—</span>;
  const d=RDISP[cat];
  return<span className={`badge ${d.badge}`} style={{fontSize:small?10:12}}>{d.label} · {d.cat}</span>;
};

const MatrixPicker=({sel,onPick,label})=>{
  const rows=[6,5,4,3,2,1];
  const cols=['A','B','C','D','E','F'];
  return(
    <div>
      {label&&<div style={{fontSize:12,color:'var(--text2)',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:8}}>{label}</div>}
      <div className="matrix-grid" style={{gap:3}}>
        <div className="matrix-cell matrix-header" style={{fontSize:10}}>S / L</div>
        {cols.map(c=>(
          <div key={c} className="matrix-cell matrix-header" data-tip={LNAMES[c]} title={LNAMES[c]}>
            {c}<br/><span style={{fontWeight:400,fontSize:9,color:'var(--text3)'}}>{LNAMES[c]}</span>
          </div>
        ))}
        {rows.map(s=>(
          <React.Fragment key={s}>
            <div className="matrix-cell matrix-header" style={{flexDirection:'column',gap:1,fontSize:10}} title={SDESC[s]}>
              <strong>S{s}</strong><span style={{fontSize:8,fontWeight:400,color:'var(--text3)'}}>{SNAMES[s]}</span>
            </div>
            {cols.map(l=>{
              const cat=RMATRIX[s][l];
              const isSel=sel&&sel.s===s&&sel.l===l;
              return(
                <div key={l}
                  className={`matrix-cell clickable ${RDISP[cat].cls} ${isSel?'selected':''}`}
                  style={{flexDirection:'column',gap:1,fontSize:10}}
                  onClick={()=>onPick({s,l,cat})}
                  title={`S${s}/${l} — ${RDISP[cat].label} (${RDISP[cat].cat})\nSeverity: ${SNAMES[s]}\nLikelihood: ${LNAMES[l]}`}
                >
                  <strong>{s}{l}</strong>
                </div>
              );
            })}
          </React.Fragment>
        ))}
      </div>
      {sel&&(
        <div style={{marginTop:8,padding:'8px 10px',background:'var(--bg-card2)',borderRadius:6,border:'1px solid var(--border)',fontSize:12}}>
          <span style={{color:'var(--text2)'}}>Selected: </span>
          <strong style={{color:'var(--accent)',fontFamily:'var(--mono)'}}>S{sel.s}/{sel.l}</strong>
          <span style={{margin:'0 8px',color:'var(--text3)'}}>|</span>
          <RiskBadge cat={sel.cat} small/>
          <div style={{color:'var(--text2)',marginTop:4}}>{RDISP[sel.cat].sign}</div>
        </div>
      )}
    </div>
  );
};

const AnalysisList=({items,dotClass,onAdd,onDel,placeholder,title,titleColor,icon,linkedFields,onLinkedAdd})=>{
  const [draft,setDraft]=useState('');
  const [adding,setAdding]=useState(false);
  const [expandedIdx,setExpandedIdx]=useState(null);
  const [linkedVals,setLinkedVals]=useState({});
  const [editIdx,setEditIdx]=useState(null);
  const [editVal,setEditVal]=useState('');
  const inputRef=useRef(null);
  const editRef=useRef(null);

  const openAdd=()=>{setAdding(true);setExpandedIdx(null);setTimeout(()=>inputRef.current&&inputRef.current.focus(),40);};
  const closeAdd=()=>{setAdding(false);setDraft('');};
  const handleAdd=()=>{const t=draft.trim();if(t){onAdd(t);setDraft('');setAdding(false);}};

  const toggleExpand=(i)=>{
    if(expandedIdx===i){setExpandedIdx(null);setLinkedVals({});}
    else{setExpandedIdx(i);setLinkedVals({});setAdding(false);}
  };
  const handleLinkedAdd=()=>{
    if(onLinkedAdd)onLinkedAdd(linkedVals);
    setExpandedIdx(null);setLinkedVals({});
  };

  const openEdit=(i,val)=>{setEditIdx(i);setEditVal(val);setExpandedIdx(null);setTimeout(()=>editRef.current&&editRef.current.focus(),40);};
  const saveEdit=(i)=>{
    const t=editVal.trim();
    if(t){onDel(i);setTimeout(()=>onAdd(t),0);}
    setEditIdx(null);setEditVal('');
  };

  const hasLinked=linkedFields&&linkedFields.length>0;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {/* Panel header: title on left, + Add button on right */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontFamily:'var(--disp)',fontWeight:700,fontSize:13,color:titleColor,letterSpacing:'0.06em',textTransform:'uppercase'}}>
          {icon} {title}
          <span style={{marginLeft:8,fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',fontWeight:400}}>({items.length})</span>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={openAdd}
          style={{padding:'3px 12px',fontSize:12,borderColor:titleColor+'66',color:titleColor}}>
          + Add
        </button>
      </div>

      {/* Top-level add form (for standalone additions) */}
      {adding&&(
        <div style={{background:'var(--bg-card2)',border:'1px solid '+titleColor,borderRadius:6,padding:10,display:'flex',flexDirection:'column',gap:8}}>
          <textarea ref={inputRef} value={draft} onChange={e=>setDraft(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleAdd();}if(e.key==='Escape'){closeAdd();}}}
            placeholder={placeholder} style={{minHeight:64,fontSize:13,resize:'vertical',lineHeight:1.5}}/>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <button className="btn btn-primary btn-sm" onClick={handleAdd}>✓ Add</button>
            <button className="btn btn-ghost btn-sm" onClick={closeAdd}>✕ Cancel</button>
            <span style={{fontSize:11,color:'var(--text3)'}}>Enter to add · Shift+Enter for new line · Esc to cancel</span>
          </div>
        </div>
      )}

      {/* Empty state */}
      {items.length===0&&!adding&&(
        <div style={{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'14px 0',borderRadius:6,
          border:'1px dashed var(--border)',cursor:'pointer'}} onClick={openAdd}>
          Click <strong style={{color:titleColor}}>+ Add</strong> above or run <strong>✦ AI Generate</strong>
        </div>
      )}

      {/* Items */}
      <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:4}}>
        {items.map((it,i)=>(
          <li key={i}>
            {editIdx===i?(
              /* Edit mode */
              <div style={{padding:'8px 10px',background:'var(--bg-card2)',borderRadius:6,
                border:'1px solid '+titleColor,display:'flex',flexDirection:'column',gap:6}}>
                <textarea ref={editRef} value={editVal} onChange={e=>setEditVal(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveEdit(i);}if(e.key==='Escape'){setEditIdx(null);}}}
                  style={{fontSize:13,minHeight:56,resize:'vertical'}}/>
                <div style={{display:'flex',gap:5}}>
                  <button className="btn btn-primary btn-sm" onClick={()=>saveEdit(i)}>✓ Save</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEditIdx(null)}>✕ Cancel</button>
                </div>
              </div>
            ):(
              /* Normal display mode */
              <div style={{borderRadius:expandedIdx===i?'6px 6px 0 0':'6px',
                background:'var(--bg-card2)',border:'1px solid var(--border)',
                borderBottom:expandedIdx===i?'none':'1px solid var(--border)',
                transition:'all 0.15s'}}>
                {/* Item row */}
                <div className="analysis-item" style={{background:'transparent',border:'none',
                  borderRadius:0,padding:'8px 10px',gap:8,alignItems:'flex-start'}}>
                  <div className={`analysis-item-dot ${dotClass}`} style={{marginTop:5,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:13,lineHeight:1.55,color:'var(--text1)'}}>{typeof it==='string'?it:(it&&it.text)||''}</span>
                  {/* Action buttons — always visible, compact */}
                  <div style={{display:'flex',gap:3,flexShrink:0,alignItems:'center'}}>
                    {hasLinked&&(
                      <button
                        title="Add linked consequence / safeguard / recommendation for this item"
                        onClick={()=>toggleExpand(i)}
                        style={{width:24,height:24,borderRadius:4,cursor:'pointer',fontWeight:700,fontSize:14,
                          display:'flex',alignItems:'center',justifyContent:'center',
                          background:expandedIdx===i?titleColor:'transparent',
                          color:expandedIdx===i?'#000':titleColor,
                          border:'1px solid '+titleColor,
                          transition:'all 0.15s'}}>
                        {expandedIdx===i?'−':'+'}
                      </button>
                    )}
                    <button title="Edit this item" onClick={()=>openEdit(i,typeof it==='string'?it:(it&&it.text)||'')}
                      style={{width:24,height:24,borderRadius:4,cursor:'pointer',fontSize:12,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        background:'transparent',color:'var(--text3)',border:'1px solid var(--border)',
                        transition:'all 0.15s'}}>✎</button>
                    <button title="Delete this item" onClick={()=>onDel(i)}
                      style={{width:24,height:24,borderRadius:4,cursor:'pointer',fontSize:11,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        background:'transparent',color:'#ef4444',border:'1px solid #7f1d1d',
                        transition:'all 0.15s'}}>✕</button>
                  </div>
                </div>

                {/* Linked entry form — slides below item when + clicked */}
                {expandedIdx===i&&hasLinked&&(
                  <div style={{borderTop:'1px solid '+titleColor+'44',padding:12,
                    background:'var(--bg-card)',display:'flex',flexDirection:'column',gap:10,
                    borderRadius:'0 0 6px 6px'}}>
                    <div style={{fontSize:11,color:'var(--text2)',marginBottom:2}}>
                      Add linked entries for:
                      <em style={{color:titleColor,marginLeft:4}}>
                        "{it.length>55?it.substring(0,55)+'…':it}"
                      </em>
                    </div>
                    {linkedFields.map(({key,label,color,ph})=>(
                      <div key={key} style={{display:'flex',flexDirection:'column',gap:4}}>
                        <div style={{fontSize:11,color:color,fontWeight:700,
                          textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</div>
                        <textarea
                          value={linkedVals[key]||''}
                          onChange={e=>setLinkedVals(v=>({...v,[key]:e.target.value}))}
                          placeholder={ph}
                          style={{minHeight:50,fontSize:12,resize:'vertical',lineHeight:1.5}}/>
                      </div>
                    ))}
                    <div style={{display:'flex',gap:6,alignItems:'center',marginTop:2}}>
                      <button className="btn btn-primary btn-sm" onClick={handleLinkedAdd}>
                        ✓ Add to Worksheet
                      </button>
                      <button className="btn btn-ghost btn-sm"
                        onClick={()=>{setExpandedIdx(null);setLinkedVals({});}}>
                        ✕ Cancel
                      </button>
                      <span style={{fontSize:11,color:'var(--text3)'}}>Empty fields are skipped</span>
                    </div>
                  </div>
                )}
              </div>
            )}
          </li>
        ))}
      </ul>
    </div>
  );
};

// SETUP VIEW
const SetupView=({study,setStudy})=>{
  const upd=(k,v)=>setStudy(s=>({...s,[k]:v}));
  const [newMember,setNewMember]=useState({name:'',role:'',dept:''});
  const addMember=()=>{
    if(!newMember.name.trim())return;
    setStudy(s=>({...s,teamMembers:[...s.teamMembers,{...newMember,id:uid()}]}));
    setNewMember({name:'',role:'',dept:''});
  };
  const delMember=id=>setStudy(s=>({...s,teamMembers:s.teamMembers.filter(m=>m.id!==id)}));

  /* ── Document upload helpers ── */
  const docs=Array.isArray(study.documents)?study.documents:[];
  const fmtSize=b=>b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';
  const fileIcon=t=>t?.includes('pdf')?'📄':t?.includes('image')?'🖼':t?.includes('dwg')||t?.includes('dxf')?'📐':'📎';
  const handleUpload=e=>{
    Array.from(e.target.files).forEach(file=>{
      if(file.size>15*1024*1024){alert('File "'+file.name+'" exceeds 15 MB limit — please compress or split.');return;}
      const reader=new FileReader();
      reader.onload=ev=>upd('documents',[...docs,{id:uid(),name:file.name,type:file.type,size:file.size,data:ev.target.result,uploadedAt:new Date().toISOString()}]);
      reader.readAsDataURL(file);
    });
    e.target.value='';
  };
  const downloadDoc=doc=>{
    const a=document.createElement('a');
    a.href=doc.data;a.download=doc.name;a.click();
  };
  const delDoc=id=>upd('documents',docs.filter(d=>d.id!==id));

  return(
    <div className="scrollable" style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:20,minHeight:0,overflowY:'auto'}}>

      {/* ── Project Details ── */}
      <div className="card">
        <div style={{fontSize:15,fontFamily:'var(--disp)',fontWeight:700,color:'var(--accent)',letterSpacing:'0.06em',marginBottom:16,textTransform:'uppercase'}}>Study & Project Details</div>
        <div className="form-row form-row-2">
          <div className="form-group"><label>Company / Client</label><input value={study.company} onChange={e=>upd('company',e.target.value)} placeholder="e.g. Dragon Oil (Turkmenistan) Ltd"/></div>
          <div className="form-group"><label>Project Name</label><input value={study.projectName} onChange={e=>upd('projectName',e.target.value)} placeholder="e.g. Hazar CPF Expansion"/></div>
        </div>
        <div className="form-row form-row-3">
          <div className="form-group"><label>Facility / Unit</label><input value={study.facility} onChange={e=>upd('facility',e.target.value)} placeholder="e.g. Gas Treatment Unit"/></div>
          <div className="form-group"><label>Location</label><input value={study.location} onChange={e=>upd('location',e.target.value)} placeholder="e.g. Hazar, Turkmenistan"/></div>
          <div className="form-group"><label>Document Ref.</label><input value={study.docRef} onChange={e=>upd('docRef',e.target.value)} placeholder="e.g. HAZOP-GTU-001"/></div>
        </div>
        <div className="form-row form-row-3">
          <div className="form-group"><label>Study Date</label><input type="date" value={study.date} onChange={e=>upd('date',e.target.value)}/></div>
          <div className="form-group"><label>Revision</label><input value={study.revision} onChange={e=>upd('revision',e.target.value)} placeholder="0"/></div>
          <div className="form-group"><label>Methodology</label>
            <select value={study.methodology} onChange={e=>upd('methodology',e.target.value)}>
              <option>Guide Word HAZOP</option>
              <option>Cause-by-Cause</option>
              <option>Consequence-by-Consequence</option>
              <option>Deviation-by-Deviation</option>
              <option>Knowledge-Based HAZOP</option>
            </select>
          </div>
        </div>
        <div className="form-row form-row-2">
          <div className="form-group"><label>Prepared By</label><input value={study.preparedBy} onChange={e=>upd('preparedBy',e.target.value)} placeholder="Lead facilitator name"/></div>
          <div className="form-group"><label>Approved By</label><input value={study.approvedBy} onChange={e=>upd('approvedBy',e.target.value)} placeholder="Approving authority"/></div>
        </div>
        <div className="form-group"><label>Study Scope &amp; Objectives</label>
          <textarea value={study.scope} onChange={e=>upd('scope',e.target.value)} placeholder="Describe the scope of this HAZOP study, systems included/excluded, and primary objectives..." style={{minHeight:80}}/>
        </div>
        <div className="form-group" style={{marginTop:4}}><label>Risk Matrix Standard</label>
          <input value="Corporate Risk Matrix 6×6 — Severity S1–S6 × Likelihood A–F" readOnly style={{color:'var(--text2)',background:'var(--bg-surface)'}}/>
        </div>
      </div>

      {/* ── Process Technical Details ── */}
      <div className="card">
        <div style={{fontSize:15,fontFamily:'var(--disp)',fontWeight:700,color:'var(--accent)',letterSpacing:'0.06em',marginBottom:4,textTransform:'uppercase'}}>Process Technical Details</div>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:16,lineHeight:1.5}}>
          These fields provide essential process context for AI-assisted cause/consequence generation and are included in the HAZOP report.
        </div>

        <div className="form-group">
          <label style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{background:'#1e3a5f',color:'#3b82f6',borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>1</span>
            Process Description
          </label>
          <textarea value={study.processDescription||''} onChange={e=>upd('processDescription',e.target.value)}
            placeholder="Describe the process: what material is handled, the process objective, flow path, operating phases, and any batch or continuous nature of the operation.&#10;&#10;Example: Crude oil from the wellhead is pre-heated in E-101 before entering the three-phase separator V-101. Gas is routed to the compression system, oil to export via pump P-101, and produced water to the treatment unit."
            style={{minHeight:120,lineHeight:1.6}}/>
        </div>

        <div className="form-group" style={{marginTop:12}}>
          <label style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{background:'#1e3a5f',color:'#3b82f6',borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>2</span>
            Normal Operating Conditions
          </label>
          <textarea value={study.normalOperatingConditions||''} onChange={e=>upd('normalOperatingConditions',e.target.value)}
            placeholder="State the design and normal operating parameters: pressure, temperature, flow rates, fluid composition, and any significant seasonal or load variations.&#10;&#10;Example: Operating pressure: 8.5 barg. Temperature: 45–65°C. Flow: 5,000 BPD crude. H₂S: 200 ppm. CO₂: 3 mol%."
            style={{minHeight:100,lineHeight:1.6}}/>
        </div>

        <div className="form-group" style={{marginTop:12}}>
          <label style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{background:'#1a3324',color:'#22c55e',borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>3</span>
            Process Controls
          </label>
          <textarea value={study.processControls||''} onChange={e=>upd('processControls',e.target.value)}
            placeholder="Describe the control philosophy and key control loops: BPCS loops, interlock logic (ESD/F&G), DCS control strategies, and alarm management tiers.&#10;&#10;Example: BPCS controls separator level via LV-101. High-high level initiates ESD via SIS logic solver (SIL 2). F&G system triggers deluge on confirmed gas/fire detection."
            style={{minHeight:100,lineHeight:1.6}}/>
        </div>

        <div className="form-group" style={{marginTop:12}}>
          <label style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{background:'#1a3324',color:'#22c55e',borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>4</span>
            Protective Devices
          </label>
          <textarea value={study.protectiveDevices||''} onChange={e=>upd('protectiveDevices',e.target.value)}
            placeholder="List the independent protection layers and safety devices: PSVs, BDVs, check valves, ESD valves, rupture discs, deluge systems, F&G detectors, etc.&#10;&#10;Example: PSV-101 set at 12 barg on V-101. ESDV-102 on crude outlet. Flame detector FD-201 coverage of pump area. HIPPS on import riser rated SIL 3."
            style={{minHeight:100,lineHeight:1.6}}/>
        </div>

        <div className="form-group" style={{marginTop:12}}>
          <label style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{background:'#2d1f5e',color:'#a78bfa',borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>5</span>
            Assumptions &amp; Exclusions
          </label>
          <textarea value={study.assumptions||''} onChange={e=>upd('assumptions',e.target.value)}
            placeholder="State study assumptions, exclusions, and limitations that the HAZOP team has agreed upon.&#10;&#10;Example: Utility failures (instrument air, power) are excluded as covered by separate SIL assessment. Vendor package internals are excluded. Human factors reviewed separately per HAZOP team agreement."
            style={{minHeight:100,lineHeight:1.6}}/>
        </div>
      </div>

      {/* ── Reference Documents & P&ID Upload ── */}
      <div className="card">
        <div style={{fontSize:15,fontFamily:'var(--disp)',fontWeight:700,color:'var(--accent)',letterSpacing:'0.06em',marginBottom:4,textTransform:'uppercase'}}>Reference Documents</div>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:16,lineHeight:1.5}}>
          Upload P&IDs, PFDs, datasheets, and other reference documents. Files are stored locally in your browser session (max 15 MB each).
        </div>

        {/* Upload button */}
        <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:14,flexWrap:'wrap'}}>
          <label style={{display:'inline-flex',alignItems:'center',gap:8,padding:'9px 18px',borderRadius:6,
            cursor:'pointer',fontWeight:700,fontSize:12,background:'var(--bg-card)',
            color:'var(--accent)',border:'2px dashed var(--accent)',userSelect:'none'}}>
            <span style={{fontSize:16}}>⬆</span> Upload P&amp;ID / Documents
            <input type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.svg,.dwg,.dxf,.xlsx,.docx,.pptx,.txt,.csv"
              style={{display:'none'}} onChange={handleUpload}/>
          </label>
          <div style={{fontSize:11,color:'var(--text3)'}}>
            Accepted: PDF, images, DWG, DXF, Office files · Max 15 MB per file
          </div>
        </div>

        {/* Document list */}
        {docs.length===0?(
          <div style={{textAlign:'center',padding:'28px 0',color:'var(--text3)',fontSize:12,
            border:'1px dashed var(--border)',borderRadius:6}}>
            No documents uploaded yet. P&IDs and reference documents uploaded here are available during the study session.
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {docs.map((doc,i)=>(
              <div key={doc.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',

                <span style={{fontSize:20,flexShrink:0}}>{fileIcon(doc.type)}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--text1)',
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{doc.name}</div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>
                    {fmtSize(doc.size)}

                <button onClick={()=>downloadDoc(doc)}

                </button>
                <button onClick={()=>delDoc(doc.id)}
                  style={{fontSize:11,padding:'4px 10px',borderRadius:4,cursor:'pointer',flexShrink:0,
                    background:'transparent',color:'#ef4444',border:'1px solid #ef444444',fontWeight:600}}>
                  ✕ Remove
                </button>
              </div>
            ))}
            <div style={{fontSize:11,color:'var(--text3)',marginTop:6,paddingLeft:2}}>
              {docs.length} document{docs.length!==1?'s':''} · Total: {(docs.reduce((a,d)=>a+d.size,0)/1024).toFixed(0)} KB stored
            </div>
          </div>
        )}
      </div>

      {/* ── HAZOP Team ── */}
      <div className="card">
        <div style={{fontSize:15,fontFamily:'var(--disp)',fontWeight:700,color:'var(--accent)',letterSpacing:'0.06em',marginBottom:16,textTransform:'uppercase'}}>HAZOP Team Members</div>
        <div style={{marginBottom:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:8}}>
            <input value={newMember.name} onChange={e=>setNewMember(m=>({...m,name:e.target.value}))} placeholder="Full Name"/>
            <input value={newMember.role} onChange={e=>setNewMember(m=>({...m,role:e.target.value}))} placeholder="Role (e.g. HAZOP Facilitator)"/>
            <input value={newMember.dept} onChange={e=>setNewMember(m=>({...m,dept:e.target.value}))} placeholder="Discipline / Dept"/>
            <button className="btn btn-primary" onClick={addMember}>+ Add</button>
          </div>
        </div>
        {study.teamMembers.length===0?
          <div style={{color:'var(--text3)',fontSize:13,textAlign:'center',padding:'20px 0'}}>No team members added yet. A typical HAZOP team includes: Facilitator, Process Engineer, Operations, Instrument Engineer, HSE, Mechanical.</div>:
          <table className="tbl">
            <thead><tr><th>#</th><th>Name</th><th>Role</th><th>Discipline</th><th></th></tr></thead>
            <tbody>{study.teamMembers.map((m,i)=>(
              <tr key={m.id}>
                <td style={{color:'var(--text3)',fontFamily:'var(--mono)'}}>{i+1}</td>
                <td style={{fontWeight:500}}>{m.name}</td>
                <td style={{color:'var(--text2)'}}>{m.role}</td>
                <td style={{color:'var(--text2)'}}>{m.dept}</td>
                <td><button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>delMember(m.id)}>✕</button></td>
              </tr>
            ))}</tbody>
          </table>
        }
      </div>
    </div>
  );
};

// ── NODE MANAGER ─────────────────────────────────────────────────────
const NodesView=({nodes,setNodes,deviations,setDeviations})=>{
  const [form,setForm]=useState({name:'',type:'Pipe',description:'',designIntent:'',fluid:'',conditions:''});
  const add=()=>{if(!form.name.trim())return;setNodes(n=>[...n,{...form,id:uid()}]);setForm({name:'',type:'Pipe',description:'',designIntent:'',fluid:'',conditions:''});};
  const del=id=>{setNodes(n=>n.filter(x=>x.id!==id));setDeviations(d=>d.filter(x=>x.nodeId!==id));};
  return(
    <div className="scrollable" style={{flex:1,padding:20,display:'flex',flexDirection:'column',gap:16,overflowY:'auto'}}>
      <div className="card">
        <div style={{fontSize:14,fontFamily:'var(--disp)',fontWeight:700,color:'var(--accent)',marginBottom:14,textTransform:'uppercase',letterSpacing:'0.06em'}}>Add Study Node / Section</div>
        <div className="form-row form-row-2">
          <div className="form-group"><label>Node Name *</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Crude pre-heater feed line"/></div>
          <div className="form-group"><label>Node Type</label>
            <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
              {['Pipe','Vessel','Pump','Compressor','Heat Exchanger','Reactor','Storage Tank','Control Loop','Utility','Other'].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
        </div>
        <div className="form-row form-row-2">
          <div className="form-group"><label>Process Fluid / Material</label><input value={form.fluid} onChange={e=>setForm(f=>({...f,fluid:e.target.value}))} placeholder="e.g. Crude oil with H₂S, CO₂"/></div>
          <div className="form-group"><label>Design / Operating Conditions</label><input value={form.conditions} onChange={e=>setForm(f=>({...f,conditions:e.target.value}))} placeholder="e.g. 65°C, 12 barg, 5000 BPD"/></div>
        </div>
        <div className="form-group"><label>Design Intent</label><textarea value={form.designIntent} onChange={e=>setForm(f=>({...f,designIntent:e.target.value}))} placeholder="Describe the intended function of this node…" style={{minHeight:60}}/></div>
        <div className="form-group"><label>Description / Boundary</label><textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Define the node boundary (from/to), P&ID references…" style={{minHeight:60}}/></div>
        <button className="btn btn-primary" onClick={add}>+ Add Node</button>
      </div>
      {nodes.length===0?(

// ── DATA NORMALIZATION ────────────────────────────────────────────────
const normalizeRec=r=>typeof r==='string'?{id:uid(),text:r,actionOwner:'',targetDate:'',degradationFactors:[]}:{id:uid(),text:'',actionOwner:'',targetDate:'',degradationFactors:[],...r};
const normalizeDev=dev=>{
  if(!dev)return dev;
  const normRecs=arr=>(Array.isArray(arr)?arr:[]).map(normalizeRec);
  const old=dev;
  if(Array.isArray(old.causes))return{...old,causes:old.causes.map(c=>({
    id:uid(),text:'',recommendations:[],initialRisk:null,residualRisk:null,...c,
    consequences:(c.consequences||[]).map(cn=>({
      id:uid(),text:'',safeguards:[],recommendations:[],mitigationBarriers:[],...cn,
      safeguards:(Array.isArray(cn.safeguards)?cn.safeguards:(cn.safeguard?[cn.safeguard]:[])).map(s=>
        typeof s==='string'?{id:uid(),text:s,degradationFactors:[]}:{id:uid(),degradationFactors:[],...s}
      ),
      recommendations:normRecs(cn.recommendations),
      mitigationBarriers:Array.isArray(cn.mitigationBarriers)?cn.mitigationBarriers.map(m=>({
        id:uid(),text:'',type:'Engineering',degradationFactors:[],...m
      })):[]
    })),
    recommendations:normRecs(c.recommendations)
  }))};
  // legacy flat format
  const ocon=Array.isArray(old.consequences)?old.consequences:[];
  const osg=Array.isArray(old.safeguards)?old.safeguards:[];
  const ocause=Array.isArray(old.causes_text)?old.causes_text:old.cause?[old.cause]:[];
  const newCauses=[];
  ocause.forEach((ct,ci)=>{
    newCauses.push({id:uid(),text:ct,recommendations:[],initialRisk:null,residualRisk:null,
      consequences:ci<ocon.length?[{id:uid(),text:ocon[ci],safeguards:ci<osg.length&&osg[ci]?[{id:uid(),text:osg[ci],degradationFactors:[]}]:[],recommendations:[],mitigationBarriers:[]}]:[]});
    for(let i=ocause.length;i<ocon.length;i++)
      newCauses[newCauses.length-1].consequences.push({id:uid(),text:ocon[i],safeguards:i<osg.length&&osg[i]?[{id:uid(),text:osg[i],degradationFactors:[]}]:[],recommendations:[],mitigationBarriers:[]});
  });
  return{...old,causes:newCauses};
};

/* ── JSON repair utility ── */
const repairJSON=(raw)=>{
  let s=(raw||'').replace(/```json|```/g,'').trim();
  const m=s.match(/\{[\s\S]*\}/);
  if(m)s=m[0];
  try{return JSON.parse(s);}catch(e){}
  s=s.replace(/,\s*([}\]])/g,'$1').replace(/([{,])\s*([a-zA-Z_$][a-zA-Z0-9_$]*)\s*:/g,'$1"$2":');
  try{return JSON.parse(s);}catch(e){}
  const opens=(s.match(/\[/g)||[]).length-(s.match(/\]/g)||[]).length;
  const braces=(s.match(/\{/g)||[]).length-(s.match(/\}/g)||[]).length;
  s=s.replace(/,?\s*"[^"]*$/,'').replace(/,?\s*\{[^}]*$/,'');
  for(let i=0;i<opens;i++)s+=']';
  for(let i=0;i<braces;i++)s+='}';
  try{return JSON.parse(s);}catch(e){throw new Error('Could not parse AI response. Try again.');}
};

/* ── AI suggest degradation factors + controls ── */
const suggestDFsAI=async(barrierText,existingDFs)=>{
  const ctx=window._R2S||{};
  if(!ctx.key)return[];
  const existing=(existingDFs||[]).map(d=>d.text).filter(Boolean).join('; ');
  const sys='You are a process safety barrier integrity engineer. Return only valid compact JSON, no explanation.';
  const usr='Barrier: '+barrierText+
    '\nProcess context: Node='+ctx.nodeName+' | Deviation='+ctx.deviation+' | Fluid='+ctx.fluid+
    (existing?'\nAlready identified: '+existing:'')+
    '\n\nIdentify 2-3 degradation factors for this barrier and 1-2 degradation controls per factor.'+
    '\nJSON: {"degradationFactors":[{"text":"DF text","controls":[{"text":"Control text"}]}]}';
  try{
    const raw=await window.callAnthropicAPI(ctx.key,ctx.model,sys,usr);
    const parsed=repairJSON(raw);
    return(parsed.degradationFactors||[]).map(df=>({
      id:uid(),text:df.text||'',
      controls:(df.controls||[]).map(c=>({id:uid(),text:typeof c==='string'?c:(c.text||'')}))
    }));
  }catch{return[];}
};

/* ── AI suggest recommendations (cause + consequence context) ── */
const suggestRecsAI=async(causeText,conText,sgTexts,existingRecs)=>{
  const ctx=window._R2S||{};
  if(!ctx.key)return[];
  const existing=(existingRecs||[]).map(r=>typeof r==='string'?r:(r.text||'')).filter(Boolean).join('; ');
  const sgs=(sgTexts||[]).filter(Boolean).join('; ');
  const sys='You are a HAZOP process safety engineer. Suggest specific, actionable recommendations. Return only valid compact JSON.';
  const usr='HAZOP Study Context:'+
    '\nNode: '+ctx.nodeName+'\nDeviation: '+ctx.deviation+
    '\nCause: '+causeText+'\nConsequence: '+conText+
    (sgs?'\nExisting safeguards: '+sgs:'')+
    (existing?'\nAlready recommended: '+existing:'')+
    '\n\nSuggest 3-4 specific, actionable recommendations to address this cause/consequence.'+
    '\nEach must be specific, measurable, and assignable to a discipline.'+
    '\nJSON: {"recommendations":[{"text":"Specific recommendation","actionOwner":"Engineering/Operations/HSE/Inspection"}]}';
  try{
    const raw=await window.callAnthropicAPI(ctx.key,ctx.model,sys,usr);
    const parsed=repairJSON(raw);
    return(parsed.recommendations||[]).map(r=>({
      id:uid(),text:r.text||'',actionOwner:r.actionOwner||'',targetDate:''
    }));
  }catch{return[];}
};

                <div style={{fontSize:12,color:'var(--text1)',lineHeight:1.4}}>{rec.text||<span style={{color:'var(--text3)',fontStyle:'italic'}}>Click ✎ to enter recommendation…</span>}</div>
                {(rec.actionOwner||rec.targetDate)&&(
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>

            style={{fontSize:11,color:editMode?'var(--accent)':'var(--text2)',background:'none',border:'none',cursor:'pointer',padding:'2px 4px',flexShrink:0,fontWeight:editMode?700:400}}>
            {editMode?'✓ Done':'✎'}

            style={{fontSize:11,color:'#ef4444',background:'none',border:'none',cursor:'pointer',padding:'2px 4px',flexShrink:0}}>✕</button>

      </div>
      {/* ── Degradation Factors & Controls ── */}
      <div style={{padding:'6px 10px',background:'#05070d'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <span style={{fontSize:9,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>
            ⚠ Degradation Factors &amp; Controls
          </span>
          <button onClick={suggestDFs} disabled={aiLoading}
            style={{fontSize:10,padding:'2px 8px',borderRadius:3,cursor:'pointer',
              background:'transparent',color:'#a78bfa',border:'1px solid #a78bfa44',
              opacity:aiLoading?0.6:1}}>
            {aiLoading?'⟳ Suggesting…':'✦ AI Suggest'}
          </button>
        </div>
        <DegradationEditor factors={dfs} onChange={df=>onUpdate({...rec,degradationFactors:df})}/>
      </div>
    </div>
  );
};

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
        <input value={draft.actionOwner||''} onChange={e=>setDraft(d=>({...d,actionOwner:e.target.value}))} placeholder="Action Owner" style={{fontSize:11,padding:'4px 7px'}}/>

        <div style={{fontSize:12,color:'var(--text1)',lineHeight:1.4}}>{rec.text}</div>
        {(rec.actionOwner||rec.targetDate)&&(
          <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>

/* ── InlineEdit ── */
const InlineEdit=({value,onChange,placeholder,multiline,style,textStyle})=>{
  const [edit,setEdit]=useState(false);
  const [v,setV]=useState(value||'');
  useEffect(()=>setV(value||''),[value]);
  if(edit){
    const props={value:v,onChange:e=>setV(e.target.value),autoFocus:true,
      onBlur:()=>{onChange(v);setEdit(false);},
      onKeyDown:e=>{if(!multiline&&e.key==='Enter'){onChange(v);setEdit(false);}if(e.key==='Escape')setEdit(false);},
      style:{fontSize:12,resize:'vertical',width:'100%',...textStyle}};
    return multiline?<textarea {...props} rows={2}/>:<input {...props}/>;
  }
  return(
    <div onClick={()=>setEdit(true)} style={{cursor:'text',fontSize:12,color:v?'var(--text1)':'var(--text3)',fontStyle:v?'normal':'italic',lineHeight:1.4,...style,...textStyle}}>
      {v||placeholder||'Click to edit…'}
    </div>
  );
};

// ── Consequence block ─────────────────────────────────────────────────
const ConBlock=({con,conIdx,causeIdx,devIdx,devId,cid,onUpdate,onDelete,onSgAdd,onSgDel,onSgUpdate,onRecAdd,onRecEdit,onRecDel,onMitUpdate,devSafeguards,devRecs,causeText})=>{
  const safeguards=Array.isArray(con.safeguards)?con.safeguards:(con.safeguard?[{id:'sg0',text:con.safeguard,degradationFactors:[]}]:[]);
  const recs=Array.isArray(con.recommendations)?con.recommendations:[];
  const mitBs=Array.isArray(con.mitigationBarriers)?con.mitigationBarriers:[];
  const ref='C'+(causeIdx+1)+'.'+(conIdx+1);
  const [recsAiLoading,setRecsAiLoading]=useState(false);
  const suggestRecs=async()=>{
    if(!window._R2S?.key)return;
    setRecsAiLoading(true);
    const sgTexts=safeguards.map(s=>typeof s==='string'?s:(s?.text||'')).filter(Boolean);
    const newRecs=await suggestRecsAI(causeText||'',con.text||'',sgTexts,recs);
    newRecs.forEach(r=>onRecAdd(devId,cid,con.id,r));
    setRecsAiLoading(false);
  };
  const conSgUpdateRef=(devId,cid,conId,sgId,updated)=>{if(onSgUpdate)onSgUpdate(devId,cid,conId,sgId,updated);};

  // Safeguards from other consequences (for picker), excluding ones already added here
  const existingSgTexts=new Set(safeguards.map(s=>(s.text||'').trim().toLowerCase()));
  const pickerSgs=(devSafeguards||[]).filter(s=>s.text&&!existingSgTexts.has(s.text.trim().toLowerCase()));
  // Recs from other consequences for picker
  const existingRecTexts=new Set(recs.map(r=>(r.text||'').trim().toLowerCase()));
  const pickerRecs=(devRecs||[]).filter(r=>r.text&&!existingRecTexts.has(r.text.trim().toLowerCase()));
  // Detect shared safeguards (same text in other consequences)
  const sharedSgTexts=new Set((devSafeguards||[]).map(s=>(s.text||'').trim().toLowerCase()).filter(Boolean));

  return(
    <div style={{marginBottom:8,borderRadius:8,overflow:'hidden',border:'1px solid #ef444444',background:'var(--bg-surface)'}}>
      <div style={{display:'flex',gap:8,padding:'8px 12px',background:'#1a0505',alignItems:'flex-start',borderBottom:'1px solid #7f1d1d'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:'#ef4444',fontWeight:700,flexShrink:0,marginTop:1,background:'#450a0a',padding:'2px 6px',borderRadius:3}}>{ref}</span>
        <textarea value={con.text||''} onChange={e=>onUpdate(devId,cid,con.id,{text:e.target.value})}
          placeholder="Describe the consequence…" rows={2}
          style={{flex:1,fontSize:12,resize:'vertical',background:'transparent',border:'none',color:'var(--text1)',outline:'none',padding:0,lineHeight:1.5}}/>
        <button onClick={()=>onDelete(devId,cid,con.id)} style={{width:20,height:20,borderRadius:3,cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color:'#ef4444',border:'1px solid #ef444455',flexShrink:0,marginTop:1}}>✕</button>
      </div>

      {/* ── Safeguards section ── */}
      <div style={{padding:'8px 12px',background:'#071408',borderBottom:'1px solid #1a3324'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{color:'#22c55e',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>
            🛡 Safeguards <span style={{marginLeft:5,fontFamily:'var(--mono)',fontWeight:400,color:'var(--text3)',fontSize:9}}>({safeguards.length})</span>
          </span>
          <div style={{display:'flex',gap:5}}>
            {pickerSgs.length>0&&(
              <select onChange={e=>{
                  if(!e.target.value)return;
                  const picked=devSafeguards.find(s=>s.id===e.target.value);
                  if(picked)onSgAdd(devId,cid,con.id,{...picked,id:uid()});
                  e.target.value='';
                }}
                style={{fontSize:10,padding:'2px 4px',borderRadius:3,cursor:'pointer',
                  background:'#0a1f0a',color:'#86efac',border:'1px solid #22c55e44',maxWidth:180}}
                title="Re-use an existing safeguard from this deviation (DFs copy across)">
                <option value="">↗ Pick existing…</option>
                {pickerSgs.map((sg,i)=><option key={sg.id||i} value={sg.id}>{(sg.text||'').substring(0,50)}</option>)}
              </select>
            )}
            <button onClick={()=>onSgAdd(devId,cid,con.id,'')}
              style={{fontSize:10,padding:'2px 8px',borderRadius:3,cursor:'pointer',background:'transparent',color:'#22c55e',border:'1px solid #22c55e44',fontWeight:600}}>+ New</button>
          </div>
        </div>
        {safeguards.length===0&&pickerSgs.length===0&&(
          <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>No safeguards yet — click <strong style={{color:'#22c55e',fontStyle:'normal'}}>+ New</strong> to add.</div>
        )}
        {safeguards.map((sg,si)=>{
          const isShared=sharedSgTexts.has((sg.text||'').trim().toLowerCase());
          return(
            <div key={sg.id||si} style={{position:'relative'}}>
              {isShared&&(
                <div style={{position:'absolute',top:6,right:26,zIndex:2,fontSize:9,fontWeight:700,
                  color:'#60a5fa',background:'#1e3a5f',padding:'1px 5px',borderRadius:3,letterSpacing:'0.04em'}}
                  title="This safeguard appears in other consequences — DFs sync automatically">
                  🔗 Shared
                </div>
              )}
              <SafeguardCard sg={sg}
                onUpdate={updated=>conSgUpdateRef(devId,cid,con.id,sg.id||sg,updated)}
                onDelete={()=>onSgDel(devId,cid,con.id,si)}/>
            </div>
          );
        })}
      </div>

      {/* ── Recommendations section ── */}
      <div style={{padding:'8px 12px',background:'#030b1a'}}>
        {pickerRecs.length>0&&(
          <div style={{marginBottom:8,display:'flex',gap:6,alignItems:'center'}}>
            <span style={{fontSize:10,color:'var(--text3)'}}>↗ Pick existing rec:</span>
            <select onChange={e=>{
                if(!e.target.value)return;
                const picked=devRecs.find(r=>r.id===e.target.value);
                if(picked)onRecAdd(devId,cid,con.id,{...picked,id:uid()});
                e.target.value='';
              }}
              style={{flex:1,fontSize:10,padding:'2px 4px',borderRadius:3,cursor:'pointer',
                background:'#030b1f',color:'#93c5fd',border:'1px solid #3b82f644'}}
              title="Re-use a recommendation already entered in another consequence">
              <option value="">— select —</option>
              {pickerRecs.map((r,i)=><option key={r.id||i} value={r.id}>{(r.text||'').substring(0,55)}</option>)}
            </select>
          </div>
        )}
        {/* Recommendations header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{fontSize:10,color:'#3b82f6',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>
            ✅ Recommendations
            <span style={{marginLeft:5,fontFamily:'var(--mono)',fontWeight:400,color:'var(--text3)',fontSize:9}}>({recs.length})</span>
          </span>
          <div style={{display:'flex',gap:5}}>
            <button onClick={suggestRecs} disabled={recsAiLoading}
              style={{fontSize:10,padding:'2px 8px',borderRadius:3,cursor:'pointer',
                background:'transparent',color:'#a78bfa',border:'1px solid #a78bfa44',
                opacity:recsAiLoading?0.6:1,fontWeight:600}}>
              {recsAiLoading?'⟳ Suggesting…':'✦ AI Suggest'}
            </button>
            <button onClick={()=>onRecAdd(devId,cid,con.id,{id:uid(),text:'',actionOwner:'',targetDate:'',degradationFactors:[]})}
              style={{fontSize:10,padding:'2px 8px',borderRadius:3,cursor:'pointer',
                background:'transparent',color:'#3b82f6',border:'1px solid #3b82f644',fontWeight:600}}>
              + Add
            </button>
          </div>
        </div>
        {recs.length===0&&(
          <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>
            No recommendations yet — click <strong style={{color:'#3b82f6',fontStyle:'normal'}}>+ Add</strong> or <strong style={{color:'#a78bfa',fontStyle:'normal'}}>✦ AI Suggest</strong>
          </div>
        )}
        {recs.map((rec,ri)=>(
          <RecCard key={rec.id||ri} rec={rec}
            onUpdate={updated=>onRecEdit(devId,cid,con.id,ri,updated)}
            onDelete={()=>onRecDel(devId,cid,con.id,ri)}/>
        ))}
      </div>
      <MitBarrierSection barriers={mitBs} onChange={mbs=>onMitUpdate&&onMitUpdate(devId,cid,con.id,mbs)}/>
    </div>
  );
};

// ── Cause card ────────────────────────────────────────────────────────
const CauseCard=({cause,causeIdx,devId,devIdx,onCauseUpdate,onCauseDelete,onConAdd,onConUpdate,onConDelete,onSgAdd,onSgDel,onSgUpdate,onConRecAdd,onConRecEdit,onConRecDel,onSetRisk,onRecAdd,onRecEdit,onRecDel,onConMitUpdate,devSafeguards,devRecs})=>{
  const [open,setOpen]=useState(true);
  const cons=cause.consequences||[];
  return(
    <div style={{marginBottom:12,borderRadius:8,overflow:'hidden',border:'1px solid var(--border2)'}}>

        <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:700,flexShrink:0,marginTop:1,background:'var(--accent-dim)',padding:'2px 7px',borderRadius:3}}>C{causeIdx+1}</span>
        <InlineEdit value={cause.text||''} onChange={t=>onCauseUpdate(devId,cause.id,{text:t})}

        <button onClick={e=>{e.stopPropagation();onCauseDelete(devId,cause.id);}} style={{width:20,height:20,borderRadius:3,cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color:'#ef4444',border:'1px solid #ef444455',flexShrink:0}} title="Delete cause">✕</button>
      </div>
      {open&&(
        <div style={{padding:'12px',background:'var(--bg-surface)',display:'flex',flexDirection:'column',gap:10}}>
          {cons.map((con,ci)=>(

              onSgAdd={onSgAdd} onSgDel={onSgDel} onSgUpdate={onSgUpdate}

              onMitUpdate={onConMitUpdate}

          ))}
          <button onClick={()=>onConAdd(devId,cause.id)} style={{fontSize:11,padding:'6px 12px',borderRadius:4,cursor:'pointer',background:'#1a0505',color:'#fca5a5',border:'1px dashed #ef444466',fontWeight:600,alignSelf:'flex-start'}}>+ Add Consequence</button>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:4}}>
            <div><div style={{fontSize:10,color:'var(--text2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Initial Risk</div>
              <MiniMatrixPicker sel={cause.initialRisk} onPick={r=>onSetRisk(devId,cause.id,'initialRisk',r)} label=""/>
            </div>
            <div><div style={{fontSize:10,color:'var(--text2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Residual Risk</div>
              <MiniMatrixPicker sel={cause.residualRisk} onPick={r=>onSetRisk(devId,cause.id,'residualRisk',r)} label=""/>
            </div>
          </div>
          <div>
            <RecList recs={Array.isArray(cause.recommendations)?cause.recommendations:[]} color="#f59e0b"
              label={'🔧 Cause Recommendations (C'+(causeIdx+1)+')'} emptyMsg="No cause-level recommendations"
              onAdd={rec=>onRecAdd(devId,cause.id,rec)}
              onEdit={(i,u)=>onRecEdit(devId,cause.id,i,u)}
              onDel={i=>onRecDel(devId,cause.id,i)}/>
          </div>
        </div>
      )}
    </div>

};

// ── NodeRecsPanel ─────────────────────────────────────────────────────
const NodeRecsPanel=({devs,nodeId})=>{
  const allRecs=[];
  devs.filter(d=>d.nodeId===nodeId).forEach(dev=>{
    const nd=normalizeDev(dev);
    const devLabel=nd.deviation||(nd.guideWord+' '+nd.parameter);
    nd.causes.forEach((c,ci)=>{
      (c.recommendations||[]).forEach((r,ri)=>{
        allRecs.push({ref:'C'+(ci+1)+'-R'+(ri+1),cause:c.text,deviation:devLabel,text:typeof r==='string'?r:r.text,owner:typeof r==='object'?r.actionOwner:'',date:typeof r==='object'?r.targetDate:''});
      });
      c.consequences.forEach((cn,qi)=>{
        (cn.recommendations||[]).forEach((r,ri)=>{
          allRecs.push({ref:'C'+(ci+1)+'.'+(qi+1)+'-R'+(ri+1),cause:c.text,deviation:devLabel,text:typeof r==='string'?r:r.text,owner:typeof r==='object'?r.actionOwner:'',date:typeof r==='object'?r.targetDate:''});
        });
      });
    });
  });
  if(allRecs.length===0)return<div style={{color:'var(--text3)',fontSize:13,fontStyle:'italic',padding:'20px 0',textAlign:'center'}}>No recommendations yet.</div>;
  return(
    <table className="tbl" style={{fontSize:11}}>
      <thead><tr><th style={{width:70}}>Ref</th><th>Recommendation</th><th style={{width:100}}>Action Owner</th><th style={{width:90}}>Target Date</th><th>Cause / Deviation</th></tr></thead>
      <tbody>{allRecs.map((r,i)=>(
        <tr key={i}>
          <td style={{fontFamily:'var(--mono)',color:'var(--accent)',fontSize:10}}>{r.ref}</td>
          <td style={{color:'var(--text1)'}}>{r.text}</td>
          <td style={{color:'var(--text2)'}}>{r.owner||'—'}</td>
          <td style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)'}}>{r.date||'—'}</td>
          <td style={{color:'var(--text3)',fontSize:10}}>{r.cause?.substring(0,40)}{r.cause?.length>40?'…':''}</td>
        </tr>
      ))}</tbody>
    </table>
  );
};

// ── CCSuggestPanel — AI C&C suggestions ──────────────────────────────
const CCSuggestPanel=({node,dev,apiKey,aiModel,onAdd,onClose})=>{
  const [loading,setLoading]=useState(true);
  const [results,setResults]=useState([]);
  const [error,setError]=useState('');
  const [selected,setSelected]=useState({});
  const nd=normalizeDev(dev);
  const devLabel=nd.deviation||(nd.guideWord+' '+nd.parameter);
  useEffect(()=>{
    if(!apiKey||!dev)return;
    const generate=async()=>{
      setLoading(true);setError('');
      try{
        const sys='You are a HAZOP expert. Generate causes and consequences for this deviation. Return only valid JSON.';
        const usr='Node: '+node?.name+' | Fluid: '+node?.fluid+' | Deviation: '+devLabel+
          '\n\nGenerate 5-7 causes with 2-3 consequences each.\n'+
          'JSON: {"causes":[{"text":"Cause text","consequences":["Consequence 1","Consequence 2"]}]}';
        const raw=await window.callAnthropicAPI(apiKey,aiModel||'claude-sonnet-4-6',sys,usr);
        const parsed=repairJSON(raw);
        setResults(parsed.causes||[]);
      }catch(e){setError(e.message||'AI error');}
      setLoading(false);
    };
    generate();
  },[]);
  const toggleCause=(ci)=>setSelected(s=>({...s,[ci]:!s[ci]}));
  const addSelected=()=>{
    const toAdd=results.filter((_,ci)=>selected[ci]);
    if(toAdd.length>0)onAdd(toAdd);
    onClose();
  };
  const selCount=Object.values(selected).filter(Boolean).length;
  return(
    <div style={{width:340,background:'var(--bg-surface)',borderLeft:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg-card)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div style={{fontFamily:'var(--disp)',fontWeight:700,fontSize:13,color:'#a78bfa',textTransform:'uppercase',letterSpacing:'0.05em'}}>🧠 AI Suggest C&amp;C</div>
        <button onClick={onClose} style={{width:24,height:24,borderRadius:4,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',color:'var(--text2)',border:'1px solid var(--border)'}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
        {loading&&<div style={{textAlign:'center',padding:'30px 0',color:'var(--text3)'}}>
          <div style={{fontSize:20,marginBottom:10}}>⟳</div>Generating HAZOP causes &amp; consequences…
        </div>}
        {error&&<div style={{color:'#fca5a5',padding:'10px',background:'#2d0a0a',borderRadius:4}}>{error}</div>}
        {!loading&&results.map((cause,ci)=>(
          <div key={ci} style={{marginBottom:10,padding:'8px 10px',background:'var(--bg-card)',borderRadius:6,
            border:'1px solid '+(selected[ci]?'#a78bfa':'var(--border)'),cursor:'pointer'}}
            onClick={()=>toggleCause(ci)}>
            <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
              <input type="checkbox" checked={!!selected[ci]} onChange={()=>toggleCause(ci)} onClick={e=>e.stopPropagation()} style={{marginTop:3,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--accent)',marginBottom:4}}>{cause.text}</div>
                {(cause.consequences||[]).map((cn,qi)=>(
                  <div key={qi} style={{fontSize:11,color:'var(--text2)',marginBottom:2,paddingLeft:8}}>
                    <span style={{color:'#ef4444',marginRight:4}}>→</span>{cn}
                  </div>
                ))}
              </div>
            </div>
          </div>
        ))}
      </div>
      {!loading&&selCount>0&&(
        <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',flexShrink:0,background:'var(--bg-card)'}}>
          <button onClick={addSelected} style={{width:'100%',padding:'8px',borderRadius:5,cursor:'pointer',background:'#4c1d95',color:'#e9d5ff',fontWeight:700,fontSize:12,border:'1px solid #7c3aed'}}>
            ✓ Add {selCount} Cause{selCount!==1?'s':''} to Study
          </button>
        </div>
      )}
    </div>
  );
};

// ── WorksheetView ──────────────────────────────────────────────────────
// WORKSHEET VIEW
const WorksheetView=({nodes,deviations,setDeviations,apiKey,aiModel})=>{
  const [activeNodeId,setActiveNodeId]=useState(nodes[0]?.id||null);
  const [activeDevId,setActiveDevId]=useState(null);
  const [showSuggest,setShowSuggest]=useState(false);

  const activeNode=nodes.find(n=>n.id===activeNodeId);
  const nodeDevs=deviations.filter(d=>d.nodeId===activeNodeId);
  const activeDev=deviations.find(d=>d.id===activeDevId);
  const nd=activeDev?normalizeDev(activeDev):null;

  // Set global context for AI suggest in child components
  window._R2S={
    key:apiKey||'',
    model:aiModel||'claude-sonnet-4-6',
    nodeName:activeNode?.name||'',
    deviation:activeDev?.deviation||((activeDev?.guideWord||'')+' '+(activeDev?.parameter||'')),
    fluid:activeNode?.fluid||''
  };

  const activeDev2=useMemo(()=>{
    return activeDev?normalizeDev(activeDev):null;
  },[activeDev]);

  // CRUD helpers
  const updDev=(devId,fn)=>setDeviations(ds=>ds.map(d=>d.id===devId?fn(d):d));
  const addCause=(devId)=>updDev(devId,d=>({...d,causes:[...(d.causes||[]),{id:uid(),text:'',recommendations:[],initialRisk:null,residualRisk:null,consequences:[]}]}));
  const delCause=(devId,cid)=>updDev(devId,d=>({...d,causes:(d.causes||[]).filter(c=>c.id!==cid)}));
  const updCause=(devId,cid,updates)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,...updates}:c)}));
  const addDev=()=>{
    const id=uid();
    setDeviations(ds=>[...ds,{id,nodeId:activeNodeId,guideWord:'NO / NONE',parameter:'FLOW',deviation:'NO/NONE FLOW',status:'Open',priority:'',dueDate:'',responsible:'',remarks:'',causes:[]}]);
    setActiveDevId(id);
  };
  const delDev=(devId)=>{setDeviations(ds=>ds.filter(d=>d.id!==devId));if(activeDevId===devId)setActiveDevId(null);};
  const addCon=(devId,cid)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,consequences:[...(c.consequences||[]),{id:uid(),text:'',safeguards:[],recommendations:[],mitigationBarriers:[]}]}:c)}));
  const delCon=(devId,cid,conId)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,consequences:(c.consequences||[]).filter(cn=>cn.id!==conId)}:c)}));
  const updCon=(devId,cid,conId,updates)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,consequences:(c.consequences||[]).map(cn=>cn.id===conId?{...cn,...updates}:cn)}:c)}));
  const conSgAdd=(devId,cid,conId,text)=>{
    const obj=typeof text==='string'?{id:uid(),text,degradationFactors:[]}:{id:uid(),degradationFactors:[],...text};
    updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,consequences:(c.consequences||[]).map(cn=>cn.id===conId?{...cn,safeguards:[...(cn.safeguards||[]),obj]}:cn)}:c)}));
  };
  const conSgDel=(devId,cid,conId,i)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,consequences:(c.consequences||[]).map(cn=>cn.id===conId?{...cn,safeguards:(cn.safeguards||[]).filter((_,j)=>j!==i)}:cn)}:c)}));
  // ── conSgUpdate: updates one safeguard AND syncs DFs to all matching safeguards ──
  const conSgUpdate=(devId,cid,conId,sgId,updates)=>updDev(devId,d=>{
    // Find the updated safeguard's text so we can match it across consequences
    let matchText='';
    (d.causes||[]).forEach(c=>c.consequences.forEach(cn=>
      cn.safeguards.forEach(sg=>{if(sg.id===sgId)matchText=(sg.text||updates.text||'').trim().toLowerCase();})
    ));
    return {...d,causes:(d.causes||[]).map(c=>({...c,
      consequences:c.consequences.map(cn=>({...cn,
        safeguards:(cn.safeguards||[]).map(s=>{
          if(s.id===sgId)return{...s,...updates};
          // Sync DFs/controls to all other safeguards with the same text
          if(updates.degradationFactors&&matchText&&(s.text||'').trim().toLowerCase()===matchText)
            return{...s,degradationFactors:updates.degradationFactors};
          return s;
        })
      }))
    }))};
  });
  const conRecAdd=(devId,cid,conId,rec)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,consequences:(c.consequences||[]).map(cn=>cn.id===conId?{...cn,recommendations:[...(cn.recommendations||[]),{id:uid(),...rec}]}:cn)}:c)}));
  // conRecEdit: updates one rec AND syncs DFs to all recs with the same text across the deviation
  const conRecEdit=(devId,cid,conId,i,updated)=>updDev(devId,d=>{
    // Find the text of the rec being updated (to match against others)
    let matchText='';
    (d.causes||[]).forEach(c=>c.consequences.forEach(cn=>
      (cn.recommendations||[]).forEach((r,j)=>{
        if(c.id===cid&&cn.id===conId&&j===i)
          matchText=(r.text||updated.text||'').trim().toLowerCase();
      })
    ));
    return{...d,causes:(d.causes||[]).map(c=>({...c,
      consequences:c.consequences.map(cn=>({...cn,
        recommendations:(cn.recommendations||[]).map((r,j)=>{
          // Update the targeted rec
          if(c.id===cid&&cn.id===conId&&j===i)return{...r,...updated};
          // Sync degradation factors to all recs with the same text
          if(updated.degradationFactors&&matchText&&(r.text||'').trim().toLowerCase()===matchText)
            return{...r,degradationFactors:updated.degradationFactors};
          return r;
        })
      }))
    }))};
  });
  const conRecDel=(devId,cid,conId,i)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,consequences:(c.consequences||[]).map(cn=>cn.id===conId?{...cn,recommendations:(cn.recommendations||[]).filter((_,j)=>j!==i)}:cn)}:c)}));
  const conMitUpdate=(devId,cid,conId,newMbs)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,consequences:(c.consequences||[]).map(cn=>cn.id===conId?{...cn,mitigationBarriers:newMbs}:cn)}:c)}));
  const causeRiskUpdate=(devId,cid,type,risk)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,[type]:risk}:c)}));
  const causeRecAdd=(devId,cid,rec)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,recommendations:[...(c.recommendations||[]),{id:uid(),...rec}]}:c)}));
  const causeRecEdit=(devId,cid,i,updated)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,recommendations:(c.recommendations||[]).map((r,j)=>j===i?{...r,...updated}:r)}:c)}));
  const causeRecDel=(devId,cid,i)=>updDev(devId,d=>({...d,causes:(d.causes||[]).map(c=>c.id===cid?{...c,recommendations:(c.recommendations||[]).filter((_,j)=>j!==i)}:c)}));

  // Unique safeguards & recs across all consequences in active deviation (for pickers)
  const devSafeguards=useMemo(()=>{
    if(!nd)return[];
    const seen=new Map();
    nd.causes.forEach(c=>c.consequences.forEach(cn=>{
      (cn.safeguards||[]).forEach(sg=>{
        const t=(sg.text||'').trim();
        if(t&&!seen.has(t.toLowerCase()))seen.set(t.toLowerCase(),{...sg,id:sg.id||uid()});
      });
    }));
    return[...seen.values()];
  },[activeDev]);
  const devRecs=useMemo(()=>{
    if(!nd)return[];
    const seen=new Map();
    nd.causes.forEach(c=>c.consequences.forEach(cn=>{
      (cn.recommendations||[]).forEach(r=>{
        const t=(r.text||'').trim();
        if(t&&!seen.has(t.toLowerCase()))seen.set(t.toLowerCase(),{...r,id:r.id||uid()});
